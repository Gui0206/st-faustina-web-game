<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#060508">
<title>FAUSTYNA — Vessel of Mercy</title>
<meta name="description" content="A narrative game on the life of Saint Faustina Kowalska and the message of Divine Mercy.">
<style>
:root{
  --ink:#ece5d8;
  --ink-dim:rgba(236,229,216,.62);
  --ink-faint:rgba(236,229,216,.34);
  --gold:#e8c98a;
  --gold-dim:rgba(232,201,138,.55);
  --bg:#060508;
  --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,"URW Palladio L",Georgia,"Times New Roman",serif;
  --tracking-caps:.32em;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--serif);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#app{position:fixed;inset:0;background:var(--bg);overflow:hidden}
#stage{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:none}
#app.show-cursor #stage{cursor:default}

/* ---------- overlay UI ---------- */
#ui{position:absolute;inset:0;pointer-events:none;overflow:hidden}
#ui *{pointer-events:none}

/* narrative text */
#textbox{
  position:absolute;left:50%;bottom:max(9vh, env(safe-area-inset-bottom, 0px) + 9vh);
  transform:translateX(-50%);
  width:min(86vw,46em);
  text-align:center;
}
.line{
  font-size:clamp(17px, 1.4vw + 11px, 27px);
  line-height:1.62;
  color:var(--ink);
  text-shadow:0 1px 3px rgba(0,0,0,.85), 0 0 26px rgba(0,0,0,.6);
  opacity:0;
  transform:translateY(14px);
  transition:opacity 1.05s cubic-bezier(.22,.6,.2,1), transform 1.05s cubic-bezier(.22,.6,.2,1);
  will-change:opacity,transform;
}
.line.on{opacity:1;transform:translateY(0)}
.line.off{opacity:0;transform:translateY(-10px);transition-duration:.6s}
.line .attr{
  display:block;margin-top:.65em;
  font-size:.62em;font-style:normal;
  letter-spacing:var(--tracking-caps);text-transform:uppercase;
  color:var(--gold-dim);
}
.line.quote{font-style:italic}
.line.voice{
  font-style:italic;color:#fdf6e9;
  text-shadow:0 0 18px rgba(255,238,200,.45), 0 1px 3px rgba(0,0,0,.85);
}
.line.small{font-size:clamp(14px,1vw + 9px,20px);color:var(--ink-dim)}

/* language chips */
#m-lang .lang{
  display:inline-block;margin-right:14px;padding:2px 8px;cursor:pointer;
  color:var(--ink-dim);letter-spacing:.14em;font-size:13px;
  border:1px solid transparent;border-radius:3px;transition:color .3s ease,border-color .3s ease;
}
#m-lang .lang:hover{color:var(--ink)}
#m-lang .lang.on{color:#e8c98a;border-color:rgba(232,201,138,.35)}

/* advance affordance */
#advance{
  position:absolute;left:50%;bottom:max(4.2vh, env(safe-area-inset-bottom,0px) + 4.2vh);transform:translateX(-50%);
  width:7px;height:7px;border-radius:50%;
  background:var(--ink-faint);
  opacity:0;transition:opacity .8s ease;
}
#advance.on{opacity:1;animation:pulse 1.9s ease-in-out infinite}
/* a press landed too early — acknowledge it without obeying it */
#advance.soon{opacity:.45;transition:opacity .2s ease}
@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.85}50%{transform:translateX(-50%) scale(1.7);opacity:.3}}

/* hint microcopy */
#hint{
  position:absolute;left:50%;top:62%;transform:translateX(-50%);
  font-style:italic;font-size:clamp(13px,1vw + 8px,19px);
  color:var(--ink-faint);letter-spacing:.06em;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  opacity:0;transition:opacity 1.2s ease;
  white-space:nowrap;
}
#hint.on{opacity:1}

/* chapter title card */
#titlecard{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.1em;opacity:0;transition:opacity 1.1s ease;
  background:transparent;
}
#titlecard.on{opacity:1}
.tc-num{
  font-size:clamp(13px,1vw + 8px,18px);letter-spacing:var(--tracking-caps);
  color:var(--gold-dim);text-transform:uppercase;
}
.tc-title{
  font-size:clamp(26px,3.4vw + 12px,54px);
  font-weight:400;letter-spacing:.04em;
  color:var(--ink);text-align:center;padding:0 8vw;
}
.tc-place{
  font-size:clamp(12px,.9vw + 7px,17px);letter-spacing:var(--tracking-caps);
  color:var(--ink-dim);text-transform:uppercase;
}
.tc-rule{width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}

/* choices (works of mercy) */
#choices{
  position:absolute;left:50%;bottom:max(16vh, env(safe-area-inset-bottom,0px) + 16vh);transform:translateX(-50%);
  display:flex;gap:clamp(10px,2vw,26px);
  opacity:0;transition:opacity .9s ease;
}
#choices.on{opacity:1}
#choices.on .choice{pointer-events:auto}
.choice{
  font-family:var(--serif);font-size:clamp(14px,1vw + 9px,19px);
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink);background:rgba(10,8,12,.45);
  border:1px solid rgba(236,229,216,.22);
  padding:.85em 1.6em;border-radius:2px;
  cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:border-color .35s ease, box-shadow .35s ease, color .35s ease, background .35s ease, transform .35s ease, opacity .6s ease;
  text-shadow:0 1px 2px rgba(0,0,0,.7);
}
.choice small{display:block;font-size:.66em;letter-spacing:.1em;color:var(--ink-faint);margin-top:.45em;text-transform:none;font-style:italic}
.choice:hover{border-color:var(--gold-dim);color:#fff;box-shadow:0 0 24px rgba(232,201,138,.12), inset 0 0 18px rgba(232,201,138,.06);transform:translateY(-2px)}
.choice:active{transform:translateY(0)}
.choice.disabled{opacity:.32;pointer-events:none}

/* menu button */
#menubtn{
  position:absolute;top:max(18px, env(safe-area-inset-top,0px) + 12px);right:22px;
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);font-size:19px;
  cursor:pointer;pointer-events:auto;
  opacity:0;transition:opacity .6s ease,color .3s ease, transform .3s ease;
  user-select:none;
}
#menubtn.visible{opacity:.8}
#menubtn:hover{color:var(--ink);transform:rotate(45deg)}

/* menu / pause panel */
#menu{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(4,3,6,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;transition:opacity .5s ease;
}
#menu.on{opacity:1;pointer-events:auto}
#menu.on *{pointer-events:auto}
.menu-panel{display:flex;flex-direction:column;align-items:center;gap:1.6em;max-height:86vh;overflow-y:auto;padding:4vh 6vw;text-align:center}
.menu-title{font-size:clamp(18px,1.6vw + 10px,26px);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--ink-dim)}
.menu-item{
  font-size:clamp(15px,1.1vw + 9px,20px);letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-dim);cursor:pointer;padding:.34em 1em;
  transition:color .3s ease,letter-spacing .3s ease;border:none;background:none;font-family:var(--serif);
}
.menu-item:hover{color:var(--gold);letter-spacing:.2em}
.menu-item.locked{opacity:.3;pointer-events:none}
.menu-sub{font-size:.72em;letter-spacing:.08em;color:var(--ink-faint);text-transform:none;display:block;margin-top:.2em;font-style:italic}
.menu-row{display:flex;align-items:center;gap:1em;color:var(--ink-dim);font-size:clamp(13px,1vw + 8px,17px);letter-spacing:.12em;text-transform:uppercase}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:170px;height:2px;background:rgba(236,229,216,.25);outline:none;border-radius:2px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;
  box-shadow:0 0 10px rgba(232,201,138,.5);
}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;border:none}
.menu-note{font-size:clamp(11px,.8vw + 7px,14px);color:var(--ink-faint);font-style:italic;max-width:34em;line-height:1.7;letter-spacing:.02em}
.menu-sep{width:46px;height:1px;background:rgba(236,229,216,.18)}

/* toggle */
.toggle{display:inline-flex;align-items:center;gap:.6em;cursor:pointer}
.toggle .box{width:30px;height:16px;border:1px solid rgba(236,229,216,.35);border-radius:9px;position:relative;transition:border-color .3s}
.toggle .box::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--ink-faint);transition:left .25s ease,background .25s ease}
.toggle.on .box{border-color:var(--gold-dim)}
.toggle.on .box::after{left:16px;background:var(--gold)}

/* keepsake (epilogue) */
#keepsake{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.2vh;
  opacity:0;transition:opacity 2.2s ease;
}
#keepsake.on{opacity:1}
#keepsake.on .ks-btn{pointer-events:auto}
#ksframe{
  width:min(44vh,70vw);aspect-ratio:3/4;
  border:1px solid rgba(232,201,138,.35);
  box-shadow:0 0 60px rgba(232,201,138,.10), 0 18px 70px rgba(0,0,0,.6), inset 0 0 40px rgba(0,0,0,.45);
  background:#0a0810;padding:max(1.2vh,8px);
}
#ksframe canvas{width:100%;height:100%;display:block}
.ks-caption{font-style:italic;font-size:clamp(17px,1.3vw + 11px,26px);color:var(--ink);text-align:center;letter-spacing:.04em}
.ks-caption small{display:block;font-style:normal;font-size:.72em;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--gold-dim);margin-top:.7em}
.ks-btn{
  font-family:var(--serif);font-size:clamp(12px,.9vw + 8px,16px);letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-dim);border:1px solid rgba(236,229,216,.22);background:rgba(10,8,12,.4);
  padding:.7em 1.5em;cursor:pointer;border-radius:2px;transition:all .35s ease;
}
.ks-btn:hover{color:var(--gold);border-color:var(--gold-dim);box-shadow:0 0 20px rgba(232,201,138,.12)}

/* vol icon flash on mute toggle */
#flash-note{
  position:absolute;top:max(20px,env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);
  font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);
  opacity:0;transition:opacity .4s ease;
}
#flash-note.on{opacity:1}

@media (max-width:640px){
  #textbox{bottom:max(12vh, env(safe-area-inset-bottom,0px) + 12vh)}
  #choices{flex-direction:column;align-items:center;bottom:18vh}
  .choice{min-width:64vw;text-align:center}
}
@media (prefers-reduced-motion:reduce){
  .line,#titlecard,#hint{transition-duration:.25s}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="stage"></canvas>
  <div id="ui">
    <div id="titlecard"></div>
    <div id="textbox"></div>
    <div id="advance"></div>
    <div id="hint"></div>
    <div id="choices"></div>
    <div id="keepsake"></div>
    <div id="flash-note"></div>
    <div id="menubtn" title="menu">✦</div>
    <div id="menu"></div>
  </div>
</div>
<!--{{SCRIPTS}}-->
</body>
</html>
