/* ---------------- pause menu ---------------- */
const Menu = {
  open: false,
  build() {
    const el = UI.els.menu;
    el.innerHTML = `
      <div class="menu-panel">
        <div class="menu-title">Faustyna</div>
        <div class="menu-sep"></div>
        <button class="menu-item" data-act="resume">Return</button>
        <button class="menu-item" data-act="restart">Restart chapter</button>
        <div class="menu-sep"></div>
        <div id="menu-chapters"></div>
        <div class="menu-sep"></div>
        <div class="menu-row">sound <input type="range" id="m-vol" min="0" max="100" step="1"></div>
        <div class="menu-row"><span class="toggle" id="m-motion"><span class="box"></span> calm motion</span></div>
        <div class="menu-note">A story drawn from the Diary of Saint Faustina Kowalska (1905–1938).
        Quotations cited as “Diary, n.” are from <i>Diary: Divine Mercy in My Soul</i>,
        © 1987 Congregation of Marians of the Immaculate Conception.</div>
      </div>`;
    el.addEventListener('pointerdown', e => e.stopPropagation());
    el.addEventListener('click', e => {
      const act = e.target.closest && e.target.closest('[data-act]');
      if (!act || act.classList.contains('locked')) return;
      e.stopPropagation();
      const a = act.dataset.act;
      if (a === 'resume') this.toggle(false);
      if (a === 'restart') { this.toggle(false); Engine.go(Engine.scene.id, { instant: false }); }
      if (a === 'chapter') { this.toggle(false); Engine.go(act.dataset.id, { instant: false }); }
    });
    el.querySelector('#m-vol').addEventListener('input', e => {
      Audio.init(); Audio.setVolume(e.target.value / 100);
    });
    el.querySelector('#m-motion').addEventListener('click', e => {
      e.stopPropagation();
      Save.data.settings.reduceMotion = !Save.data.settings.reduceMotion;
      Save.write(); this.syncSettings();
    });
  },
  syncSettings() {
    UI.els.menu.querySelector('#m-vol').value = Math.round((Save.data.settings.volume ?? 0.85) * 100);
    UI.els.menu.querySelector('#m-motion').classList.toggle('on', !!Save.data.settings.reduceMotion);
  },
  refreshChapters() {
    const holder = UI.els.menu.querySelector('#menu-chapters');
    holder.innerHTML = '';
    CHAPTERS.forEach((c, i) => {
      const locked = i > Save.data.unlocked;
      const b = document.createElement('button');
      b.className = 'menu-item' + (locked ? ' locked' : '');
      b.dataset.act = 'chapter'; b.dataset.id = c.id;
      b.innerHTML = `${c.num}. ${esc(c.menuTitle || c.title)}` + (locked ? '' : `<span class="menu-sub">${esc(c.place)}</span>`);
      holder.appendChild(b);
    });
  },
  toggle(force) {
    const want = force !== undefined ? force : !this.open;
    if (want === this.open) return;
    this.open = want;
    if (want) { Audio.init(); this.refreshChapters(); this.syncSettings(); }
    UI.els.menu.classList.toggle('on', want);
    Engine.paused = want;
    document.getElementById('app').classList.toggle('show-cursor', want);
  },
};

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}


/* ============ 06-save.js ============ */
/* localStorage persistence: progress, the player's painting, settings. */

const Save = {
  KEY: 'faustyna_v1',
  data: null,

  read() {
    try {
      this.data = JSON.parse(localStorage.getItem(this.KEY)) || null;
    } catch (e) { this.data = null; }
    if (!this.data || typeof this.data !== 'object' || Array.isArray(this.data)) this.data = {};
    const d = this.data;
    if (!d.settings || typeof d.settings !== 'object') d.settings = {};
    if (typeof d.settings.volume !== 'number' || !isFinite(d.settings.volume)) d.settings.volume = 0.85;
    if (typeof d.settings.reduceMotion !== 'boolean')
      d.settings.reduceMotion = !!(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
    if (typeof d.unlocked !== 'number' || !isFinite(d.unlocked)) d.unlocked = 0;
    d.unlocked = clamp(Math.floor(d.unlocked), 0, CHAPTERS.length - 1);
    /* local debug: running from disk or localhost opens every chapter */
    if (location.protocol === 'file:' || /^(localhost|127\.0\.0\.1)$/.test(location.hostname))
      d.unlocked = CHAPTERS.length - 1;
    if (typeof d.chapter !== 'string' || !SCENES[d.chapter]) d.chapter = null;
    if (!Array.isArray(d.strokes)) d.strokes = null;
    d.done = !!d.done;
    return d;
  },

  write() {
    try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) { /* private mode */ }
  },

  reachChapter(id) {
    const i = CHAPTERS.findIndex(c => c.id === id);
    if (i >= 0) {
      this.data.chapter = id;
      this.data.unlocked = Math.max(this.data.unlocked, i);
    }
    this.write();
  },

  /* strokes: [[{x,y},...], ...] in unit canvas space; cap size */
  savePainting(strokes) {
    let total = 0;
    const out = [];
    for (const s of strokes) {
      const pts = s.pts.map(p => [Math.round(p.x * 1000) / 1000, Math.round(p.y * 1000) / 1000]);
      total += pts.length;
      out.push({ k: s.kind, p: pts });
      if (total > 6000) break;
    }
    this.data.strokes = out;
    this.write();
  },
};


/* ============ 07-engine.js ============ */
/* Engine: loop, camera, scene manager, transitions, and the script runner —
   a generator-coroutine system that choreographs each chapter's beats. */

const Engine = {
  time: 0, dt: 0,
  cam: { x: 0, y: 450, zoom: 1, shakeX: 0, shakeY: 0, trauma: 0 },
  drift: { t: 0, amp: 0.018, rate: 0.05 },     // slow breathing zoom
  fade: { alpha: 1, color: '#000000' },        // full-screen fade overlay
  grainAmt: 0.07,
  letterboxAmt: 0,
  paused: false,
  scene: null,
  scriptRunner: null,
  pressQueued: false,
  _last: 0,

  get fx() { return Save.data.settings.reduceMotion ? 0 : 1; },

  init() {
    View.init(document.getElementById('stage'));
    Input.init(document.getElementById('app'));
    Input.on('press', p => this.handlePress(p));
    Input.on('release', p => { if (!this.paused && this.scene && this.scene.onRelease) this.scene.onRelease(p); });
    Input.on('move', p => { if (!this.paused && this.scene && this.scene.onMove) this.scene.onMove(p); });
    this._last = performance.now();
    requestAnimationFrame(t => this.frame(t));
  },

  handlePress(p) {
    Audio.init();
    if (this.paused) return;
    if (TitleCard.visible) {
      if (Engine.time - TitleCard.shownAt > 0.9) this.pressQueued = true; // skip card
      return;
    }
    if (Text.showing && Text.blocking) { Text.advance(); return; }
    if (this.scene && this.scene.onPress) {
      try { this.scene.onPress(p); } catch (e) { console.error('scene.onPress', e); }
    }
  },

  /* ---------------- main loop ---------------- */
  frame(now) {
    requestAnimationFrame(t => this.frame(t));
    let dt = (now - this._last) / 1000;
    this._last = now;
    dt = Math.min(dt, 0.05);
    if (this.paused) return;
    this.dt = dt; this.time += dt;

    Input.update(dt);
    Tweens.update(dt);
    try { Audio.update(dt); } catch (e) { console.error('audio.update', e); }

    /* camera drift + shake */
    this.drift.t += dt * this.drift.rate;
    if (this.cam.trauma > 0) {
      this.cam.trauma = Math.max(0, this.cam.trauma - dt * 1.6);
      const s = this.cam.trauma * this.cam.trauma * 22 * this.fx;
      this.cam.shakeX = rand(-s, s); this.cam.shakeY = rand(-s, s);
    } else { this.cam.shakeX = this.cam.shakeY = 0; }

    if (this.scene && this.scene.update) {
      try { this.scene.update(dt); } catch (e) { console.error('scene.update', e); }
    }
    if (this.scriptRunner) this.scriptRunner.update(dt);
    Particles.update(dt);
    Text.update(dt);
    Cursor.update(dt);

    this.draw();
    Input.postUpdate();
  },

  shake(amount) { this.cam.trauma = Math.min(1, this.cam.trauma + amount); },

  draw() {
    const ctx = View.ctx;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, View.pixW, View.pixH);

    const driftZoom = 1 + (Math.sin(this.drift.t * TAU) * this.drift.amp + this.drift.amp) * this.fx;
    const cam = {
      x: this.cam.x, y: this.cam.y,
      zoom: this.cam.zoom * driftZoom,
      shakeX: this.cam.shakeX, shakeY: this.cam.shakeY,
    };
    View.apply(cam);

    /* scenes live in the y∈[0,900] band; outside stays pure black (letterbox) */
    ctx.save();
    ctx.beginPath();
    ctx.rect(View.left - 4, 0, View.W + 8, View.H);
    ctx.clip();
    if (this.scene && this.scene.draw) {
      try { this.scene.draw(ctx); } catch (e) { console.error('scene.draw', e); }
    }
    Particles.draw(ctx, false);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    Particles.draw(ctx, true);
    ctx.restore();
    if (this.scene && this.scene.drawFront) this.scene.drawFront(ctx);
    Cursor.draw(ctx);
    ctx.restore();

    R.grain(ctx, this.grainAmt * (this.fx ? 1 : 0.4));
    R.vignette(ctx, 0.62);
    R.letterbox(ctx, this.letterboxAmt);

    if (this.fade.alpha > 0.002) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalAlpha = this.fade.alpha;
      ctx.fillStyle = this.fade.color;
      ctx.fillRect(0, 0, View.pixW, View.pixH);
      ctx.globalAlpha = 1;
    }
  },

  /* ---------------- scene flow ---------------- */
  runId: 0,
  go(id, opts = {}) {
    const next = SCENES[id];
    if (!next) return;
    const doSwitch = () => {
      if (this.scene && this.scene.exit) this.scene.exit();
      Particles.clear();
      Tweens.clear();
      Text.clear(true);
      Hint.hide();
      Choices.hide();
      this.scriptRunner = null;
      this.runId++;
      const run = this.runId;
      this.cam.x = 0; this.cam.y = 450; this.cam.zoom = 1; this.cam.trauma = 0;
      this.letterboxAmt = 0;
      this.scene = next;
      const ch = CHAPTERS.find(c => c.id === id);
      if (ch) Save.reachChapter(id);
      next.enter();
      const startScript = () => {
        if (this.runId === run && next.script) this.scriptRunner = new ScriptRunner(next.script);
      };

      if (ch && !opts.noCard) {
        TitleCard.show(ch.num ? `Chapter ${ch.num}` : '', ch.title, ch.place);
        this.fade.color = '#000000';
        this.fade.alpha = 1;
        const start = this.time;
        const waitCard = () => {
          if (this.runId !== run) return;          // superseded by another go()
          const elapsed = this.time - start;
          if ((elapsed > 3.4 || this.pressQueued) && elapsed > 1.2) {
            this.pressQueued = false;
            TitleCard.hide();
            Tweens.to(this.fade, { alpha: 0 }, 1.6, { key: 'fade' });
            startScript();                          // beats begin once the card lifts
          } else setTimeout(waitCard, 60);
        };
        setTimeout(waitCard, 60);
      } else {
        this.fade.alpha = 1;
        Tweens.to(this.fade, { alpha: 0 }, opts.slowIn ? 2.2 : 1.2, { key: 'fade' });
        startScript();
      }
    };

    if (opts.instant) { doSwitch(); }
    else {
      Tweens.to(this.fade, { alpha: 1 }, opts.slowOut ? 2 : 0.9, {
        key: 'fade', ease: Ease.inOutQuad, onDone: doSwitch,
      });
    }
  },

  /* schedule a callback that dies with the current scene run (restart-safe) */
  after(ms, fn) {
    const run = this.runId;
    setTimeout(() => { if (this.runId === run) fn(); }, ms);
  },

  nextChapter() {
    const i = CHAPTERS.findIndex(c => c.id === this.scene.id);
    const next = CHAPTERS[i + 1];
    if (next) this.go(next.id);
  },
};

/* ---------------- script runner: generator coroutines ----------------
   Scene scripts are generator functions yielding awaitables:
     yield S.wait(1.4)
     yield S.text("...", opts)            — waits for advance
     yield S.waitFor(() => cond)
     yield S.holdTotal(2.5)               — accumulated hold-time gate
     S.do(fn)                             — immediate side effect
*/
class ScriptRunner {
  constructor(genFn) {
    this.S = makeScriptAPI();
    this.gen = genFn(this.S);
    this.current = null;
    this.done = false;
  }
  update(dt) {
    if (this.done) return;
    if (this.current && !this.current.done(dt)) return;
    let r;
    try { r = this.gen.next(); }
    catch (e) { console.error('script error', e); this.done = true; return; }
    if (r.done) { this.done = true; this.current = null; return; }
    this.current = r.value;
    /* resolve instantly-completable steps in the same frame chain next tick */
  }
}

function makeScriptAPI() {
  return {
    wait(sec) { let t = sec; return { done: dt => (t -= dt) <= 0 }; },
    waitFor(fn) { return { done: () => !!fn() }; },
    text(str, opts) { return Text.show(str, opts); },
    textAuto(str, sec, opts = {}) { return Text.show(str, Object.assign({ auto: sec, passthrough: true }, opts)); },
    do(fn) {
      /* a throwing side-effect must never kill the chapter's generator */
      try { fn(); } catch (e) { console.error('script do()', e); }
      return { done: () => true };
    },
    holdTotal(sec, opts = {}) {
      /* gate: total accumulated hold time across presses */
      let acc = 0, hinted = false, idle = 0;
      return {
        done: dt => {
          if (Input.down) { acc += dt; idle = 0; if (hinted) { Hint.hide(); hinted = false; } }
          else { idle += dt; }
          if (opts.hint && idle > (opts.hintAfter || 4) && !hinted) { Hint.show(opts.hint, opts); hinted = true; }
          if (opts.onProgress) opts.onProgress(clamp01(acc / sec), Input.down);
          if (acc >= sec) { if (hinted) Hint.hide(); return true; }
          return false;
        },
      };
    },
    pressGate(opts = {}) {
      /* wait for the next fresh press (consumed by scene.onPress normally; use flagged) */
      let pressed = false, idle = 0, hinted = false;
      const off = () => { pressed = true; };
      Input.on('press', off);   // note: listeners persist; acceptable for scene lifetime
      return {
        done: dt => {
          idle += dt;
          if (opts.hint && idle > (opts.hintAfter || 5) && !hinted) { Hint.show(opts.hint, opts); hinted = true; }
          if (pressed && hinted) Hint.hide();
          return pressed;
        },
      };
    },
  };
}

/* ---------------- luminous cursor ---------------- */
const Cursor = {
  x: 0, y: 0, r: 7, visible: 0, pressGlow: 0,
  update(dt) {
    this.x = damp(this.x, Input.x, 22, dt);
    this.y = damp(this.y, Input.y, 22, dt);
    const idle = Engine.time - Input.lastMoveAt;
    const want = (idle < 2.6 || Input.down) && !Menu.open ? 1 : 0;
    this.visible = damp(this.visible, want, 6, dt);
    this.pressGlow = damp(this.pressGlow, Input.down ? 1 : 0, 10, dt);
    if (Input.down && Math.random() < 0.35) {
      Particles.spawn({
        x: this.x + rand(-4, 4), y: this.y + rand(-4, 4),
        vx: rand(-6, 6), vy: rand(-18, -6), life: rand(0.5, 1.1),
        size: rand(1, 2.4), endSize: 0.2, color: '#ffeec9', alpha: 0.5,
        additive: true, glow: true,
      });
    }
  },
  draw(ctx) {
    if (this.visible < 0.01) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = this.visible * (0.5 + this.pressGlow * 0.5);
    R.glow(ctx, this.x, this.y, this.r * (1 + this.pressGlow * 1.6) * (1 + Math.sin(Engine.time * 2.2) * 0.12), '#fff3d9');
    ctx.globalAlpha = this.visible * 0.9;
    ctx.fillStyle = '#fffdf4';
    ctx.beginPath(); ctx.arc(this.x, this.y, 1.6 + this.pressGlow * 1.2, 0, TAU); ctx.fill();
    ctx.restore();
  },
};

/* hold-to-pray bloom: the game's recurring verb.
   rises while held, ebbs gently when released; drives light + pad swell. */
class PrayBloom {
  constructor(opts = {}) {
    this.v = 0;
    this.riseTime = opts.riseTime || 2.6;   // seconds of holding to reach 1
    this.fall = opts.fall || 0.12;          // per second when released
    this.muted = opts.muted || false;       // ch8: the hold that "doesn't answer"
    this.onFull = opts.onFull || null;
    this._wasFull = false;
  }
  update(dt) {
    if (Input.down && !Menu.open) {
      const gain = this.muted ? 0.012 : 1 / this.riseTime;
      this.v = clamp01(this.v + gain * dt);
    } else {
      this.v = clamp01(this.v - this.fall * dt);
    }
    if (this.v >= 1 && !this._wasFull) { this._wasFull = true; if (this.onFull) this.onFull(); }
    if (this.v < 0.85) this._wasFull = false;
    return this.v;
  }
}

/* a figure that walks toward a target x while input held (or arrow keys) */
class Walker {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.speed = opts.speed || 120;
    this.phase = 0;
    this.moving = 0;
    this.face = 1;
    this.stepT = 0;
    this.onStep = opts.onStep || null;
  }
  update(dt, dir) {
    const want = clamp(dir, -1, 1);
    this.moving = damp(this.moving, want !== 0 ? 1 : 0, 8, dt);
    if (want !== 0) this.face = want;
    this.x += want * this.speed * dt;
    if (this.moving > 0.2) {
      this.phase += dt * 7 * this.moving;
      this.stepT -= dt;
      if (this.stepT <= 0) { this.stepT = 0.42; if (this.onStep) this.onStep(); }
    }
  }
}

/* soft radial light pool (lamps, windows). breathing intensity */
function lamp(ctx, x, y, r, color, intensity, t, flickerAmt = 0.08) {
  const fl = 1 + wobble(t * 9 + x) * flickerAmt;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = clamp01(intensity);
  R.glow(ctx, x, y, r * fl, color);
  ctx.restore();
}

/* breathing/cadence ring used by the chaplet + final scene */
function drawRing(ctx, x, y, baseR, pulse01, alpha, color = '#ffeec9') {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = alpha * 0.85;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.arc(x, y, baseR * (0.82 + pulse01 * 0.3), 0, TAU);
  ctx.stroke();
  ctx.globalAlpha = alpha * 0.3;
  R.glow(ctx, x, y, baseR * 0.5, color);
  ctx.restore();
}

/* shared painting store (set in ch5, used in epilogue keepsake) */
const Painting = {
  strokes: [],          // {kind:'garment'|'ray_red'|'ray_pale', pts:[{x,y}]} unit space
  sigProgress: 0,
  load() {
    try {
      const s = Save.data.strokes;
      if (!Array.isArray(s)) return false;
      this.strokes = s
        .filter(o => o && typeof o.k === 'string' && Array.isArray(o.p))
        .map(o => ({
          kind: o.k,
          pts: o.p.filter(p => Array.isArray(p) && p.length >= 2).map(([x, y]) => ({ x: +x || 0, y: +y || 0 })),
        }))
        .filter(o => o.pts.length > 1);
      this.sigProgress = 1;
      return this.strokes.length > 0;
    } catch (e) { this.strokes = []; return false; }
  },
  /* render the player's painting into ctx within rect (x,y,w,h); unit coords map to rect */
  render(ctx, x, y, w, h, opts = {}) {
    const P = u => ({ x: x + u.x * w, y: y + u.y * h });
    const glowAmt = opts.glow !== undefined ? opts.glow : 1;
    /* garment strokes: stacked soft light */
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of this.strokes) {
      if (s.kind !== 'garment') continue;
      for (let i = 0; i < s.pts.length; i += 2) {
        const p = P(s.pts[i]);
        ctx.globalAlpha = 0.075 * glowAmt;
        R.glow(ctx, p.x, p.y, w * 0.1, '#f4ead2');
      }
    }
    /* rays: soft fans of light along the player's own path */
    for (const s of this.strokes) {
      if (s.kind !== 'ray_red' && s.kind !== 'ray_pale') continue;
      const col = s.kind === 'ray_red' ? '#e8364c' : '#cfdcff';
      const core = s.kind === 'ray_red' ? '#ff8a98' : '#f4f8ff';
      const pts = s.pts.map(P);
      drawTaperedPath(ctx, pts, w * 0.2, col, 0.13 * glowAmt);     // wide halo
      drawTaperedPath(ctx, pts, w * 0.1, col, 0.22 * glowAmt);     // body
      drawTaperedPath(ctx, pts, w * 0.038, core, 0.3 * glowAmt);   // gentle core
    }
    ctx.restore();
    /* signature */
    if (this.sigProgress > 0.01) {
      ctx.save();
      const fs = h * 0.052;
      ctx.font = `italic ${fs}px "Iowan Old Style","Palatino Linotype",Georgia,serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const tx = x + w / 2, ty = y + h * 0.91;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, ty - fs, w * this.sigProgress, fs * 2);
      ctx.clip();
      ctx.fillStyle = `rgba(238,228,205,${0.92 * (opts.alpha === undefined ? 1 : opts.alpha)})`;
      ctx.shadowColor = 'rgba(255,238,200,0.6)'; ctx.shadowBlur = 12 * glowAmt;
      ctx.fillText('Jezu, ufam Tobie', tx, ty);
      ctx.restore();
      ctx.restore();
    }
  },
};

function drawTaperedPath(ctx, pts, maxW, color, alpha) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
  const n = pts.length;
  for (let i = 1; i < n; i++) {
    const t = i / (n - 1);
    ctx.globalAlpha = alpha * (1 - t * 0.25);
    ctx.lineWidth = maxW * (0.35 + 0.65 * t);   // widens away from the heart
    ctx.beginPath();
    ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
    ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

/* smooth a recorded polyline (moving average, then resample) */
function smoothPath(pts, passes = 2) {
  let p = pts.slice();
  for (let k = 0; k < passes; k++) {
    const out = [p[0]];
    for (let i = 1; i < p.length - 1; i++) {
      out.push({ x: (p[i - 1].x + p[i].x * 2 + p[i + 1].x) / 4, y: (p[i - 1].y + p[i].y * 2 + p[i + 1].y) / 4 });
    }
    out.push(p[p.length - 1]);
    p = out;
  }
  return p;
}

/* manual letterspacing — reliable across browsers */
function spacedText(ctx, str, cx, y, size, spacing, color, italic = false) {
  ctx.save();
  ctx.font = `${italic ? 'italic ' : ''}${size}px "Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif`;
  ctx.fillStyle = color;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  let total = 0;
  const widths = [];
  for (const ch of str) { const w = ctx.measureText(ch).width; widths.push(w); total += w + spacing; }
  total -= spacing;
  let x = cx - total / 2;
  let i = 0;
  for (const ch of str) { ctx.fillText(ch, x, y); x += widths[i++] + spacing; }
  ctx.restore();
}
