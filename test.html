<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#060508">
<title>FAUSTYNA — Vessel of Mercy</title>
<meta name="description" content="A narrative game on the life of Saint Faustina Kowalska and the message of Divine Mercy.">
<style>
:root{
  --ink:#ece5d8;
  --ink-dim:rgba(236,229,216,.62);
  --ink-faint:rgba(236,229,216,.34);
  --gold:#e8c98a;
  --gold-dim:rgba(232,201,138,.55);
  --bg:#060508;
  --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,"URW Palladio L",Georgia,"Times New Roman",serif;
  --tracking-caps:.32em;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--serif);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#app{position:fixed;inset:0;background:var(--bg);overflow:hidden}
#stage{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:none}
#app.show-cursor #stage{cursor:default}

/* ---------- overlay UI ---------- */
#ui{position:absolute;inset:0;pointer-events:none;overflow:hidden}
#ui *{pointer-events:none}

/* narrative text */
#textbox{
  position:absolute;left:50%;bottom:max(9vh, env(safe-area-inset-bottom, 0px) + 9vh);
  transform:translateX(-50%);
  width:min(86vw,46em);
  text-align:center;
}
.line{
  font-size:clamp(17px, 1.4vw + 11px, 27px);
  line-height:1.62;
  color:var(--ink);
  text-shadow:0 1px 3px rgba(0,0,0,.85), 0 0 26px rgba(0,0,0,.6);
  opacity:0;
  transform:translateY(14px);
  transition:opacity 1.05s cubic-bezier(.22,.6,.2,1), transform 1.05s cubic-bezier(.22,.6,.2,1);
  will-change:opacity,transform;
}
.line.on{opacity:1;transform:translateY(0)}
.line.off{opacity:0;transform:translateY(-10px);transition-duration:.6s}
.line .attr{
  display:block;margin-top:.65em;
  font-size:.62em;font-style:normal;
  letter-spacing:var(--tracking-caps);text-transform:uppercase;
  color:var(--gold-dim);
}
.line.quote{font-style:italic}
.line.voice{
  font-style:italic;color:#fdf6e9;
  text-shadow:0 0 18px rgba(255,238,200,.45), 0 1px 3px rgba(0,0,0,.85);
}
.line.small{font-size:clamp(14px,1vw + 9px,20px);color:var(--ink-dim)}

/* advance affordance */
#advance{
  position:absolute;left:50%;bottom:max(4.2vh, env(safe-area-inset-bottom,0px) + 4.2vh);transform:translateX(-50%);
  width:7px;height:7px;border-radius:50%;
  background:var(--ink-faint);
  opacity:0;transition:opacity .8s ease;
}
#advance.on{opacity:1;animation:pulse 1.9s ease-in-out infinite}
/* a press landed too early — acknowledge it without obeying it */
#advance.soon{opacity:.45;transition:opacity .2s ease}
@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.85}50%{transform:translateX(-50%) scale(1.7);opacity:.3}}

/* hint microcopy */
#hint{
  position:absolute;left:50%;top:62%;transform:translateX(-50%);
  font-style:italic;font-size:clamp(13px,1vw + 8px,19px);
  color:var(--ink-faint);letter-spacing:.06em;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  opacity:0;transition:opacity 1.2s ease;
  white-space:nowrap;
}
#hint.on{opacity:1}

/* chapter title card */
#titlecard{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.1em;opacity:0;transition:opacity 1.1s ease;
  background:transparent;
}
#titlecard.on{opacity:1}
.tc-num{
  font-size:clamp(13px,1vw + 8px,18px);letter-spacing:var(--tracking-caps);
  color:var(--gold-dim);text-transform:uppercase;
}
.tc-title{
  font-size:clamp(26px,3.4vw + 12px,54px);
  font-weight:400;letter-spacing:.04em;
  color:var(--ink);text-align:center;padding:0 8vw;
}
.tc-place{
  font-size:clamp(12px,.9vw + 7px,17px);letter-spacing:var(--tracking-caps);
  color:var(--ink-dim);text-transform:uppercase;
}
.tc-rule{width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}

/* choices (works of mercy) */
#choices{
  position:absolute;left:50%;bottom:max(16vh, env(safe-area-inset-bottom,0px) + 16vh);transform:translateX(-50%);
  display:flex;gap:clamp(10px,2vw,26px);
  opacity:0;transition:opacity .9s ease;
}
#choices.on{opacity:1}
#choices.on .choice{pointer-events:auto}
.choice{
  font-family:var(--serif);font-size:clamp(14px,1vw + 9px,19px);
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink);background:rgba(10,8,12,.45);
  border:1px solid rgba(236,229,216,.22);
  padding:.85em 1.6em;border-radius:2px;
  cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:border-color .35s ease, box-shadow .35s ease, color .35s ease, background .35s ease, transform .35s ease, opacity .6s ease;
  text-shadow:0 1px 2px rgba(0,0,0,.7);
}
.choice small{display:block;font-size:.66em;letter-spacing:.1em;color:var(--ink-faint);margin-top:.45em;text-transform:none;font-style:italic}
.choice:hover{border-color:var(--gold-dim);color:#fff;box-shadow:0 0 24px rgba(232,201,138,.12), inset 0 0 18px rgba(232,201,138,.06);transform:translateY(-2px)}
.choice:active{transform:translateY(0)}
.choice.disabled{opacity:.32;pointer-events:none}

/* menu button */
#menubtn{
  position:absolute;top:max(18px, env(safe-area-inset-top,0px) + 12px);right:22px;
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);font-size:19px;
  cursor:pointer;pointer-events:auto;
  opacity:0;transition:opacity .6s ease,color .3s ease, transform .3s ease;
  user-select:none;
}
#menubtn.visible{opacity:.8}
#menubtn:hover{color:var(--ink);transform:rotate(45deg)}

/* menu / pause panel */
#menu{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(4,3,6,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;transition:opacity .5s ease;
}
#menu.on{opacity:1;pointer-events:auto}
#menu.on *{pointer-events:auto}
.menu-panel{display:flex;flex-direction:column;align-items:center;gap:1.6em;max-height:86vh;overflow-y:auto;padding:4vh 6vw;text-align:center}
.menu-title{font-size:clamp(18px,1.6vw + 10px,26px);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--ink-dim)}
.menu-item{
  font-size:clamp(15px,1.1vw + 9px,20px);letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-dim);cursor:pointer;padding:.34em 1em;
  transition:color .3s ease,letter-spacing .3s ease;border:none;background:none;font-family:var(--serif);
}
.menu-item:hover{color:var(--gold);letter-spacing:.2em}
.menu-item.locked{opacity:.3;pointer-events:none}
.menu-sub{font-size:.72em;letter-spacing:.08em;color:var(--ink-faint);text-transform:none;display:block;margin-top:.2em;font-style:italic}
.menu-row{display:flex;align-items:center;gap:1em;color:var(--ink-dim);font-size:clamp(13px,1vw + 8px,17px);letter-spacing:.12em;text-transform:uppercase}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:170px;height:2px;background:rgba(236,229,216,.25);outline:none;border-radius:2px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;
  box-shadow:0 0 10px rgba(232,201,138,.5);
}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;border:none}
.menu-note{font-size:clamp(11px,.8vw + 7px,14px);color:var(--ink-faint);font-style:italic;max-width:34em;line-height:1.7;letter-spacing:.02em}
.menu-sep{width:46px;height:1px;background:rgba(236,229,216,.18)}

/* toggle */
.toggle{display:inline-flex;align-items:center;gap:.6em;cursor:pointer}
.toggle .box{width:30px;height:16px;border:1px solid rgba(236,229,216,.35);border-radius:9px;position:relative;transition:border-color .3s}
.toggle .box::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--ink-faint);transition:left .25s ease,background .25s ease}
.toggle.on .box{border-color:var(--gold-dim)}
.toggle.on .box::after{left:16px;background:var(--gold)}

/* keepsake (epilogue) */
#keepsake{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.2vh;
  opacity:0;transition:opacity 2.2s ease;
}
#keepsake.on{opacity:1}
#keepsake.on .ks-btn{pointer-events:auto}
#ksframe{
  width:min(34vh,68vw);aspect-ratio:3/4;
  border:1px solid rgba(232,201,138,.35);
  box-shadow:0 0 60px rgba(232,201,138,.10), 0 18px 70px rgba(0,0,0,.6), inset 0 0 40px rgba(0,0,0,.45);
  background:#0a0810;padding:max(1.2vh,8px);
}
#ksframe canvas{width:100%;height:100%;display:block}
.ks-caption{font-style:italic;font-size:clamp(14px,1.1vw + 9px,21px);color:var(--ink);text-align:center;letter-spacing:.04em}
.ks-caption small{display:block;font-style:normal;font-size:.66em;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--gold-dim);margin-top:.7em}
.ks-btn{
  font-family:var(--serif);font-size:clamp(12px,.9vw + 8px,16px);letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-dim);border:1px solid rgba(236,229,216,.22);background:rgba(10,8,12,.4);
  padding:.7em 1.5em;cursor:pointer;border-radius:2px;transition:all .35s ease;
}
.ks-btn:hover{color:var(--gold);border-color:var(--gold-dim);box-shadow:0 0 20px rgba(232,201,138,.12)}

/* vol icon flash on mute toggle */
#flash-note{
  position:absolute;top:max(20px,env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);
  font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);
  opacity:0;transition:opacity .4s ease;
}
#flash-note.on{opacity:1}

@media (max-width:640px){
  #textbox{bottom:max(12vh, env(safe-area-inset-bottom,0px) + 12vh)}
  #choices{flex-direction:column;align-items:center;bottom:18vh}
  .choice{min-width:64vw;text-align:center}
}
@media (prefers-reduced-motion:reduce){
  .line,#titlecard,#hint{transition-duration:.25s}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="stage"></canvas>
  <div id="ui">
    <div id="titlecard"></div>
    <div id="textbox"></div>
    <div id="advance"></div>
    <div id="hint"></div>
    <div id="choices"></div>
    <div id="keepsake"></div>
    <div id="flash-note"></div>
    <div id="menubtn" title="menu">✦</div>
    <div id="menu"></div>
  </div>
</div>
<script>
(function(){
"use strict";

/* ============ 00-util.js ============ */
/* Math, easing, tweens, RNG, color. Everything here is engine-agnostic. */

const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;
const lerp = (a, b, t) => a + (b - a) * t;
const remap = (v, a0, a1, b0, b1) => b0 + (b1 - b0) * clamp01((v - a0) / (a1 - a0));
const dist = (x0, y0, x1, y1) => Math.hypot(x1 - x0, y1 - y0);
/* frame-rate independent exponential approach */
const damp = (cur, target, k, dt) => lerp(cur, target, 1 - Math.exp(-k * dt));

/* deterministic-ish rng with reseed (kept simple; date-seeding not needed here) */
let _rngState = 1234567;
function srand(seed) { _rngState = seed >>> 0 || 1; }
function rng() {
  _rngState ^= _rngState << 13; _rngState >>>= 0;
  _rngState ^= _rngState >> 17;
  _rngState ^= _rngState << 5; _rngState >>>= 0;
  return _rngState / 4294967296;
}
const rand = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const randSign = () => Math.random() < 0.5 ? -1 : 1;
const pick = arr => arr[(Math.random() * arr.length) | 0];

/* ---------- easing ---------- */
const Ease = {
  linear: t => t,
  inQuad: t => t * t,
  outQuad: t => 1 - (1 - t) * (1 - t),
  inOutQuad: t => t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
  inCubic: t => t * t * t,
  outCubic: t => 1 - Math.pow(1 - t, 3),
  inOutCubic: t => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
  outQuint: t => 1 - Math.pow(1 - t, 5),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outBack: t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); },
  outExpo: t => t >= 1 ? 1 : 1 - Math.pow(2, -10 * t),
  inExpo: t => t <= 0 ? 0 : Math.pow(2, 10 * t - 10),
};

/* ---------- tween manager ---------- */
const Tweens = {
  list: [],
  /* tween(obj, {prop: target,...}, dur, {ease, delay, onDone, key}) — key replaces */
  to(obj, props, dur, opts = {}) {
    const key = opts.key;
    if (key) this.kill(key);
    const tw = {
      obj, dur: Math.max(dur, 0.0001), t: -(opts.delay || 0),
      ease: opts.ease || Ease.outCubic, onDone: opts.onDone, key,
      from: {}, to: props, started: false, dead: false,
    };
    this.list.push(tw);
    return tw;
  },
  kill(key) {
    for (const tw of this.list) if (tw.key === key) tw.dead = true;
  },
  update(dt) {
    const L = this.list;
    for (let i = L.length - 1; i >= 0; i--) {
      const tw = L[i];
      if (tw.dead) { L.splice(i, 1); continue; }
      tw.t += dt;
      if (tw.t < 0) continue;
      if (!tw.started) {
        tw.started = true;
        for (const k in tw.to) tw.from[k] = tw.obj[k];
      }
      const p = clamp01(tw.t / tw.dur);
      const e = tw.ease(p);
      for (const k in tw.to) tw.obj[k] = lerp(tw.from[k], tw.to[k], e);
      if (p >= 1) {
        L.splice(i, 1);
        if (tw.onDone) tw.onDone();
      }
    }
  },
  clear() { this.list.length = 0; },
};

/* ---------- color ---------- */
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function rgba(hex, a = 1) {
  const [r, g, b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function mixHex(h1, h2, t) {
  const a = hexToRgb(h1), b = hexToRgb(h2);
  return `rgb(${Math.round(lerp(a[0], b[0], t))},${Math.round(lerp(a[1], b[1], t))},${Math.round(lerp(a[2], b[2], t))})`;
}

/* smooth value-noise-ish wobble: cheap layered sines, good for drift/flicker */
function wobble(t, f1 = 1, f2 = 2.7, f3 = 6.1) {
  return Math.sin(t * f1) * 0.55 + Math.sin(t * f2 + 1.3) * 0.3 + Math.sin(t * f3 + 4.1) * 0.15;
}


/* ============ 01-input.js ============ */
/* Unified input: pointer + keyboard collapse into one vocabulary.
   press / hold / release / move — plus pointer position in world coords.
   The whole game is playable with one finger or one key (space). */

const Input = {
  down: false,          // is the primary input held right now (pointer OR key)
  holdTime: 0,          // seconds current hold has lasted
  x: 0, y: 0,           // pointer in world coords (virtual units)
  sx: 0, sy: 0,         // pointer in screen px
  moved: false,         // pointer moved since last frame
  lastMoveAt: 0,        // engine time of last pointer move
  vx: 0, vy: 0,         // pointer velocity (world units/sec)
  speed: 0,             // smoothed |velocity| — stable across refresh rates
  hasPointer: true,
  keys: new Set(),
  _pDown: false, _kDown: false,
  _px: 0, _py: 0,
  _listeners: { press: [], release: [], move: [] },

  on(ev, fn) { this._listeners[ev].push(fn); },
  emit(ev, arg) { for (const fn of this._listeners[ev]) fn(arg); },

  _sync() {
    const want = this._pDown || this._kDown;
    if (want && !this.down) { this.down = true; this.holdTime = 0; this.emit('press', { x: this.x, y: this.y }); }
    else if (!want && this.down) { this.down = false; this.emit('release', { x: this.x, y: this.y, held: this.holdTime }); }
  },

  init(el) {
    const opts = { passive: false };
    el.addEventListener('pointerdown', e => {
      e.preventDefault();
      el.setPointerCapture && el.setPointerCapture(e.pointerId);
      this._setPos(e);
      this._pDown = true; this._sync();
    }, opts);
    el.addEventListener('pointermove', e => {
      this._setPos(e);
    }, opts);
    const up = e => { this._pDown = false; this._sync(); };
    el.addEventListener('pointerup', up, opts);
    el.addEventListener('pointercancel', up, opts);
    window.addEventListener('blur', () => {
      this.keys.clear();
      this._pDown = false; this._kDown = false; this._sync();
    });

    window.addEventListener('keydown', e => {
      if (e.repeat) return;
      this.keys.add(e.code);
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        this._kDown = true; this._sync();
      }
      if (e.code === 'Escape') Menu.toggle();
      if (e.code === 'KeyM') Audio.toggleMute();
    });
    window.addEventListener('keyup', e => {
      this.keys.delete(e.code);
      if (e.code === 'Space' || e.code === 'Enter') {
        this._kDown = false; this._sync();
      }
    });
  },

  _setPos(e) {
    this.sx = e.clientX; this.sy = e.clientY;
    const w = View.toWorld(e.clientX, e.clientY);
    this.x = w.x; this.y = w.y;
    this.moved = true;
    this.lastMoveAt = Engine.time;
    this.emit('move', { x: this.x, y: this.y });
  },

  update(dt) {
    if (this.down) this.holdTime += dt;
    if (dt > 0) {
      this.vx = (this.x - this._px) / dt;
      this.vy = (this.y - this._py) / dt;
      /* smoothed magnitude: per-frame deltas alternate 0/2× when the event
         rate beats the frame rate (high-Hz displays) — the EMA settles it */
      this.speed = damp(this.speed, Math.hypot(this.vx, this.vy), 10, dt);
    }
    this._px = this.x; this._py = this.y;
  },
  postUpdate() { this.moved = false; },

  /* directional intent for walk scenes: keys or pointer-x relative to a figure */
  axis() {
    let a = 0;
    if (this.keys.has('ArrowLeft') || this.keys.has('KeyA')) a -= 1;
    if (this.keys.has('ArrowRight') || this.keys.has('KeyD')) a += 1;
    return a;
  },
};


/* ============ 02-audio.js ============ */
/* Procedural audio. No assets: pads, church bells, celesta, a gramophone waltz,
   wind/rain/fire/vinyl textures, and one-shot SFX. Everything routes through
   master compressor; most things get a touch of generated convolver reverb. */

let AC = null;

const Audio = {
  master: null, comp: null, reverb: null, revGain: null,
  muted: false, volume: 0.85,
  pad: null, waltz: null, channels: {}, heartbeat: null,
  _started: false,

  init() {
    if (this._started) {
      if (AC && AC.state === 'suspended') AC.resume();
      return;
    }
    this._started = true;
    this.volume = clamp01(Save.data.settings.volume ?? 0.85);
    AC = new (window.AudioContext || window.webkitAudioContext)();
    this.comp = AC.createDynamicsCompressor();
    this.comp.threshold.value = -18; this.comp.knee.value = 24;
    this.comp.ratio.value = 5; this.comp.attack.value = 0.004; this.comp.release.value = 0.32;
    this.master = AC.createGain();
    this.master.gain.value = this.muted ? 0 : this.volume * 0.5;
    this.comp.connect(this.master); this.master.connect(AC.destination);

    /* generated impulse response — a stone chapel */
    const sr = AC.sampleRate, len = (sr * 3.2) | 0;
    const ir = AC.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = ir.getChannelData(ch);
      let last = 0;
      for (let i = 0; i < len; i++) {
        const t = i / len;
        const n = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.6);
        last = last * 0.62 + n * 0.38;            // soften highs
        d[i] = last * (i < 220 ? i / 220 : 1);
      }
    }
    this.reverb = AC.createConvolver(); this.reverb.buffer = ir;
    this.revGain = AC.createGain(); this.revGain.gain.value = 0.55;
    this.reverb.connect(this.revGain); this.revGain.connect(this.comp);

    this.pad = new Pad();
    this.waltz = new Waltz();
    this.channels = {
      wind: makeNoiseChannel('bandpass', 320, 0.45, 0.55),
      rain: makeNoiseChannel('bandpass', 1900, 0.4, 0.3),
      air:  makeNoiseChannel('bandpass', 620, 1.2, 0.5),   // breath / brush / gusts
      choir: new Choir(),
    };
    this.vinyl = new Vinyl();
  },

  out(dry = 1, wet = 0.3) {
    /* returns a gain node wired to master + reverb send */
    const g = AC.createGain();
    g.connect(this.comp);
    if (wet > 0) { const s = AC.createGain(); s.gain.value = wet; g.connect(s); s.connect(this.reverb); }
    g.gain.value = dry;
    return g;
  },

  setVolume(v) {
    this.volume = clamp01(v);
    if (this.master && !this.muted) this.master.gain.setTargetAtTime(this.volume * 0.5, AC.currentTime, 0.1);
    Save.data.settings.volume = this.volume; Save.write();
  },
  toggleMute() {
    this.muted = !this.muted;
    if (this.master) this.master.gain.setTargetAtTime(this.muted ? 0 : this.volume * 0.5, AC.currentTime, 0.05);
    UI.flashNote(this.muted ? 'sound off — M' : 'sound on');
  },

  update(dt) {
    if (!AC) return;
    this.pad.update(dt);
    this.waltz.update(dt);
    if (this.heartbeat) this.heartbeat.update(dt);
  },

  /* ---------------- one-shots ---------------- */

  bell(note, vel = 0.5, decayMul = 1) {
    if (!AC) return;
    const f = noteFreq(note), t = AC.currentTime;
    const out = this.out(1, 0.5);
    const partials = [[0.5, 0.4, 7], [1, 1, 5.5], [1.19, 0.5, 4], [1.56, 0.32, 3.4], [2, 0.55, 3], [2.66, 0.2, 2.2], [3.01, 0.12, 1.6]];
    for (const [ratio, amp, dec] of partials) {
      const o = AC.createOscillator(); o.type = 'sine';
      o.frequency.value = f * ratio * (1 + rand(-0.0015, 0.0015));
      const g = AC.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vel * amp * 0.16, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dec * decayMul);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + dec * decayMul + 0.1);
    }
    blip(out, f * 4, 0.02 * vel, 0.018, 'noise');
  },

  celesta(note, vel = 0.4) {
    if (!AC) return;
    const f = noteFreq(note), t = AC.currentTime;
    const out = this.out(1, 0.55);
    for (const [ratio, amp] of [[1, 1], [4, 0.22], [9.2, 0.06]]) {
      const o = AC.createOscillator(); o.type = 'sine';
      o.frequency.value = f * ratio * (1 + rand(-0.002, 0.002));
      const g = AC.createGain();
      g.gain.setValueAtTime(vel * amp * 0.22, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 2.2);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 2.4);
    }
  },

  pluck(note, vel = 0.5) {
    if (!AC) return;
    const f = noteFreq(note) * (1 + rand(-0.004, 0.004)), t = AC.currentTime;
    const out = this.out(0.9, 0.35);
    const o = AC.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const g = AC.createGain();
    g.gain.setValueAtTime(vel * 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = f * 4;
    o.connect(lp); lp.connect(g); g.connect(out);
    o.start(t); o.stop(t + 1);
  },

  knock(vel = 0.7) {
    if (!AC) return;
    const t = AC.currentTime, out = this.out(1, 0.3);
    const o = AC.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(190 * (1 + rand(-0.08, 0.08)), t);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.07);
    const g = AC.createGain();
    g.gain.setValueAtTime(vel * 0.7, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    o.connect(g); g.connect(out); o.start(t); o.stop(t + 0.14);
    blip(out, 900, vel * 0.25, 0.025, 'noise');
  },

  thunder(intensity = 0.7) {
    if (!AC) return;
    const t = AC.currentTime, out = this.out(1, 0.5);
    const dur = rand(1.6, 2.8);
    const src = noiseBurst(dur);
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(rand(300, 520), t);
    lp.frequency.exponentialRampToValueAtTime(60, t + dur);
    const g = AC.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(intensity * 0.8, t + rand(0.02, 0.12));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(lp); lp.connect(g); g.connect(out); src.start(t);
    const o = AC.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(55, t); o.frequency.exponentialRampToValueAtTime(28, t + dur * 0.8);
    const g2 = AC.createGain();
    g2.gain.setValueAtTime(intensity * 0.5, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.8);
    o.connect(g2); g2.connect(out); o.start(t); o.stop(t + dur);
  },

  step(vel = 0.18) {
    if (!AC) return;
    const out = this.out(0.8, 0.12);
    blip(out, rand(1400, 2400), vel, 0.05, 'noise');
    blip(out, rand(120, 160), vel * 0.7, 0.045, 'sine');
  },

  swish(vel = 0.2) {
    if (!AC) return;
    const t = AC.currentTime, out = this.out(0.9, 0.3);
    const src = noiseBurst(0.5);
    const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 0.7;
    bp.frequency.setValueAtTime(600, t);
    bp.frequency.exponentialRampToValueAtTime(2400, t + 0.3);
    const g = AC.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    src.connect(bp); bp.connect(g); g.connect(out); src.start(t);
  },

  shimmer(vel = 0.3, base = 1200) {
    /* a sprinkle of tiny rising sine grains — grace/light appearing */
    if (!AC) return;
    const out = this.out(0.8, 0.6);
    const n = 6 + (Math.random() * 5 | 0);
    for (let i = 0; i < n; i++) {
      const t = AC.currentTime + i * rand(0.03, 0.07);
      const f = base * Math.pow(2, rand(0, 1.6));
      const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = AC.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vel * rand(0.04, 0.1), t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + rand(0.4, 1.1));
      o.connect(g); g.connect(out); o.start(t); o.stop(t + 1.3);
    }
  },

  heartbeatStart(bpm = 52, level = 0.35) {
    if (!AC) return;
    this.heartbeat = {
      t: 0, bpm, level,
      update(dt) {
        this.t -= dt;
        if (this.t <= 0) {
          this.t = 60 / this.bpm;
          thump(this.level); setTimeout(() => thump(this.level * 0.6), 200);
        }
      },
    };
  },
  heartbeatStop() { this.heartbeat = null; },

  motif(opts = {}) {
    /* the "Jezu, ufam Tobie" theme — six tones, rising */
    if (!AC) return;
    const notes = opts.final
      ? [['D4', 0], ['F4', 0.75], ['E4', 1.5], ['G4', 2.25], ['F4', 3.0], ['A4', 3.75], ['D5', 5.0]]
      : [['D4', 0], ['F4', 0.75], ['E4', 1.5], ['G4', 2.25], ['F4', 3.0], ['A4', 3.75]];
    const inst = opts.bell ? (n, v) => this.bell(n, v, 0.8) : (n, v) => this.celesta(n, v);
    notes.forEach(([n, dt], i) => {
      setTimeout(() => inst(n, opts.vel || 0.4), dt * (opts.slow ? 1300 : 900));
    });
  },
};

/* ---------------- helpers ---------------- */

const NOTE_IDX = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
function noteFreq(n) {
  if (typeof n === 'number') return n;
  const m = /^([A-G])([#b]?)(-?\d)$/.exec(n);
  if (!m) return 440;
  let semi = NOTE_IDX[m[1]] + (m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0);
  return 440 * Math.pow(2, (semi - 9) / 12 + (parseInt(m[3]) - 4));
}

let _noiseBuf = null;
function noiseBuffer() {
  if (_noiseBuf) return _noiseBuf;
  const sr = AC.sampleRate, len = sr * 2;
  _noiseBuf = AC.createBuffer(1, len, sr);
  const d = _noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return _noiseBuf;
}
function noiseBurst(dur) {
  /* caller must start(t); stop is scheduled on first start via the wrapper */
  const src = AC.createBufferSource();
  src.buffer = noiseBuffer(); src.loop = true;
  const dur_ = dur;
  const origStart = src.start.bind(src);
  src.start = t => { origStart(t); src.stop((t || AC.currentTime) + dur_ + 0.15); };
  return src;
}
function blip(out, freq, vel, dur, type = 'sine') {
  const t = AC.currentTime;
  let src, g = AC.createGain();
  if (type === 'noise') {
    src = noiseBurst(dur + 0.05);
    const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 1;
    src.connect(bp); bp.connect(g);
  } else {
    src = AC.createOscillator(); src.type = type; src.frequency.value = freq;
    src.connect(g);
  }
  g.gain.setValueAtTime(vel, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  g.connect(out);
  src.start(t);
  if (type !== 'noise') src.stop(t + dur + 0.05);
}
function thump(level) {
  if (!AC) return;
  const t = AC.currentTime, out = Audio.out(0.9, 0.05);
  const o = AC.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(58, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.12);
  const g = AC.createGain();
  g.gain.setValueAtTime(level, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
  o.connect(g); g.connect(out); o.start(t); o.stop(t + 0.2);
}

/* continuous filtered-noise channel (wind / rain / breath / brush) */
function makeNoiseChannel(type, freq, q, maxGain) {
  const src = AC.createBufferSource();
  src.buffer = noiseBuffer(); src.loop = true;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq; f.Q.value = q;
  const g = AC.createGain(); g.gain.value = 0;
  const out = Audio.out(1, 0.18);
  src.connect(f); f.connect(g); g.connect(out); src.start();
  return {
    filter: f, gain: g, max: maxGain,
    set(level, fq, time = 0.4) {
      g.gain.setTargetAtTime(clamp01(level) * maxGain, AC.currentTime, time);
      if (fq) f.frequency.setTargetAtTime(fq, AC.currentTime, time);
    },
  };
}

/* vinyl hiss + pops, for the gramophone */
class Vinyl {
  constructor() {
    const sr = AC.sampleRate, len = (sr * 3) | 0;
    const buf = AC.createBuffer(1, len, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.012;                 // hiss
      if (Math.random() < 0.00015) {                          // pops
        const a = rand(0.25, 0.8);
        for (let j = 0; j < 90 && i + j < len; j++) d[i + j] += a * (1 - j / 90) * (Math.random() * 2 - 1);
      }
    }
    this.src = AC.createBufferSource(); this.src.buffer = buf; this.src.loop = true;
    this.gain = AC.createGain();
    this.gain.gain.value = 0;
    this.src.connect(this.gain); this.gain.connect(Audio.comp);
    this.src.start();
  }
  set(level) { this.gain.gain.setTargetAtTime(level, AC.currentTime, 0.5); }
}

/* slow hymn pad — chords crossfade; filter breathes */
class Pad {
  constructor() {
    this.voices = []; this.level = 0; this.targetLevel = 0;
    this.bus = AC.createGain(); this.bus.gain.value = 0;
    const wet = AC.createGain(); wet.gain.value = 0.45;
    this.bus.connect(Audio.comp); this.bus.connect(wet); wet.connect(Audio.reverb);
    this.lfoT = 0;
    this.progression = null; this.progT = 0; this.progI = 0; this.holdBeats = 11;
    this.bright = 900;
  }
  set(chords, opts = {}) {
    /* chords: array of note arrays. null to fade out. */
    this.progression = chords; this.progI = 0; this.progT = 0;
    this.targetLevel = opts.level !== undefined ? opts.level : 0.5;
    this.holdBeats = opts.hold || 11;
    this.bright = opts.bright || 900;
    if (chords) this._chord(chords[0]);
    else for (const v of this.voices) this._releaseVoice(v);
  }
  _chord(notes) {
    const t = AC.currentTime;
    for (const v of this.voices) this._releaseVoice(v);
    const voice = { oscs: [], gain: AC.createGain(), filter: AC.createBiquadFilter() };
    voice.filter.type = 'lowpass'; voice.filter.frequency.value = this.bright; voice.filter.Q.value = 0.4;
    voice.gain.gain.setValueAtTime(0, t);
    voice.gain.gain.linearRampToValueAtTime(0.16, t + 3.2);
    voice.filter.connect(voice.gain); voice.gain.connect(this.bus);
    notes.forEach((n, i) => {
      const f = noteFreq(n);
      for (const det of [-5, 6]) {
        const o = AC.createOscillator(); o.type = 'triangle';
        o.frequency.value = f; o.detune.value = det + rand(-2, 2);
        const g = AC.createGain(); g.gain.value = 1 / (notes.length * 1.6);
        o.connect(g); g.connect(voice.filter); o.start(t);
        voice.oscs.push(o);
      }
      if (i === 0) {       // sub root
        const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f / 2;
        const g = AC.createGain(); g.gain.value = 0.22;
        o.connect(g); g.connect(voice.filter); o.start(t);
        voice.oscs.push(o);
      }
    });
    this.voices.push(voice);
  }
  _releaseVoice(v) {
    if (v.dead) return; v.dead = true;
    const t = AC.currentTime;
    v.gain.gain.cancelScheduledValues(t);
    v.gain.gain.setValueAtTime(v.gain.gain.value, t);
    v.gain.gain.linearRampToValueAtTime(0, t + 3.5);
    for (const o of v.oscs) o.stop(t + 3.7);
    setTimeout(() => { const i = this.voices.indexOf(v); if (i >= 0) this.voices.splice(i, 1); }, 4000);
  }
  update(dt) {
    this.level = damp(this.level, this.targetLevel, 1.2, dt);
    this.bus.gain.value = this.level;
    this.lfoT += dt;
    const f = this.bright * (1 + 0.25 * Math.sin(this.lfoT * 0.45));
    for (const v of this.voices) if (!v.dead) v.filter.frequency.value = f;
    if (this.progression && this.progression.length > 1) {
      this.progT += dt;
      if (this.progT > this.holdBeats) {
        this.progT = 0;
        this.progI = (this.progI + 1) % this.progression.length;
        this._chord(this.progression[this.progI]);
      }
    }
  }
}

/* distant choir — saws through vowel formants, very low in the mix */
class Choir {
  constructor() {
    this.gain = AC.createGain(); this.gain.gain.value = 0;
    const wet = AC.createGain(); wet.gain.value = 0.7;
    this.gain.connect(Audio.comp); this.gain.connect(wet); wet.connect(Audio.reverb);
    this.built = false;
    this.oscs = [];
    this._stopT = null;
  }
  set(level, notes = ['D3', 'A3', 'D4', 'F4']) {
    if (level > 0) {
      clearTimeout(this._stopT);
      if (!this.built) {
        this.built = true;
        for (const n of notes) {
          const f = noteFreq(n);
          const o = AC.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
          const vib = AC.createOscillator(); vib.frequency.value = rand(4.2, 5.2);
          const vibG = AC.createGain(); vibG.gain.value = f * 0.006;
          vib.connect(vibG); vibG.connect(o.frequency); vib.start();
          const f1 = AC.createBiquadFilter(); f1.type = 'bandpass'; f1.frequency.value = 620; f1.Q.value = 1.4;
          const f2 = AC.createBiquadFilter(); f2.type = 'bandpass'; f2.frequency.value = 1080; f2.Q.value = 1.8;
          const g = AC.createGain(); g.gain.value = 0.05;
          o.connect(f1); o.connect(f2); f1.connect(g); f2.connect(g); g.connect(this.gain);
          o.start();
          this.oscs.push(o, vib);
        }
      }
    } else if (this.built) {
      /* fade out, then free the voices */
      clearTimeout(this._stopT);
      this._stopT = setTimeout(() => {
        for (const o of this.oscs) { try { o.stop(); } catch (e) {} }
        this.oscs = []; this.built = false;
      }, 6000);
    }
    this.gain.gain.setTargetAtTime(level * 0.5, AC.currentTime, 2.2);
  }
}

/* the gramophone waltz — Łódź, 1924 */
class Waltz {
  constructor() {
    this.playing = false; this.bpm = 92; this.beat = 0; this.nextT = 0;
    this.warp = 0;            // 0 = bright party, 1 = warped/distant (the vision)
    this.level = 0;
    /* gramophone bus: bandpass + soft clip */
    this.bp = AC.createBiquadFilter(); this.bp.type = 'bandpass'; this.bp.frequency.value = 1000; this.bp.Q.value = 0.55;
    this.shaper = AC.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = i / 128 - 1; curve[i] = Math.tanh(x * 1.8); }
    this.shaper.curve = curve;
    this.gain = AC.createGain(); this.gain.gain.value = 0;
    const wet = AC.createGain(); wet.gain.value = 0.3;
    this.bp.connect(this.shaper); this.shaper.connect(this.gain);
    this.gain.connect(Audio.comp); this.gain.connect(wet); wet.connect(Audio.reverb);

    /* 16 bars: [bar, beatInBar, dur(beats), note] — D minor waltz */
    this.melody = [
      [0, 0, 2, 'D5'], [0, 2, 1, 'F5'], [1, 0, 3, 'A5'],
      [2, 0, 2, 'Bb5'], [2, 2, 1, 'A5'], [3, 0, 3, 'G5'],
      [4, 0, 2, 'C#5'], [4, 2, 1, 'E5'], [5, 0, 2, 'G5'], [5, 2, 1, 'F5'],
      [6, 0, 2, 'F5'], [6, 2, 1, 'E5'], [7, 0, 1.5, 'E5'], [7, 1.5, 1.5, 'C#5'],
      [8, 0, 2, 'D5'], [8, 2, 1, 'F5'], [9, 0, 2, 'A5'], [9, 2, 1, 'C6'],
      [10, 0, 3, 'Bb5'], [11, 0, 2, 'G5'], [11, 2, 1, 'A5'],
      [12, 0, 2, 'F5'], [12, 2, 1, 'D5'], [13, 0, 2, 'E5'], [13, 2, 1, 'C#5'],
      [14, 0, 3, 'D5'], [15, 0, 3, 'A4'],
    ];
    this.harmony = ['Dm', 'Dm', 'Gm', 'Gm', 'A', 'A', 'Dm', 'A', 'Dm', 'F', 'Gm', 'Gm', 'Dm', 'A', 'Dm', 'A'];
    this.chordNotes = { Dm: ['D4', 'F4', 'A4'], Gm: ['G3', 'Bb3', 'D4'], A: ['A3', 'C#4', 'E4'], F: ['F3', 'A3', 'C4'] };
    this.bassNotes = { Dm: 'D2', Gm: 'G2', A: 'A2', F: 'F2' };
  }
  start(level = 0.5) {
    this.playing = true; this.level = level; this.beat = 0;
    this.nextT = AC.currentTime + 0.1;
    this.gain.gain.setTargetAtTime(level, AC.currentTime, 1.5);
    Audio.vinyl.set(0.5);
  }
  stop(fade = 2) {
    this.playing = false;
    this.gain.gain.setTargetAtTime(0, AC.currentTime, fade / 3);
    Audio.vinyl.set(0);
  }
  setWarp(w) { this.warp = clamp01(w); }
  setLevel(l, time = 1) { this.level = l; if (this.playing) this.gain.gain.setTargetAtTime(l, AC.currentTime, time / 3); }
  update() {
    if (!this.playing) return;
    const spb = 60 / (this.bpm * (1 - this.warp * 0.24));      // warp slows the record
    if (this.nextT < AC.currentTime) this.nextT = AC.currentTime;  // never schedule into the past
    while (this.nextT < AC.currentTime + 0.18) {
      this._scheduleBeat(this.beat, this.nextT, spb);
      this.beat++; this.nextT += spb;
    }
    this.bp.frequency.value = 1000 - this.warp * 520;
  }
  _scheduleBeat(beat, t, spb) {
    const bar = ((beat / 3) | 0) % 16, inBar = beat % 3;
    const ch = this.harmony[bar];
    const detune = 1 - this.warp * rand(0.01, 0.05);            // warped pitch droop
    if (inBar === 0) this._tone(noteFreq(this.bassNotes[ch]) * detune, t, spb * 0.92, 'triangle', 0.5);
    else for (const n of this.chordNotes[ch]) this._tone(noteFreq(n) * detune, t, spb * 0.34, 'square', 0.085);
    for (const [b, bb, dur, note] of this.melody) {
      if (b === bar && bb === inBar) this._tone(noteFreq(note) * detune, t, spb * dur * 0.95, 'square', 0.16, true);
    }
  }
  _tone(f, t, dur, type, vel, vib = false) {
    const o = AC.createOscillator(); o.type = type; o.frequency.value = f;
    if (vib) {
      const v = AC.createOscillator(); v.frequency.value = 5.4;
      const vg = AC.createGain(); vg.gain.value = f * 0.004;
      v.connect(vg); vg.connect(o.frequency); v.start(t); v.stop(t + dur + 0.1);
    }
    const g = AC.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.015);
    g.gain.setTargetAtTime(0, t + dur * 0.7, dur * 0.12);
    o.connect(g); g.connect(this.bp);
    o.start(t); o.stop(t + dur + 0.3);
  }
}


/* ============ 03-particles.js ============ */
/* Pooled particles. Two draw passes: normal (snow, ash) and additive (light). */

const MAX_PARTICLES = 900;

const Particles = {
  pool: [],
  active: [],

  spawn(opts) {
    if (this.active.length >= MAX_PARTICLES) return null;
    const p = this.pool.pop() || {};
    p.x = opts.x || 0; p.y = opts.y || 0;
    p.vx = opts.vx || 0; p.vy = opts.vy || 0;
    p.ax = opts.ax || 0; p.ay = opts.ay || 0;
    p.drag = opts.drag !== undefined ? opts.drag : 1;
    p.life = p.maxLife = opts.life || 1;
    p.size = opts.size || 3;
    p.endSize = opts.endSize !== undefined ? opts.endSize : p.size * 0.2;
    p.color = opts.color || '#ffffff';
    p.alpha = opts.alpha !== undefined ? opts.alpha : 1;
    p.additive = !!opts.additive;
    p.glow = !!opts.glow;             // draw using cached glow sprite (soft)
    p.wobble = opts.wobble || 0;      // sideways sine drift
    p.wobbleF = opts.wobbleF || rand(0.5, 1.6);
    p.wobbleT = rand(0, TAU);
    p.fadeIn = opts.fadeIn || 0;
    p.spin = opts.spin || 0;
    p.rot = rand(0, TAU);
    p.shape = opts.shape || 'dot';    // dot | petal | streak
    this.active.push(p);
    return p;
  },

  burst(x, y, n, optsFn) {
    for (let i = 0; i < n; i++) this.spawn(optsFn(i));
  },

  update(dt) {
    const A = this.active;
    for (let i = A.length - 1; i >= 0; i--) {
      const p = A[i];
      p.life -= dt;
      if (p.life <= 0) { this.pool.push(p); A.splice(i, 1); continue; }
      p.vx += p.ax * dt; p.vy += p.ay * dt;
      if (p.drag !== 1) { const d = Math.pow(p.drag, dt * 60); p.vx *= d; p.vy *= d; }
      p.wobbleT += dt * p.wobbleF;
      p.x += (p.vx + Math.sin(p.wobbleT) * p.wobble) * dt;
      p.y += p.vy * dt;
      p.rot += p.spin * dt;
    }
  },

  draw(ctx, additivePass) {
    for (const p of this.active) {
      if (p.additive !== additivePass) continue;
      const t = 1 - p.life / p.maxLife;
      let a = p.alpha * (p.life / p.maxLife);
      if (p.fadeIn > 0) {
        const elapsed = p.maxLife - p.life;
        if (elapsed < p.fadeIn) a = p.alpha * (elapsed / p.fadeIn);
      }
      if (a <= 0.004) continue;
      const size = lerp(p.size, p.endSize, t);
      if (size <= 0.1) continue;
      ctx.globalAlpha = a;
      if (p.glow) {
        R.glow(ctx, p.x, p.y, size, p.color);
      } else if (p.shape === 'streak') {
        ctx.strokeStyle = p.color; ctx.lineWidth = size * 0.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 0.05, p.y - p.vy * 0.05); ctx.stroke();
      } else if (p.shape === 'petal') {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.ellipse(0, 0, size, size * 0.45, 0, 0, TAU); ctx.fill();
        ctx.restore();
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, TAU); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  },

  clear() { for (const p of this.active) this.pool.push(p); this.active.length = 0; },

  /* ------- presets ------- */
  dust(x, y, color = '#ffe9c0') {
    return this.spawn({
      x, y, vx: rand(-6, 6), vy: rand(-14, -4), life: rand(2, 4.5),
      size: rand(1, 2.6), endSize: 0.4, color, alpha: rand(0.18, 0.42),
      additive: true, glow: true, wobble: rand(4, 12), fadeIn: 0.8,
    });
  },
  snow(x, y, w) {
    return this.spawn({
      x: x + rand(-w / 2, w / 2), y, vy: rand(34, 72), vx: rand(-10, 8),
      life: rand(7, 12), size: rand(1.6, 3.4), endSize: 1.4,
      color: '#e6ecf6', alpha: rand(0.4, 0.85), wobble: rand(10, 26), fadeIn: 0.8,
    });
  },
  ember(x, y, color = '#ffc77d') {
    return this.spawn({
      x, y, vx: rand(-10, 10), vy: rand(-46, -22), life: rand(0.7, 1.6),
      size: rand(1.4, 3), endSize: 0.2, color, alpha: rand(0.5, 0.9),
      additive: true, glow: true, wobble: rand(6, 16), drag: 0.985,
    });
  },
  mote(x, y, color = '#fff3d8') {
    /* slow rising light-mote — prayer made visible */
    return this.spawn({
      x, y, vx: rand(-4, 4), vy: rand(-30, -12), life: rand(2.5, 5),
      size: rand(2, 5), endSize: 0.5, color, alpha: rand(0.3, 0.6),
      additive: true, glow: true, wobble: rand(6, 14), fadeIn: 0.6, drag: 0.992,
    });
  },
  spark(x, y, color = '#ffe9b0') {
    return this.spawn({
      x, y, vx: rand(-70, 70), vy: rand(-70, 70), life: rand(0.3, 0.9),
      size: rand(1.5, 3.2), endSize: 0, color, alpha: 0.9,
      additive: true, glow: true, drag: 0.94,
    });
  },
};


/* ============ 04-render.js ============ */
/* View (virtual coordinates, resize) + R (draw helpers: glows, skies, grain,
   vignette, rays, and the parametric silhouette figures that are the game's cast). */

const View = {
  canvas: null, ctx: null,
  dpr: 1, pixW: 0, pixH: 0,
  H: 900, W: 1600,          // world units; H fixed, W follows aspect
  scale: 1,
  left: -800, right: 800, top: 0, bottom: 900,

  init(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    window.addEventListener('resize', () => this.resize());
    this.resize();
  },
  resize() {
    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.pixW = Math.round(innerWidth * this.dpr);
    this.pixH = Math.round(innerHeight * this.dpr);
    this.canvas.width = this.pixW; this.canvas.height = this.pixH;
    /* fit height, but never show less than 1180 world units of width —
       narrow/portrait screens letterbox vertically instead of cropping scenes */
    this.scale = Math.min(this.pixH / this.H, this.pixW / 1180);
    this.W = this.pixW / this.scale;
    R.onResize();
  },
  /* camera transform; cam = {x, y, zoom, shakeX, shakeY} with (x,y) at canvas center */
  apply(cam) {
    const S = this.scale * cam.zoom;
    this.ctx.setTransform(S, 0, 0, S,
      this.pixW / 2 - (cam.x + cam.shakeX) * S,
      this.pixH / 2 - (cam.y + cam.shakeY) * S);
    this.left = cam.x - this.pixW / 2 / S;
    this.right = cam.x + this.pixW / 2 / S;
    this.top = cam.y - this.pixH / 2 / S;
    this.bottom = cam.y + this.pixH / 2 / S;
  },
  toWorld(clientX, clientY) {
    const cam = Engine.cam;
    const S = this.scale * cam.zoom;
    return {
      x: (clientX * this.dpr - (this.pixW / 2 - (cam.x + cam.shakeX) * S)) / S,
      y: (clientY * this.dpr - (this.pixH / 2 - (cam.y + cam.shakeY) * S)) / S,
    };
  },
};

const R = {
  _glowCache: new Map(),
  _gradCache: new Map(),
  _grainTiles: [],
  _vignette: null,

  onResize() { this._vignette = null; },

  /* ---------- cached soft glow disc ---------- */
  glow(ctx, x, y, r, color) {
    let c = this._glowCache.get(color);
    if (!c) {
      c = document.createElement('canvas'); c.width = c.height = 128;
      const g = c.getContext('2d');
      const grad = g.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, color);
      grad.addColorStop(0.28, rgbaFromAny(color, 0.42));
      grad.addColorStop(0.65, rgbaFromAny(color, 0.1));
      grad.addColorStop(1, rgbaFromAny(color, 0));
      g.fillStyle = grad; g.fillRect(0, 0, 128, 128);
      this._glowCache.set(color, c);
    }
    ctx.drawImage(c, x - r, y - r, r * 2, r * 2);
  },

  /* ---------- sky / backdrop gradient (cached per key) ---------- */
  sky(ctx, key, stops, x, y, w, h, horizontal = false) {
    let g = this._gradCache.get(key);
    if (!g) {
      g = horizontal ? ctx.createLinearGradient(x, 0, x + w, 0) : ctx.createLinearGradient(0, y, 0, y + h);
      for (const [p, c] of stops) g.addColorStop(p, c);
      this._gradCache.set(key, g);
    }
    ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
  },

  /* ---------- film grain ---------- */
  initGrain() {
    if (this._grainTiles.length) return;
    for (let i = 0; i < 3; i++) {
      const c = document.createElement('canvas'); c.width = c.height = 192;
      const g = c.getContext('2d');
      const img = g.createImageData(192, 192);
      for (let j = 0; j < img.data.length; j += 4) {
        const v = 100 + Math.random() * 90 | 0;
        img.data[j] = img.data[j + 1] = img.data[j + 2] = v;
        img.data[j + 3] = 255;
      }
      g.putImageData(img, 0, 0);
      this._grainTiles.push(c);
    }
  },
  grain(ctx, amount) {
    if (amount <= 0.001) return;
    this.initGrain();
    const tile = this._grainTiles[(Math.random() * 3) | 0];
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = amount;
    const ox = (Math.random() * 192) | 0, oy = (Math.random() * 192) | 0;
    const size = 192 * Math.max(1, View.dpr);
    for (let x = -ox; x < View.pixW; x += size)
      for (let y = -oy; y < View.pixH; y += size)
        ctx.drawImage(tile, x, y, size, size);
    ctx.restore();
  },

  vignette(ctx, strength = 0.6) {
    if (!this._vignette) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512 * View.pixH / Math.max(View.pixW, 1);
      const g = c.getContext('2d');
      const grad = g.createRadialGradient(c.width / 2, c.height / 2, c.height * 0.36, c.width / 2, c.height / 2, c.height * 0.85);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,1)');
      g.fillStyle = grad; g.fillRect(0, 0, c.width, c.height);
      this._vignette = c;
    }
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalAlpha = strength;
    ctx.drawImage(this._vignette, 0, 0, View.pixW, View.pixH);
    ctx.restore();
  },

  letterbox(ctx, amount) {
    if (amount <= 0.001) return;
    const h = View.pixH * 0.09 * amount;
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, View.pixW, h);
    ctx.fillRect(0, View.pixH - h, View.pixW, h);
    ctx.restore();
  },

  /* ---------- the two rays (the game's leitmotif) ----------
     From a source point: red ray toward viewer-left, pale toward viewer-right.
     intensity 0..1; t animates shimmer. */
  mercyRays(ctx, x, y, intensity, t, opts = {}) {
    if (intensity <= 0.004) return;
    const len = opts.len || 900;
    const baseAngle = opts.angle !== undefined ? opts.angle : Math.PI / 2; // downward
    const spread = opts.spread || 0.34;
    const beams = [
      { off: -spread / 2 - 0.06, color: '#ff4d5e', core: '#ffb3bb' },   // blood
      { off: spread / 2 + 0.06, color: '#dfe9ff', core: '#ffffff' },    // water
    ];
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const b of beams) {
      const ang = baseAngle + b.off;
      const w = (opts.width || 0.17) + Math.sin(t * 0.8 + b.off * 10) * 0.012;
      for (let i = 0; i < 3; i++) {
        const ww = w * (1 + i * 0.85);
        const a = intensity * [0.34, 0.14, 0.06][i] * (1 + 0.12 * Math.sin(t * 1.7 + i * 2 + b.off * 5));
        ctx.globalAlpha = clamp01(a);
        ctx.fillStyle = i === 0 ? b.core : b.color;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(ang - ww) * len, y + Math.sin(ang - ww) * len);
        ctx.lineTo(x + Math.cos(ang + ww) * len, y + Math.sin(ang + ww) * len);
        ctx.closePath(); ctx.fill();
      }
    }
    ctx.globalAlpha = clamp01(intensity * 0.85);
    this.glow(ctx, x, y, 70 + 26 * Math.sin(t * 1.3), '#fff6e8');
    ctx.restore();
  },

  /* ---------- figures (all silhouettes; no faces, ever) ---------- */

  /* a nun in habit. opts: {kneel, bow(0..1), walk(phase), flip, color, veil} */
  nun(ctx, x, y, h, opts = {}) {
    const c = opts.color || '#100c14';
    const bow = opts.bow || 0;
    const kneel = opts.kneel ? 1 : 0;
    const ph = opts.walk || 0;
    const bobY = opts.walk !== undefined ? Math.sin(ph * 2) * h * 0.012 : 0;
    const H = h * (1 - kneel * 0.34);
    const sway = opts.walk !== undefined ? Math.sin(ph) * h * 0.02 : 0;
    ctx.save();
    ctx.translate(x, y + bobY);
    if (opts.flip) ctx.scale(-1, 1);
    ctx.fillStyle = c;
    const headR = H * 0.075;
    const headX = bow * H * 0.13, headY = -H * 0.86 + bow * H * 0.06;
    /* habit: bell silhouette */
    ctx.beginPath();
    ctx.moveTo(-H * 0.17 + sway * 0.4, 0);
    ctx.bezierCurveTo(-H * 0.20 + sway, -H * 0.42, -H * 0.115, -H * 0.62, -H * 0.105 + headX * 0.5, -H * 0.76);
    ctx.lineTo(H * 0.105 + headX * 0.5, -H * 0.76);
    ctx.bezierCurveTo(H * 0.115, -H * 0.62, H * 0.20 + sway, -H * 0.42, H * 0.17 + sway * 0.4, 0);
    ctx.closePath(); ctx.fill();
    /* head */
    ctx.beginPath(); ctx.arc(headX, headY, headR, 0, TAU); ctx.fill();
    /* veil falling behind head to shoulders */
    ctx.beginPath();
    ctx.moveTo(headX - headR * 1.15, headY - headR * 0.4);
    ctx.quadraticCurveTo(headX, headY - headR * 1.75, headX + headR * 1.15, headY - headR * 0.4);
    ctx.quadraticCurveTo(headX + headR * 1.7, headY + headR * 2.6, headX + headR * 1.2, -H * 0.72);
    ctx.lineTo(headX - headR * 1.2, -H * 0.72);
    ctx.quadraticCurveTo(headX - headR * 1.7, headY + headR * 2.6, headX - headR * 1.15, headY - headR * 0.4);
    ctx.closePath(); ctx.fill();
    if (kneel) { /* pooled hem */
      ctx.beginPath(); ctx.ellipse(0, 0, H * 0.26, H * 0.05, 0, 0, TAU); ctx.fill();
    }
    /* pale band of the coif framing the face (tiny accent of light) */
    ctx.fillStyle = opts.coif || 'rgba(228,220,205,0.85)';
    ctx.beginPath();
    ctx.ellipse(headX + headR * 0.32, headY, headR * 0.62, headR * 0.78, 0, -1.2, 1.2);
    ctx.fill();
    ctx.restore();
  },

  /* a child in a shawl, kneeling or standing */
  child(ctx, x, y, h, opts = {}) {
    const c = opts.color || '#15101a';
    const kneel = opts.kneel ? 1 : 0;
    const H = h * (1 - kneel * 0.3);
    ctx.save(); ctx.translate(x, y);
    if (opts.flip) ctx.scale(-1, 1);
    ctx.fillStyle = c;
    const headR = H * 0.105;
    ctx.beginPath();
    ctx.moveTo(-H * 0.2, 0);
    ctx.bezierCurveTo(-H * 0.22, -H * 0.5, -H * 0.12, -H * 0.68, 0, -H * 0.7);
    ctx.bezierCurveTo(H * 0.12, -H * 0.68, H * 0.22, -H * 0.5, H * 0.2, 0);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -H * 0.8, headR, 0, TAU); ctx.fill();
    /* shawl over head */
    ctx.beginPath();
    ctx.moveTo(-headR * 1.3, -H * 0.78);
    ctx.quadraticCurveTo(0, -H * 0.8 - headR * 1.9, headR * 1.3, -H * 0.78);
    ctx.quadraticCurveTo(headR * 1.1, -H * 0.62, 0, -H * 0.6);
    ctx.quadraticCurveTo(-headR * 1.1, -H * 0.62, -headR * 1.3, -H * 0.78);
    ctx.fill();
    if (opts.kneel) { ctx.beginPath(); ctx.ellipse(0, 0, H * 0.24, H * 0.05, 0, 0, TAU); ctx.fill(); }
    ctx.restore();
  },

  /* a young woman in a dress — Helena before the convent.
     opts: {kneel, flip, color, walk(phase)} */
  maiden(ctx, x, y, h, opts = {}) {
    const c = opts.color || '#241420';
    const kneel = opts.kneel ? 1 : 0;
    const H = h * (1 - kneel * 0.32);
    const ph = opts.walk || 0;
    const bobY = opts.walk !== undefined ? Math.sin(ph * 2) * H * 0.012 : 0;
    const sway = opts.walk !== undefined ? Math.sin(ph) * H * 0.025 : 0;
    ctx.save();
    ctx.translate(x, y + bobY);
    if (opts.flip) ctx.scale(-1, 1);
    ctx.fillStyle = c;
    const headR = H * 0.062;
    const headY = -H * 0.875;
    /* skirt: waist flaring to hem */
    ctx.beginPath();
    ctx.moveTo(-H * 0.175 + sway * 0.5, 0);
    ctx.bezierCurveTo(-H * 0.13 + sway, -H * 0.28, -H * 0.055, -H * 0.42, -H * 0.05, -H * 0.5);
    ctx.lineTo(H * 0.05, -H * 0.5);
    ctx.bezierCurveTo(H * 0.055, -H * 0.42, H * 0.13 + sway, -H * 0.28, H * 0.175 + sway * 0.5, 0);
    ctx.closePath(); ctx.fill();
    /* bodice */
    ctx.beginPath();
    ctx.moveTo(-H * 0.055, -H * 0.49);
    ctx.bezierCurveTo(-H * 0.075, -H * 0.62, -H * 0.085, -H * 0.7, -H * 0.07, -H * 0.77);
    ctx.quadraticCurveTo(0, -H * 0.81, H * 0.07, -H * 0.77);
    ctx.bezierCurveTo(H * 0.085, -H * 0.7, H * 0.075, -H * 0.62, H * 0.055, -H * 0.49);
    ctx.closePath(); ctx.fill();
    /* head + low bun */
    ctx.beginPath(); ctx.arc(0, headY, headR, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(-headR * 0.75, headY + headR * 0.42, headR * 0.55, 0, TAU); ctx.fill();
    if (kneel) { ctx.beginPath(); ctx.ellipse(0, 0, H * 0.24, H * 0.05, 0, 0, TAU); ctx.fill(); }
    ctx.restore();
  },

  /* generic cloaked figure (the poor at the gate, passersby) */
  cloaked(ctx, x, y, h, opts = {}) {
    const c = opts.color || '#0e0b11';
    const hunch = opts.hunch || 0;
    ctx.save(); ctx.translate(x, y);
    if (opts.flip) ctx.scale(-1, 1);
    ctx.fillStyle = c;
    const headR = h * 0.08;
    ctx.beginPath();
    ctx.moveTo(-h * 0.16, 0);
    ctx.bezierCurveTo(-h * 0.2, -h * 0.45, -h * 0.1 - hunch * h * 0.06, -h * 0.66, hunch * h * 0.1, -h * 0.78 + hunch * h * 0.1);
    ctx.bezierCurveTo(h * 0.14, -h * 0.7, h * 0.19, -h * 0.4, h * 0.15, 0);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(hunch * h * 0.12, -h * 0.82 + hunch * h * 0.12, headR, 0, TAU); ctx.fill();
    /* hood */
    ctx.beginPath();
    ctx.arc(hunch * h * 0.12, -h * 0.83 + hunch * h * 0.12, headR * 1.35, Math.PI * 0.95, Math.PI * 2.05);
    ctx.fill();
    ctx.restore();
  },

  /* a waltzing couple, abstracted — two leaning silhouettes joined at the base */
  dancers(ctx, x, y, h, phase, opts = {}) {
    const c = opts.color || '#19121f';
    const lean = Math.sin(phase) * 0.16;
    ctx.save(); ctx.translate(x, y); ctx.rotate(lean * 0.4);
    ctx.fillStyle = c;
    for (const s of [-1, 1]) {
      const hh = h * (s === 1 ? 1 : 0.94);
      ctx.save();
      ctx.rotate(s * (0.1 + lean * s * 0.3));
      ctx.beginPath();
      ctx.moveTo(s * -h * 0.02 - h * 0.13, 0);
      ctx.bezierCurveTo(s * h * 0.02 - h * 0.16, -hh * 0.5, s * h * 0.05 - h * 0.07, -hh * 0.72, s * h * 0.06, -hh * 0.78);
      ctx.bezierCurveTo(s * h * 0.06 + h * 0.07, -hh * 0.72, s * h * 0.04 + h * 0.16, -hh * 0.5, s * h * 0.02 + h * 0.13, 0);
      ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.arc(s * h * 0.055, -hh * 0.85, hh * 0.062, 0, TAU); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  },

  /* Christ — only ever light. A luminous vertical presence; never a detailed face.
     opts: {rays(0..1), t, raise(0..1) right hand of blessing, h} */
  lumen(ctx, x, y, h, t, opts = {}) {
    const I = opts.intensity !== undefined ? opts.intensity : 1;
    if (I <= 0.004) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const breathe = 1 + Math.sin(t * 0.7) * 0.03;
    /* aura columns — soft, never clipping to solid white */
    ctx.globalAlpha = I * 0.34;
    this.glow(ctx, x, y - h * 0.48, h * 0.9 * breathe, 'rgba(255,243,222,0.5)');
    ctx.globalAlpha = I * 0.4;
    this.glow(ctx, x, y - h * 0.6, h * 0.42 * breathe, 'rgba(255,250,238,0.6)');
    /* body of light: a veiled robe, brightest at the shoulders, dissolving down */
    ctx.globalAlpha = I * 0.6;
    const grd = ctx.createLinearGradient(0, y - h, 0, y);
    grd.addColorStop(0, 'rgba(255,251,240,0.6)');
    grd.addColorStop(0.35, 'rgba(255,246,226,0.42)');
    grd.addColorStop(0.8, 'rgba(255,238,205,0.12)');
    grd.addColorStop(1, 'rgba(255,236,200,0.0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(x - h * 0.115, y);
    ctx.bezierCurveTo(x - h * 0.14, y - h * 0.5, x - h * 0.085, y - h * 0.72, x - h * 0.07, y - h * 0.8);
    ctx.quadraticCurveTo(x, y - h * 0.855, x + h * 0.07, y - h * 0.8);
    ctx.bezierCurveTo(x + h * 0.085, y - h * 0.72, x + h * 0.14, y - h * 0.5, x + h * 0.115, y);
    ctx.closePath(); ctx.fill();
    /* sleeves: two faint falling folds */
    ctx.globalAlpha = I * 0.22;
    ctx.beginPath();
    ctx.moveTo(x - h * 0.07, y - h * 0.72);
    ctx.quadraticCurveTo(x - h * 0.19, y - h * 0.52, x - h * 0.165, y - h * 0.34);
    ctx.lineTo(x - h * 0.1, y - h * 0.42);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + h * 0.07, y - h * 0.72);
    ctx.quadraticCurveTo(x + h * 0.16, y - h * 0.56, x + h * 0.12, y - h * 0.44);
    ctx.lineTo(x + h * 0.075, y - h * 0.52);
    ctx.closePath(); ctx.fill();
    /* head of light, distinct above the shoulders */
    ctx.globalAlpha = I * 0.85;
    this.glow(ctx, x, y - h * 0.9, h * 0.1, '#fffdf6');
    ctx.globalAlpha = I * 0.3;
    this.glow(ctx, x, y - h * 0.9, h * 0.2, 'rgba(255,242,210,0.6)');
    /* raised right hand (viewer-left) — a small star of light */
    const raise = opts.raise !== undefined ? opts.raise : 1;
    if (raise > 0.01) {
      ctx.globalAlpha = I * raise;
      this.glow(ctx, x - h * 0.17, y - h * 0.62 - raise * h * 0.1, h * 0.075, '#fff9ec');
    }
    /* left hand at the heart */
    ctx.globalAlpha = I * 0.9;
    this.glow(ctx, x + h * 0.045, y - h * 0.52, h * 0.06, '#fff3da');
    ctx.restore();
    /* the rays from the heart */
    if (opts.rays > 0.004) {
      this.mercyRays(ctx, x + h * 0.01, y - h * 0.5, opts.rays * I, t, {
        len: opts.rayLen || h * 1.9, angle: Math.PI / 2, spread: 0.5, width: 0.14,
      });
    }
  },

  /* candle with live flame. lit 0..1, t for flicker */
  candle(ctx, x, y, s, t, lit = 1, opts = {}) {
    ctx.save();
    /* stick */
    ctx.fillStyle = opts.wax || '#d8cdb4';
    ctx.fillRect(x - s * 0.07, y - s * 0.5, s * 0.14, s * 0.5);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x + s * 0.02, y - s * 0.5, s * 0.05, s * 0.5);
    if (lit > 0.01) {
      const fl = wobble(t * 7) * 0.5 + wobble(t * 23, 2, 5, 9) * 0.5;
      const fh = s * (0.30 + 0.06 * fl) * (0.35 + lit * 0.65);
      const fx = x + fl * s * 0.03;
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = lit * 0.85;
      this.glow(ctx, fx, y - s * 0.56 - fh * 0.4, s * (1.5 + 0.25 * fl) * lit, 'rgba(255,196,110,0.6)');
      /* flame teardrop */
      ctx.globalAlpha = Math.min(1, lit * 1.2);
      const g = ctx.createLinearGradient(0, y - s * 0.52 - fh, 0, y - s * 0.5);
      g.addColorStop(0, '#fff8e0'); g.addColorStop(0.45, '#ffd27a'); g.addColorStop(1, 'rgba(255,140,40,0.0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(fx, y - s * 0.52 - fh);
      ctx.bezierCurveTo(fx + fh * 0.34, y - s * 0.5 - fh * 0.45, fx + fh * 0.22, y - s * 0.5, fx, y - s * 0.49);
      ctx.bezierCurveTo(fx - fh * 0.22, y - s * 0.5, fx - fh * 0.34, y - s * 0.5 - fh * 0.45, fx, y - s * 0.52 - fh);
      ctx.fill();
      ctx.globalAlpha = lit;
      this.glow(ctx, fx, y - s * 0.55 - fh * 0.55, fh * 0.30, '#fffdf2');
    }
    ctx.restore();
  },

  /* bare winter tree, deterministic per seed, cached */
  _treeCache: new Map(),
  tree(ctx, x, y, h, seed, color = '#0a070c') {
    const key = seed + '_' + color;
    let c = this._treeCache.get(key);
    if (!c) {
      c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const g = c.getContext('2d');
      g.strokeStyle = color; g.lineCap = 'round';
      srand(seed);
      const branch = (bx, by, ang, len, w, depth) => {
        if (depth <= 0 || len < 4) return;
        const ex = bx + Math.cos(ang) * len, ey = by + Math.sin(ang) * len;
        g.lineWidth = w;
        g.beginPath(); g.moveTo(bx, by); g.lineTo(ex, ey); g.stroke();
        const n = 2 + (rng() * 2 | 0);
        for (let i = 0; i < n; i++) {
          branch(ex, ey, ang + (rng() - 0.5) * 1.5, len * (0.6 + rng() * 0.18), w * 0.6, depth - 1);
        }
      };
      branch(128, 256, -Math.PI / 2 + (rng() - 0.5) * 0.2, 70, 9, 6);
      this._treeCache.set(key, c);
    }
    ctx.drawImage(c, x - h / 2, y - h, h, h);
  },

  /* low rolling hill silhouette */
  hills(ctx, baseY, amp, color, seed, t = 0, drift = 0) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(View.left - 50, View.bottom + 50);
    ctx.lineTo(View.left - 50, baseY);
    const w = View.right - View.left + 100;
    for (let i = 0; i <= 24; i++) {
      const px = View.left - 50 + (i / 24) * w;
      srand(seed + i * 7 + Math.floor(drift));
      const py = baseY - Math.abs(wobble((i + drift) * 0.9 + seed)) * amp;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(View.right + 50, View.bottom + 50);
    ctx.closePath(); ctx.fill();
  },

  stars(ctx, t, alpha = 1, seed = 7) {
    srand(seed);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 90; i++) {
      const x = View.left + rng() * (View.right - View.left);
      const y = View.top + rng() * View.H * 0.55;
      const tw = 0.5 + 0.5 * Math.sin(t * (0.4 + rng() * 1.2) + rng() * TAU);
      ctx.globalAlpha = alpha * (0.12 + 0.5 * rng()) * tw;
      const r = 0.8 + rng() * 1.6;
      ctx.fillStyle = '#e8edff';
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
    }
    ctx.restore();
  },
};

function rgbaFromAny(color, a) {
  if (color.startsWith('#')) return rgba(color, a);
  const m = /rgba?\(([\d.]+),([\d.]+),([\d.]+)/.exec(color.replace(/\s/g, ''));
  if (m) return `rgba(${m[1]},${m[2]},${m[3]},${a})`;
  return color;
}


/* ============ 05-text.js ============ */
/* DOM overlay: narrative lines, title cards, hints, choices, menu, keepsake.
   Canvas paints the world; the DOM speaks. */

const UI = {
  els: {},
  init() {
    for (const id of ['textbox', 'advance', 'hint', 'titlecard', 'choices', 'menu', 'menubtn', 'keepsake', 'flash-note'])
      this.els[id] = document.getElementById(id);
    this.els.menubtn.addEventListener('click', e => { e.stopPropagation(); Menu.toggle(); });
    this.els.menubtn.addEventListener('pointerdown', e => e.stopPropagation());
    Menu.build();
  },
  flashNote(msg) {
    const el = this.els['flash-note'];
    el.textContent = msg;
    el.classList.add('on');
    clearTimeout(this._fn);
    this._fn = setTimeout(() => el.classList.remove('on'), 1600);
  },
  showMenuBtn(v) { this.els.menubtn.classList.toggle('visible', v); },
};

/* ---------------- narrative text ---------------- */
const Text = {
  el: null, showing: false, blocking: false, dwell: 0, minDwell: 0.7,
  autoLeft: 0, _resolve: null,

  /* show(str, opts) -> awaitable for the script runner
     opts: quote (italic + attribution), attr ("Diary, 47"), voice (His words),
           auto (seconds, auto-advance), passthrough (don't consume presses),
           small, hold (min seconds before advance allowed) */
  show(str, opts = {}) {
    this.clear(true);
    const div = document.createElement('div');
    div.className = 'line' + (opts.voice ? ' voice' : opts.quote ? ' quote' : '') + (opts.small ? ' small' : '');
    div.innerHTML = esc(str) + (opts.attr ? `<span class="attr">— ${esc(opts.attr)}</span>` : '');
    UI.els.textbox.appendChild(div);
    requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('on')));
    this.el = div;
    this.showing = true;
    this.blocking = !opts.passthrough;
    this.dwell = 0;
    /* a line can't be dismissed before it could plausibly be read — the
       interact press and the advance press are the same input, so rhythm
       presses from a scene must land inside this window and be consumed */
    const read = Math.min(3.2, 0.6 + str.split(/\s+/).filter(Boolean).length * 0.12);
    this.minDwell = Math.max(opts.hold || 0, opts.voice ? 1.2 : 0.7, read);
    this.autoLeft = opts.auto || 0;
    const self = this;
    /* per-line awaitable: resolves when THIS line is gone (replaced or dismissed) */
    return { done: () => self.el !== div };
  },

  update(dt) {
    if (!this.showing) { UI.els.advance.classList.remove('on'); return; }
    this.dwell += dt;
    if (this.autoLeft > 0) {
      if (this.dwell >= this.autoLeft) this.dismiss();
      UI.els.advance.classList.remove('on');
    } else {
      /* the cue and the permission coincide: pressing only ever skips
         when the dot says it will */
      UI.els.advance.classList.toggle('on', this.blocking && this.dwell > this.minDwell);
    }
  },

  /* user pressed while a blocking line shows */
  advance() {
    if (!this.showing || !this.blocking) return false;
    if (this.dwell < this.minDwell) {                  // consume press, not ready
      const a = UI.els.advance;
      a.classList.add('soon');
      clearTimeout(this._soonT);
      this._soonT = setTimeout(() => a.classList.remove('soon'), 500);
      return true;
    }
    this.dismiss();
    return true;
  },

  dismiss() {
    if (!this.showing) return;
    this.showing = false;
    const el = this.el;
    if (el) {
      el.classList.remove('on'); el.classList.add('off');
      setTimeout(() => el.remove(), 700);
    }
    this.el = null;
    UI.els.advance.classList.remove('on', 'soon');
  },

  clear(immediate) {
    this.showing = false;
    UI.els.advance.classList.remove('on', 'soon');
    if (this.el) {
      const el = this.el;
      if (immediate) el.remove();
      else { el.classList.remove('on'); el.classList.add('off'); setTimeout(() => el.remove(), 700); }
      this.el = null;
    }
  },
};
