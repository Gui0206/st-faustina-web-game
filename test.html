  'The superior, Mother Michael, studied the small girl in the worn dress.':
    'A superiora, Madre Michael, examinou a pequena moça de vestido gasto.',
  '“Go and ask the Lord of the house whether He will accept you.”':
    '“Vá perguntar ao Senhor da casa se Ele a aceita.”',
  'hold — and ask': 'segure — e pergunte',
  'I do accept; you are in My Heart.': 'Eu te aceito, tu estás no Meu Coração.',
  'Accepted — on one condition. She must earn the clothes she would renounce.':
    'Aceita — com uma condição. Precisaria pagar o enxoval das vestes que iria renunciar.',
  'A year in service at Ostrówek: other people’s laundry, other people’s children, coin by coin.':
    'Um ano de serviço em Ostrówek: roupa dos outros, filhos dos outros, moeda por moeda.',
  'On the first of August, 1925, the door on Żytnia Street opened to her.':
    'No primeiro de agosto de 1925, a porta da rua Żytnia se abriu para ela.',
  'walk in': 'entre',

  /* ---- ch4 ---- */
  'She received the habit, and with it a new name: Sister Maria Faustyna of the Blessed Sacrament.':
    'Recebeu o hábito e, com ele, um nome novo: Irmã Maria Faustina do Santíssimo Sacramento.',
  'She had hoped, perhaps, for ecstasies. She was given the kitchen.':
    'Ela esperava, talvez, êxtases. Deram-lhe a cozinha.',
  'hold and move gently — hurry earns nothing': 'segure e mova com suavidade — a pressa não rende nada',
  'Great love can change small things into great ones, and it is only love which lends value to our actions.':
    'Um grande amor consegue transformar coisas pequenas em coisas grandes, e só ele dá valor às nossas ações.',
  'One evening the great pot was too heavy for her strength, and she was ashamed to ask.':
    'Uma noite, o grande caldeirão pesava mais que as suas forças, e ela teve vergonha de pedir ajuda.',
  'Out of obedience, she tried again —': 'Por obediência, tentou de novo —',
  '— and the lifted lid breathed out roses.': '— e a tampa erguida exalou rosas.',
  'Nothing done for love is small. The years passed this way: Warsaw, Płock, the gardens, the gate.':
    'Nada feito por amor é pequeno. Os anos passaram assim: Varsóvia, Płock, os jardins, o portão.',

  /* ---- ch5 ---- */
  'Płock. The evening of the 22nd of February, 1931. She was alone in her cell.':
    'Płock. A noite de 22 de fevereiro de 1931. Ela estava sozinha em sua cela.',
  'In the evening, when I was in my cell, I saw the Lord Jesus clothed in a white garment.':
    'À noite, quando estava na minha cela, vi o Senhor Jesus vestido com uma túnica branca.',
  'Paint an image according to the pattern you see, with the signature: Jesus, I trust in You.':
    'Pinta uma Imagem de acordo com o modelo que estás vendo, com a inscrição: Jesus, eu confio em Vós.',
  'I promise that the soul that will venerate this image will not perish.':
    'Prometo que a alma que venerar esta Imagem não perecerá.',
  'She was twenty-five — a convent cook who had never once held a brush.':
    'Ela tinha vinte e cinco anos — uma cozinheira de convento que jamais segurara um pincel.',
  'For three years the command followed her. Confessors shrugged. Superiors frowned.':
    'Por três anos a ordem a seguiu. Confessores davam de ombros. Superioras franziam o cenho.',
  'Then, in Vilnius, one priest believed her: Father Michał Sopoćko. He hired a painter, Eugeniusz Kazimirowski, and every week Sister Faustina came to correct the work.':
    'Então, em Vilnius, um sacerdote acreditou nela: o Padre Michał Sopoćko. Ele contratou um pintor, Eugeniusz Kazimirowski, e toda semana a Irmã Faustina vinha corrigir o trabalho.',
  'Vilnius, 1934. The painter waits. Show him what you saw.':
    'Vilnius, 1934. O pintor espera. Mostre a ele o que você viu.',
  'paint Him — slow, broad strokes of light': 'pinte-O — pinceladas de luz, lentas e largas',
  'the right hand, raised in blessing': 'a mão direita, erguida em bênção',
  'from the heart — draw the red ray, downward': 'do coração — trace o raio vermelho, para baixo',
  'and the pale ray, beside it': 'e o raio pálido, ao lado',
  'sign it — trace the words, left to right': 'assine — trace as palavras, da esquerda para a direita',
  'The pale ray stands for the Water which makes souls righteous. The red ray stands for the Blood which is the life of souls. — Diary, 299':
    'O raio pálido significa a Água que justifica as almas; o raio vermelho significa o Sangue, que é a vida das almas. — Diário, 299',
  'It was finished. And Sister Faustina wept.': 'Estava terminada. E a Irmã Faustina chorou.',
  '“Who will paint You as beautiful as You are?”': '“Quem Vos pintará tão belo como sois?”',
  'Not in the beauty of the color, nor of the brush, lies the greatness of this image, but in My grace.':
    'Não está a grandeza desta imagem na beleza das cores nem do pincel, mas na Minha graça.',
  'Whatever your hand just made — it was enough. It was never about the brush.':
    'O que a sua mão acabou de fazer — foi suficiente. Nunca foi sobre o pincel.',
  'In April 1935 the image was hung high in the Gate of Dawn, and a city looked up at it.':
    'Em abril de 1935 a imagem foi pendurada no alto da Porta da Aurora, e uma cidade ergueu os olhos para ela.',

  /* ---- ch6 ---- */
  'Vilnius. In September of 1935, she saw in the sky an angel — the executor of God’s wrath, sent to strike the earth.':
    'Vilnius. Em setembro de 1935, ela viu no céu um anjo — o executor da ira de Deus, enviado para ferir a terra.',
  'She began to plead for the world — and heard, rising within her, words she had never learned.':
    'Começou a suplicar pelo mundo — e ouviu, subindo dentro dela, palavras que nunca aprendera.',
  'press with the slow ring — begin': 'pressione com o anel lento — comece',
  'Eternal Father, I offer You the Body and Blood, Soul and Divinity of Your dearly beloved Son, Our Lord Jesus Christ, in atonement for our sins and those of the whole world.':
    'Eterno Pai, eu Vos ofereço o Corpo e o Sangue, a Alma e a Divindade do Vosso diletíssimo Filho, Nosso Senhor Jesus Cristo, em expiação dos nossos pecados e dos do mundo inteiro.',
  'each small bead — with the ring': 'cada conta pequena — com o anel',
  'Ten times on the small beads: For the sake of His sorrowful Passion, have mercy on us and on the whole world.':
    'Dez vezes nas contas pequenas: Pela Sua dolorosa Paixão, tende misericórdia de nós e do mundo inteiro.',
  'And again. And again — five decades, fifty pleas, on ordinary rosary beads.':
    'E de novo. E de novo — cinco dezenas, cinquenta súplicas, em contas comuns de rosário.',
  'hold — and pray on': 'segure — e continue a rezar',
  'three times — Holy God': 'três vezes — Deus Santo',
  'The arm did not fall. Before those words, the angel stood helpless — and the storm knelt.':
    'O braço não caiu. Diante daquelas palavras, o anjo ficou impotente — e a tempestade se ajoelhou.',
  'Whoever will recite it will receive great mercy at the hour of death.':
    'Todo aquele que o recitar alcançará grande misericórdia na hora da morte.',
  'She wrote the words down. The world still prays them every day, at three o’clock, on ordinary beads.':
    'Ela escreveu as palavras. O mundo ainda as reza todos os dias, às três horas, em contas comuns.',
  'for the sake of His sorrowful Passion, have mercy on us and on the whole world':
    'pela Sua dolorosa Paixão, tende misericórdia de nós e do mundo inteiro',
  'Holy God…': 'Deus Santo…',
  'Holy Mighty One…': 'Deus Forte…',
  'Holy Immortal One…': 'Deus Imortal…',

  /* ---- ch7 ---- */
  'Kraków. Hard years. The convent made her portress — keeper of the gate.':
    'Cracóvia. Anos difíceis. O convento a fez porteira — guardiã do portão.',
  'The poor of the city learned which gate gave soup, and the line learned her name.':
    'Os pobres da cidade aprenderam qual portão dava sopa, e a fila aprendeu o nome dela.',
  'a mother, a child asleep on her shoulder': 'uma mãe, com uma criança adormecida no ombro',
  '“Bread, sister. Not for me.”': '“Pão, irmã. Não é para mim.”',
  'The loaf passed through the bars. The child did not wake — but the mother closed her eyes.':
    'O pão passou pelas grades. A criança não acordou — mas a mãe fechou os olhos.',
  '“They are beautiful, your little one.” The woman looked up as if no one had spoken to her in weeks.':
    '“É lindo, o seu pequeno.” A mulher ergueu o olhar como se ninguém lhe falasse havia semanas.',
  'She prayed in silence. The woman left no lighter — but not alone.':
    'Ela rezou em silêncio. A mulher partiu sem peso a menos — mas não sozinha.',
  'an old man, coat thin as paper': 'um velho, de casaco fino como papel',
  '“Only to stand out of the rain a moment.”': '“Só para ficar um momento fora da chuva.”',
  'Bread, and the dry corner of the gateway. He ate slowly, saving half.':
    'Pão, e o canto seco do portal. Ele comeu devagar, guardando metade.',
  'They spoke of the harvests before the war. For a moment he was forty years younger.':
    'Falaram das colheitas de antes da guerra. Por um momento ele ficou quarenta anos mais jovem.',
  'She held him in her prayer. He straightened a little, as if the coat had thickened.':
    'Ela o sustentou em sua oração. Ele se aprumou um pouco, como se o casaco tivesse engrossado.',
  'a young man with hard eyes': 'um rapaz de olhos duros',
  '“God has forgotten this city. Don’t waste your bread on me.”':
    '“Deus esqueceu esta cidade. Não desperdice seu pão comigo.”',
  'He took the loaf like an accusation. At the corner, he looked back once.':
    'Ele pegou o pão como uma acusação. Na esquina, olhou para trás uma vez.',
  '“He has not forgotten you. I know it the way I know it is raining.” He had no answer for that.':
    '“Ele não esqueceu você. Sei disso como sei que está chovendo.” Para isso ele não tinha resposta.',
  'No words would land. She prayed instead — the long way around a locked door.':
    'Nenhuma palavra alcançava. Ela rezou em vez disso — o caminho longo ao redor de uma porta trancada.',
  'a widow who says nothing at all': 'uma viúva que não diz nada',
  'Bread, wrapped in cloth, pressed into silent hands.':
    'Pão, enrolado em pano, posto em mãos silenciosas.',
  'No answer came. Some griefs only want company; she stood with her in the rain.':
    'Nenhuma resposta veio. Algumas dores só querem companhia; ela ficou com ela na chuva.',
  'For the silent, silence that listens upward. The widow lifted her face into the rain like a blessing.':
    'Para os calados, um silêncio que escuta para o alto. A viúva ergueu o rosto à chuva como a uma bênção.',
  'Toward evening, when the pots were nearly empty, one more figure came through the rain.':
    'Ao entardecer, quando as panelas já estavam quase vazias, mais um vulto veio pela chuva.',
  'a young man — barefoot, bareheaded, his clothes frozen to him':
    'um jovem — descalço, de cabeça descoberta, as roupas congeladas no corpo',
  '“Something hot, if you can.”': '“Algo quente, se puder.”',
  'There was bread in the basket still. She gave him all of it — and went to the kitchen besides, and brought him soup, full of crumbs.':
    'Ainda havia pão na cesta. Ela lhe deu tudo — e ainda foi à cozinha e trouxe-lhe sopa, cheia de migalhas.',
  'There was no bread left to weigh, no choice to make. She went to the kitchen and brought him soup, full of crumbs.':
    'Não havia mais pão para pesar, nem escolha a fazer. Ela foi à cozinha e trouxe-lhe sopa, cheia de migalhas.',
  'He ate. And as she took back the bowl, the rain forgot to fall.':
    'Ele comeu. E quando ela recolheu a tigela, a chuva esqueceu de cair.',
  'My daughter, the blessings of the poor who bless Me as they leave this gate have reached My ears. And this is why I came down from My throne — to taste the fruits of your mercy.':
    'Minha filha, chegaram aos Meus ouvidos as bênçãos dos pobres que, afastando-se desta porta, Me bendizem. E por isso desci do trono — para saborear o fruto da tua misericórdia.',
  'I am giving you three ways of exercising mercy toward your neighbor: the first — by deed, the second — by word, the third — by prayer.':
    'Eu te indico três maneiras de praticar a misericórdia para com o próximo: a primeira — é a ação; a segunda — a palavra; e a terceira — a oração.',
  'Help me, O Lord, that my eyes may be merciful, so that I may never suspect or judge from appearances, but look for what is beautiful in my neighbors’ souls.':
    'Ajuda-me, ó Senhor, que os meus olhos sejam misericordiosos, para que eu jamais suspeite ou julgue segundo as aparências, mas procure o que é belo na alma do meu próximo.',
  'Deed': 'Ação',
  'Word': 'Palavra',
  'Prayer': 'Oração',
  'give bread — {n} left': 'dar pão — restam {n}',
  'no bread left': 'não resta pão',
  'stay, and speak': 'ficar, e falar',
  'hold a moment': 'segurar um momento',
  'the young man': 'o jovem',

  /* ---- ch8 ---- */
  'The tuberculosis reached her lungs, then everything else. They sent her to the sanatorium at Prądnik.':
    'A tuberculose alcançou seus pulmões, depois todo o resto. Mandaram-na para o sanatório de Prądnik.',
  'And there, the visions stopped. The voice stopped. Heaven went dark and silent as this garden.':
    'E ali, as visões cessaram. A voz cessou. O Céu ficou escuro e silencioso como este jardim.',
  'hold —': 'segure —',
  '…nothing answers. keep walking.': '…nada responde. continue andando.',
  'She kept a dry record of those weeks. No comfort in it — only this:':
    'Ela manteve um registro seco daquelas semanas. Nenhum consolo nele — apenas isto:',
  'Suffering is a great grace; through suffering the soul becomes like the Savior; in suffering love becomes crystallized.':
    'O sofrimento é uma grande graça; através do sofrimento a alma torna-se semelhante ao Salvador; no sofrimento o amor se cristaliza.',
  'As often as you hear the clock strike the third hour, immerse yourself completely in My mercy, adoring and glorifying it.':
    'Todas as vezes que ouvires o bater do relógio às três horas, mergulha toda na Minha misericórdia, adorando-A e glorificando-A.',
  'In this hour, I will refuse nothing to the soul that makes a request of Me in virtue of My Passion.':
    'Nessa hora nada negarei à alma que Me pedir pela Minha Paixão.',
  'The flame had not answered her holding. It returned anyway — not earned. Given.':
    'A chama não respondera ao seu segurar. Voltou assim mesmo — não conquistada. Dada.',
  'The graces of My mercy are drawn by means of one vessel only, and that is — trust. The more a soul trusts, the more it will receive.':
    'As graças da Minha misericórdia colhem-se com um único vaso — que é a confiança. Quanto mais a alma confiar, tanto mais receberá.',
  'where is He now?': 'onde está Ele agora?',
  'you imagined all of it': 'você imaginou tudo isso',
  'a cook — a prophet?': 'uma cozinheira — profetisa?',
  'no one believes you': 'ninguém acredita em você',
  'the night has no far side': 'a noite não tem outra margem',
  'He has gone quiet, hasn’t He': 'Ele se calou, não foi',

  /* ---- ch9 ---- */
  'Kraków-Łagiewniki. The night of the fifth of October, 1938.':
    'Cracóvia-Łagiewniki. A noite de cinco de outubro de 1938.',
  'She was thirty-three — the age of her Lord.':
    'Ela tinha trinta e três anos — a idade do seu Senhor.',
  'breathe with her — hold… and release': 'respire com ela — segure… e solte',
  'The sisters knelt at the bed. The candle kept its small vigil.':
    'As irmãs se ajoelharam junto à cama. A vela mantinha sua pequena vigília.',
  'You are the secretary of My mercy; I have chosen you for that office in this life and the next life.':
    'És a secretária da Minha misericórdia; Eu te escolhi para essa função nesta e na outra vida.',
  '— let go': '— solte',

  /* ---- epilogue ---- */
  'She was buried in the convent garden at Łagiewniki.':
    'Foi sepultada no jardim do convento em Łagiewniki.',
  '1939. A year later, the darkness she had been shown swept out of the same sky.':
    '1939. Um ano depois, a escuridão que lhe fora mostrada varreu o mesmo céu.',
  'But in hidden chapels, the Image was copied, and copied again.':
    'Mas em capelas escondidas, a Imagem foi copiada, e copiada de novo.',
  '1959. Rome — misled by a faulty translation of her Diary — silenced the devotion.':
    '1959. Roma — induzida ao erro por uma tradução defeituosa do seu Diário — silenciou a devoção.',
  'The archbishop of Kraków would not let her rest in obscurity: Karol Wojtyła.':
    'O arcebispo de Cracóvia não a deixaria repousar na obscuridade: Karol Wojtyła.',
  '1978. The ban was lifted. Six months later the world learned the archbishop’s new name — John Paul II.':
    '1978. A proibição foi retirada. Seis meses depois o mundo aprendeu o novo nome do arcebispo — João Paulo II.',
  '30 April 2000. Helena Kowalska — Sister Faustina — was declared a saint: the first of the Great Jubilee.':
    '30 de abril de 2000. Helena Kowalska — Irmã Faustina — foi declarada santa: a primeira do Grande Jubileu.',
  'And the Church received a new feast: the Second Sunday of Easter — Divine Mercy Sunday.':
    'E a Igreja recebeu uma nova festa: o segundo domingo da Páscoa — o Domingo da Divina Misericórdia.',
  'Somewhere on earth, it is always three o’clock.':
    'Em algum lugar da terra, são sempre três horas.',
  'And the image you painted in Vilnius —': 'E a imagem que você pintou em Vilnius —',
  'Jezu, ufam Tobie — Jesus, I trust in You': 'Jezu, ufam Tobie — Jesus, eu confio em Vós',
  'painted by your hand · Vilnius, 1934': 'pintada pela sua mão · Vilnius, 1934',
  '— became this one, by Eugeniusz Kazimirowski · Vilnius, 1934':
    '— tornou-se esta, de Eugeniusz Kazimirowski · Vilnius, 1934',
  '“Not in the beauty of the color, nor of the brush… but in My grace.”':
    '“Não está a grandeza desta imagem na beleza das cores nem do pincel… mas na Minha graça.”',
  'vessel of mercy — a story from the Diary of Saint Faustina Kowalska':
    'vaso de misericórdia — uma história do Diário de Santa Faustina Kowalska',
};

  'We do not take in maids.': 'Non accettiamo domestiche.',
  'There was another door.': 'C’era un’altra porta.',
  'And another.': 'E un’altra ancora.',
  'She knocked on many doors that summer. The answer learned her face.':
    'Bussò a molte porte quell’estate. Il rifiuto imparò il suo volto.',
  'One door remained — Żytnia Street: the Sisters of Our Lady of Mercy.':
    'Restava una porta — via Żytnia: le Suore della Madonna della Misericordia.',
  'The superior, Mother Michael, studied the small girl in the worn dress.':
    'La superiora, Madre Michael, osservò la piccola ragazza dal vestito logoro.',
  '“Go and ask the Lord of the house whether He will accept you.”':
    '“Va’ a chiedere al Signore della casa se ti accetta.”',
  'hold — and ask': 'tieni premuto — e chiedi',
  'I do accept; you are in My Heart.': 'Ti accolgo; sei nel Mio Cuore.',
  'Accepted — on one condition. She must earn the clothes she would renounce.':
    'Accettata — a una condizione. Doveva guadagnarsi il corredo delle vesti a cui avrebbe rinunciato.',
  'A year in service at Ostrówek: other people’s laundry, other people’s children, coin by coin.':
    'Un anno a servizio a Ostrówek: il bucato degli altri, i figli degli altri, moneta dopo moneta.',
  'On the first of August, 1925, the door on Żytnia Street opened to her.':
    'Il primo agosto 1925, la porta di via Żytnia si aprì per lei.',
  'walk in': 'entra',

  /* ---- ch4 ---- */
  'She received the habit, and with it a new name: Sister Maria Faustyna of the Blessed Sacrament.':
    'Ricevette l’abito e, con esso, un nome nuovo: Suor Maria Faustina del Santissimo Sacramento.',
  'She had hoped, perhaps, for ecstasies. She was given the kitchen.':
    'Sperava, forse, in estasi. Le fu data la cucina.',
  'hold and move gently — hurry earns nothing': 'tieni premuto e muovi con dolcezza — la fretta non rende nulla',
  'Great love can change small things into great ones, and it is only love which lends value to our actions.':
    'Un grande amore trasforma le piccole cose in cose grandi e solo l’amore dà valore alle nostre azioni.',
  'One evening the great pot was too heavy for her strength, and she was ashamed to ask.':
    'Una sera il grande pentolone era troppo pesante per le sue forze, e si vergognava di chiedere aiuto.',
  'Out of obedience, she tried again —': 'Per obbedienza, provò di nuovo —',
  '— and the lifted lid breathed out roses.': '— e il coperchio sollevato esalò rose.',
  'Nothing done for love is small. The years passed this way: Warsaw, Płock, the gardens, the gate.':
    'Nulla di ciò che è fatto per amore è piccolo. Gli anni passarono così: Varsavia, Płock, i giardini, il cancello.',

  /* ---- ch5 ---- */
  'Płock. The evening of the 22nd of February, 1931. She was alone in her cell.':
    'Płock. La sera del 22 febbraio 1931. Era sola nella sua cella.',
  'In the evening, when I was in my cell, I saw the Lord Jesus clothed in a white garment.':
    'La sera, stando nella mia cella, vidi il Signore Gesù vestito di una veste bianca.',
  'Paint an image according to the pattern you see, with the signature: Jesus, I trust in You.':
    'Dipingi un’immagine secondo il modello che vedi, con sotto scritto: Gesù, confido in Te!',
  'I promise that the soul that will venerate this image will not perish.':
    'Prometto che l’anima, che venererà quest’immagine, non perirà.',
  'She was twenty-five — a convent cook who had never once held a brush.':
    'Aveva venticinque anni — una cuoca di convento che non aveva mai tenuto un pennello.',
  'For three years the command followed her. Confessors shrugged. Superiors frowned.':
    'Per tre anni il comando la seguì. I confessori alzavano le spalle. Le superiore aggrottavano la fronte.',
  'Then, in Vilnius, one priest believed her: Father Michał Sopoćko. He hired a painter, Eugeniusz Kazimirowski, and every week Sister Faustina came to correct the work.':
    'Poi, a Vilnius, un sacerdote le credette: padre Michał Sopoćko. Ingaggiò un pittore, Eugeniusz Kazimirowski, e ogni settimana suor Faustina veniva a correggere il lavoro.',
  'Vilnius, 1934. The painter waits. Show him what you saw.':
    'Vilnius, 1934. Il pittore aspetta. Mostragli ciò che hai visto.',
  'paint Him — slow, broad strokes of light': 'dipingiLo — pennellate di luce, lente e ampie',
  'the right hand, raised in blessing': 'la mano destra, alzata in benedizione',
  'from the heart — draw the red ray, downward': 'dal cuore — traccia il raggio rosso, verso il basso',
  'and the pale ray, beside it': 'e il raggio pallido, accanto',
  'sign it — trace the words, left to right': 'firma — traccia le parole, da sinistra a destra',
  'The pale ray stands for the Water which makes souls righteous. The red ray stands for the Blood which is the life of souls. — Diary, 299':
    'Il raggio pallido rappresenta l’Acqua che giustifica le anime; il raggio rosso rappresenta il Sangue che è la vita delle anime. — Diario, 299',
  'It was finished. And Sister Faustina wept.': 'Era finito. E suor Faustina pianse.',
  '“Who will paint You as beautiful as You are?”': '“Chi può dipingerTi bello come sei?”',
  'Not in the beauty of the color, nor of the brush, lies the greatness of this image, but in My grace.':
    'Non nella bellezza dei colori né del pennello sta la grandezza di questa immagine, ma nella Mia grazia.',
  'Whatever your hand just made — it was enough. It was never about the brush.':
    'Qualunque cosa la tua mano abbia appena fatto — era abbastanza. Non è mai stata questione di pennello.',
  'In April 1935 the image was hung high in the Gate of Dawn, and a city looked up at it.':
    'Nell’aprile 1935 l’immagine fu appesa in alto nella Porta dell’Aurora, e una città alzò gli occhi verso di lei.',

  /* ---- ch6 ---- */
  'Vilnius. In September of 1935, she saw in the sky an angel — the executor of God’s wrath, sent to strike the earth.':
    'Vilnius. Nel settembre 1935 vide nel cielo un angelo — l’esecutore dell’ira di Dio, mandato a colpire la terra.',
  'She began to plead for the world — and heard, rising within her, words she had never learned.':
    'Cominciò a supplicare per il mondo — e udì salire dentro di sé parole che non aveva mai imparato.',
  'press with the slow ring — begin': 'premi con l’anello lento — comincia',
  'Eternal Father, I offer You the Body and Blood, Soul and Divinity of Your dearly beloved Son, Our Lord Jesus Christ, in atonement for our sins and those of the whole world.':
    'Eterno Padre, io Ti offro il Corpo e il Sangue, l’Anima e la Divinità del Tuo dilettissimo Figlio e Nostro Signore Gesù Cristo, in espiazione dei nostri peccati e di quelli del mondo intero.',
  'each small bead — with the ring': 'ogni grano piccolo — con l’anello',
  'Ten times on the small beads: For the sake of His sorrowful Passion, have mercy on us and on the whole world.':
    'Dieci volte sui grani piccoli: Per la Sua dolorosa Passione, abbi misericordia di noi e del mondo intero.',
  'And again. And again — five decades, fifty pleas, on ordinary rosary beads.':
    'E di nuovo. E di nuovo — cinque decine, cinquanta suppliche, su comuni grani di rosario.',
  'hold — and pray on': 'tieni premuto — e continua a pregare',
  'three times — Holy God': 'tre volte — Santo Dio',
  'The arm did not fall. Before those words, the angel stood helpless — and the storm knelt.':
    'Il braccio non cadde. Davanti a quelle parole l’angelo restò impotente — e la tempesta s’inginocchiò.',
  'Whoever will recite it will receive great mercy at the hour of death.':
    'Chiunque la reciterà, otterrà tanta Misericordia nell’ora della morte.',
  'She wrote the words down. The world still prays them every day, at three o’clock, on ordinary beads.':
    'Lei scrisse quelle parole. Il mondo le prega ancora ogni giorno, alle tre, su grani comuni.',
  'for the sake of His sorrowful Passion, have mercy on us and on the whole world':
    'per la Sua dolorosa Passione, abbi misericordia di noi e del mondo intero',
  'Holy God…': 'Santo Dio…',
  'Holy Mighty One…': 'Santo Forte…',
  'Holy Immortal One…': 'Santo Immortale…',

  /* ---- ch7 ---- */
  'Kraków. Hard years. The convent made her portress — keeper of the gate.':
    'Cracovia. Anni duri. Il convento la fece portinaia — custode del cancello.',
  'The poor of the city learned which gate gave soup, and the line learned her name.':
    'I poveri della città impararono quale cancello dava la minestra, e la fila imparò il suo nome.',
  'a mother, a child asleep on her shoulder': 'una madre, con un bambino addormentato sulla spalla',
  '“Bread, sister. Not for me.”': '“Pane, sorella. Non per me.”',
  'The loaf passed through the bars. The child did not wake — but the mother closed her eyes.':
    'La pagnotta passò tra le sbarre. Il bambino non si svegliò — ma la madre chiuse gli occhi.',
  '“They are beautiful, your little one.” The woman looked up as if no one had spoken to her in weeks.':
    '“È bello, il tuo piccolo.” La donna alzò lo sguardo come se nessuno le parlasse da settimane.',
  'She prayed in silence. The woman left no lighter — but not alone.':
    'Pregò in silenzio. La donna se ne andò senza un peso in meno — ma non sola.',
  'an old man, coat thin as paper': 'un vecchio, con un cappotto sottile come carta',
  '“Only to stand out of the rain a moment.”': '“Solo per stare un momento fuori dalla pioggia.”',
  'Bread, and the dry corner of the gateway. He ate slowly, saving half.':
    'Pane, e l’angolo asciutto dell’androne. Mangiò lentamente, conservandone metà.',
  'They spoke of the harvests before the war. For a moment he was forty years younger.':
    'Parlarono dei raccolti di prima della guerra. Per un momento ebbe quarant’anni di meno.',
  'She held him in her prayer. He straightened a little, as if the coat had thickened.':
    'Lo tenne nella sua preghiera. Lui si raddrizzò un poco, come se il cappotto si fosse infoltito.',
  'a young man with hard eyes': 'un giovane dagli occhi duri',
  '“God has forgotten this city. Don’t waste your bread on me.”':
    '“Dio ha dimenticato questa città. Non sprecare il tuo pane con me.”',
  'He took the loaf like an accusation. At the corner, he looked back once.':
    'Prese la pagnotta come un’accusa. All’angolo, si voltò una volta.',
  '“He has not forgotten you. I know it the way I know it is raining.” He had no answer for that.':
    '“Lui non ti ha dimenticato. Lo so come so che sta piovendo.” A questo non seppe rispondere.',
  'No words would land. She prayed instead — the long way around a locked door.':
    'Nessuna parola arrivava. Pregò invece — la via lunga attorno a una porta chiusa.',
  'a widow who says nothing at all': 'una vedova che non dice nulla',
  'Bread, wrapped in cloth, pressed into silent hands.':
    'Pane, avvolto in un panno, posato in mani silenziose.',
  'No answer came. Some griefs only want company; she stood with her in the rain.':
    'Nessuna risposta venne. Certi dolori vogliono solo compagnia; lei rimase con lei sotto la pioggia.',
  'For the silent, silence that listens upward. The widow lifted her face into the rain like a blessing.':
    'Per chi tace, un silenzio che ascolta verso l’alto. La vedova alzò il viso alla pioggia come a una benedizione.',
  'Toward evening, when the pots were nearly empty, one more figure came through the rain.':
    'Verso sera, quando le pentole erano quasi vuote, un’altra figura venne attraverso la pioggia.',
  'a young man — barefoot, bareheaded, his clothes frozen to him':
    'un giovane — scalzo, a capo scoperto, con i vestiti gelati addosso',
  '“Something hot, if you can.”': '“Qualcosa di caldo, se puoi.”',
  'There was bread in the basket still. She gave him all of it — and went to the kitchen besides, and brought him soup, full of crumbs.':
    'C’era ancora pane nel cesto. Glielo diede tutto — e andò inoltre in cucina e gli portò una minestra, piena di briciole.',
  'There was no bread left to weigh, no choice to make. She went to the kitchen and brought him soup, full of crumbs.':
    'Non c’era più pane da pesare, nessuna scelta da fare. Andò in cucina e gli portò una minestra, piena di briciole.',
  'He ate. And as she took back the bowl, the rain forgot to fall.':
    'Lui mangiò. E mentre lei riprendeva la ciotola, la pioggia dimenticò di cadere.',
  'My daughter, the blessings of the poor who bless Me as they leave this gate have reached My ears. And this is why I came down from My throne — to taste the fruits of your mercy.':
    'Figlia Mia, sono giunte ai Miei orecchi le benedizioni dei poveri che, allontanandosi da questa porta, Mi benedicono. E per questo sono sceso dal Mio trono — per assaggiare il frutto della tua Misericordia.',
  'I am giving you three ways of exercising mercy toward your neighbor: the first — by deed, the second — by word, the third — by prayer.':
    'Ti sottopongo tre modi per dimostrare Misericordia verso il prossimo: il primo è l’azione, il secondo è la parola, il terzo la preghiera.',
  'Help me, O Lord, that my eyes may be merciful, so that I may never suspect or judge from appearances, but look for what is beautiful in my neighbors’ souls.':
    'Aiutami, o Signore, a far sì che i miei occhi siano misericordiosi, in modo che io non nutra mai sospetti e non giudichi sulla base di apparenze esteriori, ma sappia scorgere ciò che c’è di bello nell’anima del mio prossimo.',
  'Deed': 'Opera',
  'Word': 'Parola',
  'Prayer': 'Preghiera',
  'give bread — {n} left': 'dare il pane — ne restano {n}',
  'no bread left': 'non resta pane',
  'stay, and speak': 'restare, e parlare',
  'hold a moment': 'tenere premuto un momento',
  'the young man': 'il giovane',

  /* ---- ch8 ---- */
  'The tuberculosis reached her lungs, then everything else. They sent her to the sanatorium at Prądnik.':
    'La tubercolosi raggiunse i polmoni, poi tutto il resto. La mandarono al sanatorio di Prądnik.',
  'And there, the visions stopped. The voice stopped. Heaven went dark and silent as this garden.':
    'E lì, le visioni cessarono. La voce cessò. Il Cielo si fece buio e silenzioso come questo giardino.',
  'hold —': 'tieni premuto —',
  '…nothing answers. keep walking.': '…niente risponde. continua a camminare.',
  'She kept a dry record of those weeks. No comfort in it — only this:':
    'Tenne un registro asciutto di quelle settimane. Nessun conforto — solo questo:',
  'Suffering is a great grace; through suffering the soul becomes like the Savior; in suffering love becomes crystallized.':
    'Le sofferenze sono una grande grazia. Attraverso la sofferenza l’anima diviene simile al Salvatore; nella sofferenza l’amore si cristallizza.',
  'As often as you hear the clock strike the third hour, immerse yourself completely in My mercy, adoring and glorifying it.':
    'Ogni volta che senti l’orologio battere le tre, immergiti tutta nella Mia Misericordia, adorandola ed esaltandola.',
  'In this hour, I will refuse nothing to the soul that makes a request of Me in virtue of My Passion.':
    'In quell’ora non rifiuterò nulla all’anima che Mi prega per la Mia Passione.',
  'The flame had not answered her holding. It returned anyway — not earned. Given.':
    'La fiamma non aveva risposto al suo tenere. Tornò comunque — non guadagnata. Donata.',
  'The graces of My mercy are drawn by means of one vessel only, and that is — trust. The more a soul trusts, the more it will receive.':
    'Le grazie della Mia Misericordia si attingono con un solo recipiente e questo è la fiducia. Più un’anima ha fiducia, più ottiene.',
  'where is He now?': 'dov’è Lui adesso?',
  'you imagined all of it': 'hai immaginato tutto',
  'a cook — a prophet?': 'una cuoca — profetessa?',
  'no one believes you': 'nessuno ti crede',
  'the night has no far side': 'la notte non ha un’altra riva',
  'He has gone quiet, hasn’t He': 'Si è fatto silenzioso, vero',

  /* ---- ch9 ---- */
  'Kraków-Łagiewniki. The night of the fifth of October, 1938.':
    'Cracovia-Łagiewniki. La notte del cinque ottobre 1938.',
  'She was thirty-three — the age of her Lord.':
    'Aveva trentatré anni — l’età del suo Signore.',
  'breathe with her — hold… and release': 'respira con lei — trattieni… e lascia andare',
  'The sisters knelt at the bed. The candle kept its small vigil.':
    'Le sorelle si inginocchiarono al letto. La candela manteneva la sua piccola veglia.',
  'You are the secretary of My mercy; I have chosen you for that office in this life and the next life.':
    'Sei la segretaria della Mia Misericordia: ti ho scelta per questo incarico in questa vita e in quella futura.',
  '— let go': '— lascia andare',

  /* ---- epilogue ---- */
  'She was buried in the convent garden at Łagiewniki.':
    'Fu sepolta nel giardino del convento a Łagiewniki.',
  '1939. A year later, the darkness she had been shown swept out of the same sky.':
    '1939. Un anno dopo, l’oscurità che le era stata mostrata dilagò dallo stesso cielo.',
  'But in hidden chapels, the Image was copied, and copied again.':
    'Ma in cappelle nascoste, l’Immagine fu copiata, e copiata ancora.',
  '1959. Rome — misled by a faulty translation of her Diary — silenced the devotion.':
    '1959. Roma — tratta in errore da una traduzione difettosa del suo Diario — mise a tacere la devozione.',
  'The archbishop of Kraków would not let her rest in obscurity: Karol Wojtyła.':
    'L’arcivescovo di Cracovia non la lasciò riposare nell’oscurità: Karol Wojtyła.',
  '1978. The ban was lifted. Six months later the world learned the archbishop’s new name — John Paul II.':
    '1978. Il divieto fu revocato. Sei mesi dopo il mondo imparò il nuovo nome dell’arcivescovo — Giovanni Paolo II.',
  '30 April 2000. Helena Kowalska — Sister Faustina — was declared a saint: the first of the Great Jubilee.':
    '30 aprile 2000. Helena Kowalska — suor Faustina — fu dichiarata santa: la prima del Grande Giubileo.',
  'And the Church received a new feast: the Second Sunday of Easter — Divine Mercy Sunday.':
    'E la Chiesa ricevette una nuova festa: la seconda domenica di Pasqua — la Domenica della Divina Misericordia.',
  'Somewhere on earth, it is always three o’clock.':
    'Da qualche parte sulla terra, sono sempre le tre.',
  'And the image you painted in Vilnius —': 'E l’immagine che hai dipinto a Vilnius —',
  'Jezu, ufam Tobie — Jesus, I trust in You': 'Jezu, ufam Tobie — Gesù, confido in Te',
  'painted by your hand · Vilnius, 1934': 'dipinta dalla tua mano · Vilnius, 1934',
  '— became this one, by Eugeniusz Kazimirowski · Vilnius, 1934':
    '— divenne questa, di Eugeniusz Kazimirowski · Vilnius, 1934',
  '“Not in the beauty of the color, nor of the brush… but in My grace.”':
    '“Non nella bellezza dei colori né del pennello… ma nella Mia grazia.”',
  'vessel of mercy — a story from the Diary of Saint Faustina Kowalska':
    'vaso di misericordia — una storia dal Diario di Santa Faustina Kowalska',
};

  'Głogowiec, central Poland. A farmhouse with ten children and never quite enough bread.':

  'there is nothing here — hold, and walk away': 'nie ma tu nic — przytrzymaj i odejdź',
  'The Cathedral of Saint Stanislaus Kostka. She did not remember walking there.':
    'Katedra świętego Stanisława Kostki. Nie pamiętała drogi, którą tam doszła.',
  'She fell prostrate before the Blessed Sacrament and asked what He wanted of her.':
    'Padła na twarz przed Najświętszym Sakramentem i zapytała, czego od niej chce.',
  'hold': 'przytrzymaj',
  'Go at once to Warsaw; you will enter a convent there.':
    'Jedź natychmiast do Warszawy, tam wstąpisz do klasztoru.',
  'She went home only to pack a small bag, and asked her sister to say goodbye for her.':
    'Wróciła do domu tylko po to, by spakować małą torbę, a siostrę poprosiła o pożegnanie za nią.',

  'THE EVENING': 'WIECZÓR',

  /* ---- ch3 ---- */
  'Warsaw. She arrived with one bag and no one waiting.':
    'Warszawa. Przyjechała z jedną torbą i nikt na nią nie czekał.',

  'We do not take in maids.': 'Nie przyjmujemy służących.',
  'There was another door.': 'Były kolejne drzwi.',
  'And another.': 'I jeszcze jedne.',
  'She knocked on many doors that summer. The answer learned her face.':
    'Tamtego lata pukała do wielu drzwi. Odmowa nauczyła się jej twarzy.',

    'Pozostały jedne drzwi — ulica Żytnia: Zgromadzenie Sióstr Matki Bożej Miłosierdzia.',
  'The superior, Mother Michael, studied the small girl in the worn dress.':
    'Przełożona, matka Michaela, przyjrzała się drobnej dziewczynie w znoszonej sukience.',
  '“Go and ask the Lord of the house whether He will accept you.”':
    '„Idź i zapytaj Pana domu, czy cię przyjmie”.',

  'I do accept; you are in My Heart.': 'Przyjmuję, jesteś w sercu Moim.',

  'A year in service at Ostrówek: other people’s laundry, other people’s children, coin by coin.':

  'walk in': 'wejdź',

  /* ---- ch4 ---- */
  'She received the habit, and with it a new name: Sister Maria Faustyna of the Blessed Sacrament.':

  'She had hoped, perhaps, for ecstasies. She was given the kitchen.':
    'Może liczyła na ekstazy. Dostała kuchnię.',
  'hold and move gently — hurry earns nothing': 'przytrzymaj i poruszaj łagodnie — pośpiech nic nie daje',
  'Great love can change small things into great ones, and it is only love which lends value to our actions.':
    'Wielka miłość rzeczy małe umie zamieniać na rzeczy wielkie i tylko miłość nadaje czynom naszym wartość.',
  'One evening the great pot was too heavy for her strength, and she was ashamed to ask.':
    'Pewnego wieczoru wielki kocioł był ponad jej siły, a wstydziła się prosić o pomoc.',

  'Nothing done for love is small. The years passed this way: Warsaw, Płock, the gardens, the gate.':
    'Nic, co czynione z miłości, nie jest małe. Tak mijały lata: Warszawa, Płock, ogrody, furta.',

  'Płock. The evening of the 22nd of February, 1931. She was alone in her cell.':

  'The pale ray stands for the Water which makes souls righteous. The red ray stands for the Blood which is the life of souls. — Diary, 299':
    'Blady promień oznacza wodę, która usprawiedliwia dusze; czerwony promień oznacza krew, która jest życiem dusz. — Dzienniczek, 299',
  'It was finished. And Sister Faustina wept.': 'Był skończony. A siostra Faustyna zapłakała.',

  'In April 1935 the image was hung high in the Gate of Dawn, and a city looked up at it.':

  'Vilnius. In September of 1935, she saw in the sky an angel — the executor of God’s wrath, sent to strike the earth.':

  /* ---- ch7 ---- */
  'Kraków. Hard years. The convent made her portress — keeper of the gate.':

    'Chleb i suchy kąt bramy. Jadł powoli, połowę odkładając.',
  'They spoke of the harvests before the war. For a moment he was forty years younger.':

  'She held him in her prayer. He straightened a little, as if the coat had thickened.':

  'a young man with hard eyes': 'młody mężczyzna o twardych oczach',
  '“God has forgotten this city. Don’t waste your bread on me.”':

  'Bread, wrapped in cloth, pressed into silent hands.':
    'Chleb, zawinięty w płótno, wciśnięty w milczące dłonie.',

  'For the silent, silence that listens upward. The widow lifted her face into the rain like a blessing.':

/* ============ 06-save.js ============ */
/* localStorage persistence: progress, the player's painting, settings. */

const Save = {
  KEY: 'faustyna_v1',
  data: null,

  read() {
    try {
      this.data = JSON.parse(localStorage.getItem(this.KEY)) || null;
    } catch (e) { this.data = null; }
    if (!this.data || typeof this.data !== 'object' || Array.isArray(this.data)) this.data = {};
    const d = this.data;
    if (!d.settings || typeof d.settings !== 'object') d.settings = {};
    if (typeof d.settings.volume !== 'number' || !isFinite(d.settings.volume)) d.settings.volume = 0.85;
    if (typeof d.settings.reduceMotion !== 'boolean')
      d.settings.reduceMotion = !!(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
    if (typeof d.unlocked !== 'number' || !isFinite(d.unlocked)) d.unlocked = 0;
    d.unlocked = clamp(Math.floor(d.unlocked), 0, CHAPTERS.length - 1);
    /* local debug: running from disk or localhost opens every chapter */
    if (location.protocol === 'file:' || /^(localhost|127\.0\.0\.1)$/.test(location.hostname))
      d.unlocked = CHAPTERS.length - 1;
    if (typeof d.chapter !== 'string' || !SCENES[d.chapter]) d.chapter = null;
    if (!Array.isArray(d.strokes)) d.strokes = null;
    d.done = !!d.done;
    return d;
  },

  write() {
    try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) { /* private mode */ }
  },

  reachChapter(id) {
    const i = CHAPTERS.findIndex(c => c.id === id);
    if (i >= 0) {
      this.data.chapter = id;
      this.data.unlocked = Math.max(this.data.unlocked, i);
    }
    this.write();
  },

  /* strokes: [[{x,y},...], ...] in unit canvas space; cap size */
  savePainting(strokes) {
    let total = 0;
    const out = [];
    for (const s of strokes) {
      const pts = s.pts.map(p => [Math.round(p.x * 1000) / 1000, Math.round(p.y * 1000) / 1000]);
      total += pts.length;
      out.push({ k: s.kind, p: pts });
      if (total > 6000) break;
    }
    this.data.strokes = out;
    this.write();
  },
};


/* ============ 07-engine.js ============ */
/* Engine: loop, camera, scene manager, transitions, and the script runner —
   a generator-coroutine system that choreographs each chapter's beats. */

const Engine = {
  time: 0, dt: 0,
  cam: { x: 0, y: 450, zoom: 1, shakeX: 0, shakeY: 0, trauma: 0 },
  drift: { t: 0, amp: 0.018, rate: 0.05 },     // slow breathing zoom
  fade: { alpha: 1, color: '#000000' },        // full-screen fade overlay
  grainAmt: 0.07,
  letterboxAmt: 0,
  paused: false,
  scene: null,
  scriptRunner: null,
  pressQueued: false,
  _last: 0,

  get fx() { return Save.data.settings.reduceMotion ? 0 : 1; },

  init() {
    View.init(document.getElementById('stage'));
    Input.init(document.getElementById('app'));
    Input.on('press', p => this.handlePress(p));
    Input.on('release', p => { if (!this.paused && this.scene && this.scene.onRelease) this.scene.onRelease(p); });
    Input.on('move', p => { if (!this.paused && this.scene && this.scene.onMove) this.scene.onMove(p); });
    this._last = performance.now();
    requestAnimationFrame(t => this.frame(t));
  },

  handlePress(p) {
    Audio.init();
    if (this.paused) return;
    if (TitleCard.visible) {
      if (Engine.time - TitleCard.shownAt > 0.9) this.pressQueued = true; // skip card
      return;
    }
    if (Text.showing && Text.blocking) { Text.advance(); return; }
    if (this.scene && this.scene.onPress) {
      try { this.scene.onPress(p); } catch (e) { console.error('scene.onPress', e); }
    }
  },

  /* ---------------- main loop ---------------- */
  frame(now) {
    requestAnimationFrame(t => this.frame(t));
    let dt = (now - this._last) / 1000;
    this._last = now;
    dt = Math.min(dt, 0.05);
    if (this.paused) return;
    this.dt = dt; this.time += dt;

    Input.update(dt);
    Tweens.update(dt);
    try { Audio.update(dt); } catch (e) { console.error('audio.update', e); }

    /* camera drift + shake */
    this.drift.t += dt * this.drift.rate;
    if (this.cam.trauma > 0) {
      this.cam.trauma = Math.max(0, this.cam.trauma - dt * 1.6);
      const s = this.cam.trauma * this.cam.trauma * 22 * this.fx;
      this.cam.shakeX = rand(-s, s); this.cam.shakeY = rand(-s, s);
    } else { this.cam.shakeX = this.cam.shakeY = 0; }

    if (this.scene && this.scene.update) {
      try { this.scene.update(dt); } catch (e) { console.error('scene.update', e); }
    }
    if (this.scriptRunner) this.scriptRunner.update(dt);
    Particles.update(dt);
    Text.update(dt);
    Cursor.update(dt);

    this.draw();
    Input.postUpdate();
  },

  shake(amount) { this.cam.trauma = Math.min(1, this.cam.trauma + amount); },

  draw() {
    const ctx = View.ctx;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, View.pixW, View.pixH);

    const driftZoom = 1 + (Math.sin(this.drift.t * TAU) * this.drift.amp + this.drift.amp) * this.fx;
    const cam = {
      x: this.cam.x, y: this.cam.y,
      zoom: this.cam.zoom * driftZoom,
      shakeX: this.cam.shakeX, shakeY: this.cam.shakeY,
    };
    View.apply(cam);

    /* scenes live in the y∈[0,900] band; outside stays pure black (letterbox) */
    ctx.save();
    ctx.beginPath();
    ctx.rect(View.left - 4, 0, View.W + 8, View.H);
    ctx.clip();
    if (this.scene && this.scene.draw) {
      try { this.scene.draw(ctx); } catch (e) { console.error('scene.draw', e); }
    }
    Particles.draw(ctx, false);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    Particles.draw(ctx, true);
    ctx.restore();
    if (this.scene && this.scene.drawFront) this.scene.drawFront(ctx);
    Cursor.draw(ctx);
    ctx.restore();

    R.grain(ctx, this.grainAmt * (this.fx ? 1 : 0.4));
    R.vignette(ctx, 0.62);
    R.letterbox(ctx, this.letterboxAmt);

    if (this.fade.alpha > 0.002) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalAlpha = this.fade.alpha;
      ctx.fillStyle = this.fade.color;
      ctx.fillRect(0, 0, View.pixW, View.pixH);
      ctx.globalAlpha = 1;
    }
  },

  /* ---------------- scene flow ---------------- */
  runId: 0,
  go(id, opts = {}) {
    const next = SCENES[id];
    if (!next) return;
    const doSwitch = () => {
      if (this.scene && this.scene.exit) this.scene.exit();
      Particles.clear();
      Tweens.clear();
      Text.clear(true);
      Hint.hide();
      Choices.hide();
      this.scriptRunner = null;
      this.runId++;
      const run = this.runId;
      this.cam.x = 0; this.cam.y = 450; this.cam.zoom = 1; this.cam.trauma = 0;
      this.letterboxAmt = 0;
      this.scene = next;
      const ch = CHAPTERS.find(c => c.id === id);
      if (ch) Save.reachChapter(id);
      next.enter();
      const startScript = () => {
        if (this.runId === run && next.script) this.scriptRunner = new ScriptRunner(next.script);
      };

      if (ch && !opts.noCard) {
        TitleCard.show(ch.num ? `${tr('Chapter')} ${ch.num}` : '', ch.title, ch.place);
        this.fade.color = '#000000';
        this.fade.alpha = 1;
        const start = this.time;
        const waitCard = () => {
          if (this.runId !== run) return;          // superseded by another go()
          const elapsed = this.time - start;
          if ((elapsed > 3.4 || this.pressQueued) && elapsed > 1.2) {
            this.pressQueued = false;
            TitleCard.hide();
            Tweens.to(this.fade, { alpha: 0 }, 1.6, { key: 'fade' });
            startScript();                          // beats begin once the card lifts
          } else setTimeout(waitCard, 60);
        };
        setTimeout(waitCard, 60);
      } else {
        this.fade.alpha = 1;
        Tweens.to(this.fade, { alpha: 0 }, opts.slowIn ? 2.2 : 1.2, { key: 'fade' });
        startScript();
      }
    };

    if (opts.instant) { doSwitch(); }
    else {
      Tweens.to(this.fade, { alpha: 1 }, opts.slowOut ? 2 : 0.9, {
        key: 'fade', ease: Ease.inOutQuad, onDone: doSwitch,
      });
    }
  },

  /* schedule a callback that dies with the current scene run (restart-safe) */
  after(ms, fn) {
    const run = this.runId;
    setTimeout(() => { if (this.runId === run) fn(); }, ms);
  },

  nextChapter() {
    const i = CHAPTERS.findIndex(c => c.id === this.scene.id);
    const next = CHAPTERS[i + 1];
    if (next) this.go(next.id);
  },
};

/* ---------------- script runner: generator coroutines ----------------
   Scene scripts are generator functions yielding awaitables:
     yield S.wait(1.4)
     yield S.text("...", opts)            — waits for advance
     yield S.waitFor(() => cond)
     yield S.holdTotal(2.5)               — accumulated hold-time gate
     S.do(fn)                             — immediate side effect
*/
class ScriptRunner {
  constructor(genFn) {
    this.S = makeScriptAPI();
    this.gen = genFn(this.S);
    this.current = null;
    this.done = false;
  }
  update(dt) {
    if (this.done) return;
    if (this.current && !this.current.done(dt)) return;
    let r;
    try { r = this.gen.next(); }
    catch (e) { console.error('script error', e); this.done = true; return; }
    if (r.done) { this.done = true; this.current = null; return; }
    this.current = r.value;
    /* resolve instantly-completable steps in the same frame chain next tick */
  }
}

function makeScriptAPI() {
  return {
    wait(sec) { let t = sec; return { done: dt => (t -= dt) <= 0 }; },
    waitFor(fn) { return { done: () => !!fn() }; },
    text(str, opts) { return Text.show(str, opts); },
    textAuto(str, sec, opts = {}) { return Text.show(str, Object.assign({ auto: sec, passthrough: true }, opts)); },
    do(fn) {
      /* a throwing side-effect must never kill the chapter's generator */
      try { fn(); } catch (e) { console.error('script do()', e); }
      return { done: () => true };
    },
    holdTotal(sec, opts = {}) {
      /* gate: total accumulated hold time across presses */
      let acc = 0, hinted = false, idle = 0;
      return {
        done: dt => {
          if (Input.down) { acc += dt; idle = 0; if (hinted) { Hint.hide(); hinted = false; } }
          else { idle += dt; }
          if (opts.hint && idle > (opts.hintAfter || 4) && !hinted) { Hint.show(opts.hint, opts); hinted = true; }
          if (opts.onProgress) opts.onProgress(clamp01(acc / sec), Input.down);
          if (acc >= sec) { if (hinted) Hint.hide(); return true; }
          return false;
        },
      };
    },
    pressGate(opts = {}) {
      /* wait for the next fresh press (consumed by scene.onPress normally; use flagged) */
      let pressed = false, idle = 0, hinted = false;
      const off = () => { pressed = true; };
      Input.on('press', off);   // note: listeners persist; acceptable for scene lifetime
      return {
        done: dt => {
          idle += dt;
          if (opts.hint && idle > (opts.hintAfter || 5) && !hinted) { Hint.show(opts.hint, opts); hinted = true; }
          if (pressed && hinted) Hint.hide();
          return pressed;
        },
      };
    },
  };
}

/* ---------------- luminous cursor ---------------- */
const Cursor = {
  x: 0, y: 0, r: 7, visible: 0, pressGlow: 0,
  update(dt) {
    this.x = damp(this.x, Input.x, 22, dt);
    this.y = damp(this.y, Input.y, 22, dt);
    const idle = Engine.time - Input.lastMoveAt;
    const want = (idle < 2.6 || Input.down) && !Menu.open ? 1 : 0;
    this.visible = damp(this.visible, want, 6, dt);
    this.pressGlow = damp(this.pressGlow, Input.down ? 1 : 0, 10, dt);
    if (Input.down && Math.random() < 0.35) {
      Particles.spawn({
        x: this.x + rand(-4, 4), y: this.y + rand(-4, 4),
        vx: rand(-6, 6), vy: rand(-18, -6), life: rand(0.5, 1.1),
        size: rand(1, 2.4), endSize: 0.2, color: '#ffeec9', alpha: 0.5,
        additive: true, glow: true,
      });
    }
  },
  draw(ctx) {
    if (this.visible < 0.01) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = this.visible * (0.5 + this.pressGlow * 0.5);
    R.glow(ctx, this.x, this.y, this.r * (1 + this.pressGlow * 1.6) * (1 + Math.sin(Engine.time * 2.2) * 0.12), '#fff3d9');
    ctx.globalAlpha = this.visible * 0.9;
    ctx.fillStyle = '#fffdf4';
    ctx.beginPath(); ctx.arc(this.x, this.y, 1.6 + this.pressGlow * 1.2, 0, TAU); ctx.fill();
    ctx.restore();
  },
};


/* ============ 08-chapters.js ============ */
/* Chapter registry + helpers shared across scenes. */

const CHAPTERS = [
  { id: 'ch1', num: 'I',    title: 'A Voice in the Night', place: 'Głogowiec · 1912' },
  { id: 'ch2', num: 'II',   title: 'The Dance',            place: 'Łódź · 1924' },
  { id: 'ch3', num: 'III',  title: 'The Doors',            place: 'Warsaw · 1925' },
  { id: 'ch4', num: 'IV',   title: 'Small Things',         place: 'The Convent · 1926–1930' },
  { id: 'ch5', num: 'V',    title: 'Paint an Image',       place: 'Płock · 22 February 1931' },
  { id: 'ch6', num: 'VI',   title: 'The Chaplet',          place: 'Vilnius · September 1935' },
  { id: 'ch7', num: 'VII',  title: 'The Gate',             place: 'Kraków · 1937' },
  { id: 'ch8', num: 'VIII', title: 'The Dark Night',       place: 'Prądnik Sanatorium · 1938' },
  { id: 'ch9', num: 'IX',   title: 'Jezu, Ufam Tobie',     place: 'Kraków-Łagiewniki · 5 October 1938' },
  { id: 'epilogue', num: '', title: 'The Spark',           place: '1938 — today', menuTitle: 'The Spark (epilogue)' },
];

const SCENES = {};

/* hold-to-pray bloom: the game's recurring verb.
   rises while held, ebbs gently when released; drives light + pad swell. */
class PrayBloom {
  constructor(opts = {}) {
    this.v = 0;
    this.riseTime = opts.riseTime || 2.6;   // seconds of holding to reach 1
    this.fall = opts.fall || 0.12;          // per second when released
    this.muted = opts.muted || false;       // ch8: the hold that "doesn't answer"
    this.onFull = opts.onFull || null;
    this._wasFull = false;
  }
  update(dt) {
    if (Input.down && !Menu.open) {
      const gain = this.muted ? 0.012 : 1 / this.riseTime;
      this.v = clamp01(this.v + gain * dt);
    } else {
      this.v = clamp01(this.v - this.fall * dt);
    }
    if (this.v >= 1 && !this._wasFull) { this._wasFull = true; if (this.onFull) this.onFull(); }
    if (this.v < 0.85) this._wasFull = false;
    return this.v;
  }
}

/* a figure that walks toward a target x while input held (or arrow keys) */
class Walker {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.speed = opts.speed || 120;
    this.phase = 0;
    this.moving = 0;
    this.face = 1;
    this.stepT = 0;
    this.onStep = opts.onStep || null;
  }
  update(dt, dir) {
    const want = clamp(dir, -1, 1);
    this.moving = damp(this.moving, want !== 0 ? 1 : 0, 8, dt);
    if (want !== 0) this.face = want;
    this.x += want * this.speed * dt;
    if (this.moving > 0.2) {
      this.phase += dt * 7 * this.moving;
      this.stepT -= dt;
      if (this.stepT <= 0) { this.stepT = 0.42; if (this.onStep) this.onStep(); }
    }
  }
}

/* soft radial light pool (lamps, windows). breathing intensity */
function lamp(ctx, x, y, r, color, intensity, t, flickerAmt = 0.08) {
  const fl = 1 + wobble(t * 9 + x) * flickerAmt;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = clamp01(intensity);
  R.glow(ctx, x, y, r * fl, color);
  ctx.restore();
}

/* breathing/cadence ring used by the chaplet + final scene */
function drawRing(ctx, x, y, baseR, pulse01, alpha, color = '#ffeec9') {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = alpha * 0.85;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.arc(x, y, baseR * (0.82 + pulse01 * 0.3), 0, TAU);
  ctx.stroke();
  ctx.globalAlpha = alpha * 0.3;
  R.glow(ctx, x, y, baseR * 0.5, color);
  ctx.restore();
}

/* shared painting store (set in ch5, used in epilogue keepsake) */
const Painting = {
  strokes: [],          // {kind:'garment'|'ray_red'|'ray_pale', pts:[{x,y}]} unit space
  sigProgress: 0,
  load() {
    try {
      const s = Save.data.strokes;
      if (!Array.isArray(s)) return false;
      this.strokes = s
        .filter(o => o && typeof o.k === 'string' && Array.isArray(o.p))
        .map(o => ({
          kind: o.k,
          pts: o.p.filter(p => Array.isArray(p) && p.length >= 2).map(([x, y]) => ({ x: +x || 0, y: +y || 0 })),
        }))
        .filter(o => o.pts.length > 1);
      this.sigProgress = 1;
      return this.strokes.length > 0;
    } catch (e) { this.strokes = []; return false; }
  },
  /* render the player's painting into ctx within rect (x,y,w,h); unit coords map to rect */
  render(ctx, x, y, w, h, opts = {}) {
    const P = u => ({ x: x + u.x * w, y: y + u.y * h });
    const glowAmt = opts.glow !== undefined ? opts.glow : 1;
    /* garment strokes: stacked soft light */
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of this.strokes) {
      if (s.kind !== 'garment') continue;
      for (let i = 0; i < s.pts.length; i += 2) {
        const p = P(s.pts[i]);
        ctx.globalAlpha = 0.075 * glowAmt;
        R.glow(ctx, p.x, p.y, w * 0.1, '#f4ead2');
      }
    }
    /* rays: soft fans of light along the player's own path */
    for (const s of this.strokes) {
      if (s.kind !== 'ray_red' && s.kind !== 'ray_pale') continue;
      const col = s.kind === 'ray_red' ? '#e8364c' : '#cfdcff';
      const core = s.kind === 'ray_red' ? '#ff8a98' : '#f4f8ff';
      const pts = s.pts.map(P);
      drawTaperedPath(ctx, pts, w * 0.2, col, 0.13 * glowAmt);     // wide halo
      drawTaperedPath(ctx, pts, w * 0.1, col, 0.22 * glowAmt);     // body
      drawTaperedPath(ctx, pts, w * 0.038, core, 0.3 * glowAmt);   // gentle core
    }
    ctx.restore();
    /* signature */
    if (this.sigProgress > 0.01) {
      ctx.save();
      const fs = h * 0.052;
      ctx.font = `italic ${fs}px "Iowan Old Style","Palatino Linotype",Georgia,serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const tx = x + w / 2, ty = y + h * 0.91;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, ty - fs, w * this.sigProgress, fs * 2);
      ctx.clip();
      ctx.fillStyle = `rgba(238,228,205,${0.92 * (opts.alpha === undefined ? 1 : opts.alpha)})`;
      ctx.shadowColor = 'rgba(255,238,200,0.6)'; ctx.shadowBlur = 12 * glowAmt;
      ctx.fillText('Jezu, ufam Tobie', tx, ty);
      ctx.restore();
      ctx.restore();
    }
  },
};

function drawTaperedPath(ctx, pts, maxW, color, alpha) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
  const n = pts.length;
  for (let i = 1; i < n; i++) {
    const t = i / (n - 1);
    ctx.globalAlpha = alpha * (1 - t * 0.25);
    ctx.lineWidth = maxW * (0.35 + 0.65 * t);   // widens away from the heart
    ctx.beginPath();
    ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
    ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

/* smooth a recorded polyline (moving average, then resample) */
function smoothPath(pts, passes = 2) {
  let p = pts.slice();
  for (let k = 0; k < passes; k++) {
    const out = [p[0]];
    for (let i = 1; i < p.length - 1; i++) {
      out.push({ x: (p[i - 1].x + p[i].x * 2 + p[i + 1].x) / 4, y: (p[i - 1].y + p[i].y * 2 + p[i + 1].y) / 4 });
    }
    out.push(p[p.length - 1]);
    p = out;
  }
  return p;
}


/* ============ 10-title.js ============ */
/* Title: a dark Polish field under the two rays, barely visible, breathing. */

SCENES.title = {
  id: 'title',
  enter() {
    this.t = 0;
    this.revealed = false;
    this.rayI = 0;
    this.titleA = 0;
    Tweens.to(this, { titleA: 1 }, 3, { delay: 0.8, ease: Ease.inOutSine });
    Engine.grainAmt = 0.06;
    this.moteT = 0;
    this.started = false;
  },
  exit() { Choices.hide(); UI.showMenuBtn(false); },

  _reveal() {
    if (this.revealed) return;
    this.revealed = true;
    Audio.init();
    Audio.pad.set([['D2', 'A2', 'D3', 'F3', 'A3'], ['Bb1', 'F2', 'D3', 'F3'], ['G1', 'G2', 'Bb2', 'D3', 'A3'], ['A1', 'A2', 'E3', 'C#4']], { level: 0.5, hold: 12, bright: 750 });
    Audio.channels.wind.set(0.16, 300);
    Tweens.to(this, { rayI: 0.34 }, 6, { ease: Ease.inOutSine });
    Audio.motif({ vel: 0.34 });
    Engine.after(1700, () => { if (Engine.scene === this) this._menu(); });
    UI.showMenuBtn(true);
  },

  _menu() {
    const savedId = Save.data.chapter && SCENES[Save.data.chapter] ? Save.data.chapter : null;
    const hasSave = Save.data.unlocked > 0 || (savedId && savedId !== 'ch1');
    const opts = [];
    if (hasSave && !Save.data.done) {
      const ch = CHAPTERS.find(c => c.id === savedId) || CHAPTERS[0];
      opts.push({ id: 'continue', label: 'Continue', sub: `${tr('chapter')} ${ch.num || '—'} — ${tr(ch.title)}` });
      opts.push({ id: 'begin', label: 'Begin again', sub: 'from Głogowiec' });
    } else if (Save.data.done) {
      opts.push({ id: 'begin', label: 'Begin again', sub: 'from Głogowiec' });
      opts.push({ id: 'epilogue', label: 'The keepsake', sub: 'return to your painting' });
    } else {
      opts.push({ id: 'begin', label: 'Begin', sub: 'a true story, gently told' });
    }
    Choices.show(opts, id => {
      if (id === 'continue') Engine.go(savedId || 'ch1');
      else if (id === 'epilogue') Engine.go('epilogue');
      else Engine.go('ch1');
    });
  },

  onPress() { this._reveal(); },

  update(dt) {
    this.t += dt;
    this.moteT -= dt;
    if (this.moteT <= 0) {
      this.moteT = 0.22;
      Particles.dust(rand(View.left, View.right), rand(500, 880), '#d9d2e8');
    }
  },

  draw(ctx) {
    const t = this.t;
    R.sky(ctx, 'title-sky', [[0, '#050408'], [0.55, '#0a0814'], [1, '#120e1c']], View.left, 0, View.W + 2, 900);
    R.stars(ctx, t, 0.8, 11);
    /* the rays, far and faint, from above the frame */
    R.mercyRays(ctx, 0, -160, 0.1 + this.rayI * (1 + Math.sin(t * 0.5) * 0.12), t, { len: 1500, spread: 0.42, width: 0.2 });
    /* fields of home */
    R.hills(ctx, 805, 38, '#0b0911', 3, t);
    R.hills(ctx, 845, 26, '#070509', 9, t);
    R.tree(ctx, View.left + View.W * 0.16, 832, 240, 5, '#08060b');
    /* a cottage with one lit window — where it begins */
    const cx = View.right - View.W * 0.18;
    ctx.fillStyle = '#0a0710';
    ctx.fillRect(cx - 70, 760, 140, 70);
    ctx.beginPath(); ctx.moveTo(cx - 84, 762); ctx.lineTo(cx, 712); ctx.lineTo(cx + 84, 762); ctx.closePath(); ctx.fill();
    lamp(ctx, cx + 26, 794, 30, 'rgba(255,190,110,0.85)', 0.85, t);
    ctx.fillStyle = 'rgba(255,205,130,0.9)';
    ctx.fillRect(cx + 18, 786, 17, 15);

    /* wordmark */
    ctx.save();
    ctx.globalAlpha = this.titleA;
    spacedText(ctx, 'FAUSTYNA', 0, 318, 74, 26, 'rgba(240,233,219,0.96)');
    ctx.globalAlpha = this.titleA * 0.85;
    spacedText(ctx, tr('VESSEL OF MERCY'), 0, 388, 19, 11, 'rgba(232,201,138,0.8)');
    ctx.globalAlpha = this.titleA * 0.6;
    spacedText(ctx, tr('FROM THE DIARY OF SAINT FAUSTINA KOWALSKA'), 0, 430, 12, 5.5, 'rgba(236,229,216,0.55)');
    const hr = new Date().getHours();
    if (hr === 15) {
      ctx.globalAlpha = this.titleA * (0.45 + 0.2 * Math.sin(t * 1.4));
      ctx.font = 'italic 15px "Iowan Old Style","Palatino Linotype",Georgia,serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(232,201,138,0.85)';
      ctx.fillText(tr('it is the Hour of Mercy now'), 0, 466);
    }
    if (!this.revealed && this.t > 2.6) {
      ctx.globalAlpha = (0.35 + 0.25 * Math.sin(t * 1.8)) * clamp01(this.t - 2.6);
      ctx.font = '15px "Iowan Old Style","Palatino Linotype",Georgia,serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ece5d8';
      ctx.fillText(tr('touch anywhere'), 0, 560);
    }
    ctx.restore();
  },
};

/* manual letterspacing — reliable across browsers */
function spacedText(ctx, str, cx, y, size, spacing, color, italic = false) {
  ctx.save();
  ctx.font = `${italic ? 'italic ' : ''}${size}px "Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif`;
  ctx.fillStyle = color;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  let total = 0;
  const widths = [];
  for (const ch of str) { const w = ctx.measureText(ch).width; widths.push(w); total += w + spacing; }
  total -= spacing;
  let x = cx - total / 2;
  let i = 0;
  for (const ch of str) { ctx.fillText(ch, x, y); x += widths[i++] + spacing; }
  ctx.restore();
}


/* ============ 11-ch1-night.js ============ */
/* Chapter I — A Voice in the Night. Głogowiec, 1912.
   The toy: hold to pray. The candle answers. Teaches the game's verb. */

SCENES.ch1 = {
  id: 'ch1',
  enter() {
    this.t = 0;
    this.bloom = new PrayBloom({
      riseTime: 3.4, fall: 0.1,
      onFull: () => {
        if (!this.bloomed) {
          this.bloomed = true;
          Audio.shimmer(0.5, 900);
          Audio.bell('D5', 0.18, 0.7);
          Particles.burst(this.childX, 560, 26, () => ({
            x: this.childX + rand(-40, 40), y: rand(420, 600),
            vx: rand(-8, 8), vy: rand(-46, -20), life: rand(2, 4),
            size: rand(2, 4.5), endSize: 0.4, color: '#ffeec4', alpha: 0.6,
            additive: true, glow: true, wobble: rand(6, 14), fadeIn: 0.4,
          }));
        }
      },
    });
    this.bloomed = false;
    this.childX = -20;
    this.fireT = 0;
    this.crackleT = 0;
    Engine.grainAmt = 0.075;
    Audio.pad.set([['D2', 'D3', 'A3', 'F4'], ['Bb1', 'F3', 'D4', 'Bb3'], ['G1', 'D3', 'Bb3', 'G4'], ['A1', 'E3', 'C#4', 'A3']], { level: 0.34, hold: 13, bright: 700 });
    Audio.channels.wind.set(0.1, 260);
  },
  exit() { Audio.heartbeatStop(); },

  script: function* (S) {
    const sc = SCENES.ch1;
    yield S.wait(2.4);
    yield S.text('Głogowiec, central Poland. A farmhouse with ten children and never quite enough bread.');
    yield S.text('The third child, Helena, woke in the night. Something was calling her by name.');
    yield S.holdTotal(3.4, {
      hint: 'hold — and stay awhile',
      hintAfter: 2.5,
      onProgress: () => {},
    });
    yield S.waitFor(() => sc.bloomed);
    yield S.wait(2.2);
    yield S.text('It was in the seventh year of my life that, for the first time, I heard God’s voice in my soul; that is, an invitation to a more perfect life.', { quote: true, attr: 'Diary, 7' });
    yield S.text('She was seven. For years she would try to outgrow it, the way one outgrows a dress.');
    yield S.text('The voice did not outgrow her.');
    yield S.wait(0.8);
    S.do(() => Engine.nextChapter());
  },

  onPress() {},
  update(dt) {
    this.t += dt;
    const b = this.bloom.update(dt);
    /* pad swells with the hold */
    Audio.pad.targetLevel = 0.34 + b * 0.3;
    /* candle crackle */
    this.crackleT -= dt;
    if (this.crackleT <= 0 && b > 0.1) {
      this.crackleT = rand(0.15, 0.6) / (0.4 + b);
      if (AC) blip(Audio.out(0.5, 0.1), rand(2400, 5200), 0.012 + b * 0.02, 0.02, 'noise');
    }
    /* fireflies through the window once blooming */
    this.fireT -= dt;
    if (this.fireT <= 0 && b > 0.25) {
      this.fireT = rand(0.3, 0.9) / b;
      Particles.spawn({
        x: this.childX + rand(60, 320), y: rand(360, 620),
        vx: rand(-10, 10), vy: rand(-16, -4), life: rand(2, 5),
        size: rand(1.4, 3), endSize: 0.3, color: '#d8ffba', alpha: rand(0.25, 0.55),
        additive: true, glow: true, wobble: rand(10, 24), wobbleF: rand(0.8, 2), fadeIn: 0.8,
      });
    }
    if (Input.down && Math.random() < 0.1 * b) Particles.mote(this.childX + rand(-30, 30), rand(480, 620));
  },

  draw(ctx) {
    const t = this.t, b = this.bloom.v;
    /* the dark room */
    R.sky(ctx, 'ch1-room', [[0, '#070509'], [0.7, '#0b0710'], [1, '#0d0911']], View.left, 0, View.W + 2, 900);
    /* window: tall arch on the right of the child, night sky through it */
    const wx = 120, wy = 250, ww = 360, wh = 430;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(wx, wy + wh);
    ctx.lineTo(wx, wy + 80);
    ctx.quadraticCurveTo(wx + ww / 2, wy - 70, wx + ww, wy + 80);
    ctx.lineTo(wx + ww, wy + wh);
    ctx.closePath();
    ctx.clip();
    R.sky(ctx, 'ch1-night', [[0, '#0a1026'], [0.6, '#131a36'], [1, '#1d2440']], wx, wy - 70, ww, wh + 70);
    R.stars(ctx, t, 0.6 + b * 0.5, 23);
    /* moon */
    lamp(ctx, wx + ww * 0.7, wy + 90, 90 + b * 30, 'rgba(214,226,255,0.5)', 0.8 + b * 0.3, t, 0.02);
    ctx.fillStyle = '#e6edff';
    ctx.beginPath(); ctx.arc(wx + ww * 0.7, wy + 90, 26, 0, TAU); ctx.fill();
    ctx.fillStyle = '#0e142c';
    ctx.beginPath(); ctx.arc(wx + ww * 0.7 - 12, wy + 84, 22, 0, TAU); ctx.fill();
    /* far fields */
    R.hills(ctx, wy + wh - 60, 26, '#0a0d1f', 31, t);
    ctx.restore();
    /* window frame */
    ctx.strokeStyle = '#050308'; ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(wx, wy + wh); ctx.lineTo(wx, wy + 80);
    ctx.quadraticCurveTo(wx + ww / 2, wy - 70, wx + ww, wy + 80);
    ctx.lineTo(wx + ww, wy + wh);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(wx + ww / 2, wy - 16); ctx.lineTo(wx + ww / 2, wy + wh);
    ctx.moveTo(wx, wy + 170); ctx.lineTo(wx + ww, wy + 170);
    ctx.lineWidth = 9; ctx.stroke();

    /* light shaft through window onto the child, grows with prayer */
    if (b > 0.02) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const sh = b * (0.16 + 0.04 * Math.sin(t * 0.8));
      const grad = ctx.createLinearGradient(wx + ww * 0.5, wy, this.childX, 760);
      grad.addColorStop(0, `rgba(214,226,255,${sh})`);
      grad.addColorStop(1, 'rgba(214,226,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(wx + 60, wy + 60);
      ctx.lineTo(wx + ww - 40, wy + 30);
      ctx.lineTo(this.childX + 170, 800);
      ctx.lineTo(this.childX - 150, 800);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    /* floorline */
    ctx.fillStyle = '#080509';
    ctx.fillRect(View.left, 760, View.W + 2, 140);

    /* candle on the sill */
    R.candle(ctx, wx + ww + 90, 700, 90, t, 0.35 + b * 0.65);
    lamp(ctx, wx + ww + 90, 640, 120 + b * 160, 'rgba(255,184,98,0.5)', 0.25 + b * 0.75, t);

    /* the child, kneeling toward the window */
    R.child(ctx, this.childX, 762, 264, { kneel: true });
    /* her shadow cast away from the window light */
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(this.childX - 30, 766, 90, 10, 0, 0, TAU);
    ctx.fill();

    /* warmth wash as the prayer holds */
    if (b > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = b * 0.5;
      ctx.fillStyle = '#ffd9a0';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },
};


/* ============ 12-ch2-dance.js ============ */
/* Chapter II — The Dance. Łódź, Wenecja Park, 1924.
   The one scene with a score — and the score is what you give up.
   Tap to dance: the combo climbs, the music plays, and Someone is waiting. */

SCENES.ch2 = {
  id: 'ch2',
  enter() {
    this.t = 0;
    this.state = 'dance';        // dance → vision → after → cathedral
    this.combo = 0;
    this.comboPop = 0;
    this.comboAlpha = 1;
    this.lean = 0; this.leanTarget = 0;
    this.gray = 0;               // 0 warm party → 1 drained
    this.freeze = 0;
    this.glimpse = 0;
    this.visionI = 0;            // the suffering Christ figure
    this.brightPulse = 0;
    this.lanternFlare = 0;
    this.heroX = -260;
    this.walker = new Walker(-260, 800, { speed: 130, onStep: () => Audio.step(0.12) });
    this.exitGlow = 0;
    this.cath = { bloom: new PrayBloom({ riseTime: 2.6 }), candles: [] };
    for (let i = 0; i < 14; i++) {
      this.cath.candles.push({ x: rand(-560, -300) * (i % 2 ? -1 : 1) + rand(-40, 40), y: rand(560, 680), s: rand(28, 52) });
    }
    this.dancers = [];
    for (let i = 0; i < 7; i++) {
      this.dancers.push({
        /* fixed world coords — camera always re-centers on scene enter */
        x: lerp(-620, 620, (i + 0.5) / 7) + rand(-40, 40),
        depth: rand(0, 1), phase: rand(0, TAU), drift: rand(-14, 14),
      });
    }
    Engine.grainAmt = 0.07;
    if (AC) { Audio.pad.set(null); Audio.waltz.start(0.4); }
  },
  exit() {
    Audio.waltz.stop(1);
    Audio.heartbeatStop();
  },

  script: function* (S) {
    const sc = SCENES.ch2;
    yield S.wait(2.2);
    yield S.textAuto('Łódź. Twelve years later.', 3.4);
    yield S.textAuto('Her sister begged her to come — one evening of music in Wenecja Park.', 4.5);
    yield S.textAuto('Helena wore her one good dress.', 3.8);
    S.do(() => Hint.show('tap with the music', { ttl: 5 }));
    yield S.waitFor(() => sc.combo >= 18);
    /* ---- the vision ---- */
    S.do(() => sc._beginVision());
    yield S.wait(3.4);
    yield S.text('The music kept playing. The dancers kept turning.');
    yield S.text('But Helena saw only Him — racked with pain, stripped of His clothing, covered in wounds.');
    yield S.text('How long shall I put up with you and how long will you keep putting Me off?', { voice: true, attr: 'Diary, 9' });
    S.do(() => sc._burnScore());
    yield S.wait(2.6);
    S.do(() => { sc.state = 'after'; Hint.show('there is nothing here — hold, and walk away', { ttl: 6 }); });
    yield S.waitFor(() => sc.walker.x > View.right - 140);
    /* ---- the cathedral ---- */
    S.do(() => sc._toCathedral());
    yield S.wait(2.8);
    yield S.textAuto('The Cathedral of Saint Stanislaus Kostka. She did not remember walking there.', 4.6);
    yield S.text('She fell prostrate before the Blessed Sacrament and asked what He wanted of her.');
    yield S.holdTotal(2.6, { hint: 'hold', hintAfter: 4 });
    yield S.waitFor(() => sc.cath.bloom.v > 0.95);
    yield S.wait(1.4);
    yield S.text('Go at once to Warsaw; you will enter a convent there.', { voice: true, attr: 'Diary, 10' });
    yield S.text('She went home only to pack a small bag, and asked her sister to say goodbye for her.');
    yield S.text('She was nineteen, and she had stopped pretending.');
    S.do(() => Engine.nextChapter());
  },

  _beginVision() {
    this.state = 'vision';
    Audio.waltz.setWarp(1);
    Audio.waltz.setLevel(0.1, 3);
    Engine.after(2600, () => Audio.waltz.stop(3));
    Audio.heartbeatStart(46, 0.3);
    Tweens.to(this, { gray: 1 }, 4, { ease: Ease.inOutSine });
    Tweens.to(this, { visionI: 1 }, 5, { ease: Ease.inOutSine, delay: 1 });
    Engine.shake(0.18);
    Audio.thunder(0.12);
  },
  _burnScore() {
    Tweens.to(this, { comboAlpha: 0 }, 2.2, { ease: Ease.inOutSine });
    const y = 120;
    for (let i = 0; i < 26; i++) {
      Particles.spawn({
        x: rand(-110, 110), y: y + rand(-12, 12),
        vx: rand(-10, 10), vy: rand(8, 40), ay: 26,
        life: rand(1.4, 2.8), size: rand(1, 2.6), endSize: 0.2,
        color: pick(['#8a8276', '#a39685', '#6e675e']), alpha: 0.7,
        wobble: rand(4, 12), fadeIn: 0.2,
      });
    }
    Audio.swish(0.16);
  },
  _toCathedral() {
    Audio.heartbeatStop();
    Engine.fade.color = '#000000';
    Tweens.to(Engine.fade, { alpha: 1 }, 1.6, {
      key: 'fade', ease: Ease.inOutQuad, onDone: () => {
        this.state = 'cathedral';
        this.t = 0;
        Audio.pad.set([['D2', 'A2', 'F3', 'D4'], ['G1', 'D3', 'Bb3', 'G3'], ['A1', 'E3', 'A3', 'C#4'], ['D2', 'A2', 'D3', 'F3']], { level: 0.42, hold: 12, bright: 620 });
        Audio.bell('A2', 0.22, 1.4);
        Tweens.to(Engine.fade, { alpha: 0 }, 2.4, { key: 'fade' });
      },
    });
  },

  onPress(p) {
    if (this.state === 'dance') {
      this.combo++;
      this.comboPop = 1;
      Tweens.to(this, { comboPop: 0 }, 0.5, { key: 'pop', ease: Ease.outCubic });
      this.leanTarget = this.leanTarget >= 0 ? -1 : 1;
      Tweens.to(this, { lean: this.leanTarget }, 0.4, { key: 'lean', ease: Ease.outBack });
      this.brightPulse = 1;
      this.lanternFlare = 1;
      Tweens.to(this, { lanternFlare: 0 }, 0.7, { key: 'flare' });
      const scale = ['D4', 'E4', 'F4', 'G4', 'A4', 'C5', 'D5', 'E5'];
      Audio.pluck(scale[this.combo % scale.length], 0.22);
      Particles.burst(this.heroX, 815, 7, () => ({
        x: this.heroX + rand(-26, 26), y: 815 + rand(-6, 6),
        vx: rand(-50, 50), vy: rand(-60, -10), life: rand(0.4, 0.9),
        size: rand(1.5, 3), endSize: 0, color: '#ffd9a0', alpha: 0.8,
        additive: true, glow: true, drag: 0.93,
      }));
      this.gray = clamp01(this.combo / 22);
      Audio.waltz.setWarp(this.combo / 20);
      if (this.combo === 7 || this.combo === 13) {
        this.freeze = 0.16;
        this.glimpse = 1;
        Tweens.to(this, { glimpse: 0 }, 1.6, { key: 'glimpse', ease: Ease.inOutSine });
        Audio.thunder(0.05);
      }
    } else if (this.state === 'after') {
      if (AC) blip(Audio.out(0.7, 0.1), 130, 0.1, 0.07, 'sine');   // dead, dull
    }
  },

  update(dt) {
    this.t += dt;
    if (this.freeze > 0) { this.freeze -= dt; return; }
    if (this.state === 'dance' || this.state === 'vision') {
      const spin = this.state === 'dance' ? 1 : 0.06;
      for (const d of this.dancers) {
        d.phase += dt * 1.6 * spin;
        d.x += d.drift * dt * spin;
        if (d.x < View.left + 80) d.drift = Math.abs(d.drift);
        if (d.x > View.right - 80) d.drift = -Math.abs(d.drift);
      }
      this.brightPulse = Math.max(0, this.brightPulse - dt * 1.4);
      this.lean *= Math.pow(0.4, dt);
    }
    if (this.state === 'after') {
      const dir = Input.down ? 1 : (Input.axis() || 0);
      this.walker.x = Math.max(this.walker.x, this.heroX);
      this.walker.update(dt, dir > 0 || Input.down ? 1 : 0);
      this.heroX = this.walker.x;
      this.exitGlow = damp(this.exitGlow, 1, 0.8, dt);
    }
    if (this.state === 'cathedral') {
      this.cath.bloom.update(dt);
      Audio.pad.targetLevel = 0.42 + this.cath.bloom.v * 0.26;
      if (Input.down && Math.random() < 0.12) Particles.mote(rand(-80, 80), rand(500, 700));
    }
  },

  draw(ctx) {
    if (this.state === 'cathedral') { this._drawCathedral(ctx); return; }
    const t = this.t, g = this.gray;
    /* park night sky — warm amber dusk before it drains */
    R.sky(ctx, 'ch2-sky', [[0, '#150c18'], [0.55, '#33182a'], [1, '#4e2326']], View.left, 0, View.W + 2, 900);
    ctx.save();
    ctx.globalAlpha = g * 0.92;
    R.sky(ctx, 'ch2-gray', [[0, '#0b0a10'], [0.6, '#121119'], [1, '#16141d']], View.left, 0, View.W + 2, 900);
    ctx.restore();
    /* ground */
    ctx.fillStyle = mixHex('#33201f', '#0e0d13', g);
    ctx.fillRect(View.left, 760, View.W + 2, 140);
    /* trees framing */
    R.tree(ctx, View.left + 90, 800, 460, 17, mixHex('#160d16', '#0a090e', g));
    R.tree(ctx, View.right - 70, 790, 520, 29, mixHex('#160d16', '#0a090e', g));

    /* lantern strings: two sagging catenaries */
    const warm = 1 - g * 0.85;
