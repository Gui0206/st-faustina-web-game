      Audio.celesta('A4', 0.3);
      Tweens.to(v, { lift: 1, warmth: 0.7 }, 2.4, { ease: Ease.inOutSine });
      Engine.after(1800, () => { v.state = 'resolved'; });
    } else {
      Hint.show('hold', { ttl: 4 });
      v.state = 'praying';
      this.prayHold = new PrayBloom({
        riseTime: 1.6, fall: 0.3,
        onFull: () => {
          Hint.hide();
          this.prayHold = null;
          Audio.shimmer(0.4, 1000);
          Tweens.to(v, { guardian: 1, warmth: 0.5 }, 2.2, { ease: Ease.inOutSine });
          for (let i = 0; i < 14; i++) {
            Engine.after(i * 110, () => Particles.mote(v.x + rand(-40, 40), v.y - rand(40, v.def.h)));
          }
          Engine.after(1600, () => { v.state = 'resolved'; });
        },
      });
    }
  },
  _dismissVisitor() {
    const v = this.visitor;
    v.state = 'leaving';
    Engine.after(2600, () => { if (this.visitor === v) this.visitor = null; });
  },

  onPress() {},
  update(dt) {
    this.t += dt;
    const v = this.visitor;
    if (v) {
      if (v.state === 'approaching') {
        v.x = damp(v.x, -40, 1.6, dt);
        if (v.x > -60) v.state = 'waiting';
      } else if (v.state === 'leaving') {
        v.x -= 90 * dt;
      } else if (v.state === 'praying' && this.prayHold) {
        this.prayHold.update(dt);
      }
    }
    if (this.loafAnim) {
      const L = this.loafAnim;
      L.t += dt / 0.9;
      if (L.t >= 1) this.loafAnim = null;
    }
    /* drizzle */
    const rainAmt = this.reveal > 0.3 ? (1 - this.reveal) : 1;
    for (let i = 0; i < Math.round(2.4 * rainAmt); i++) {
      Particles.spawn({
        x: rand(View.left, View.right), y: View.top - 10,
        vx: -40, vy: rand(420, 540), life: 1.7,
        size: 1.8, endSize: 1.8, color: 'rgba(150,170,205,0.4)', alpha: rand(0.07, 0.2),
        shape: 'streak',
      });
    }
  },

  draw(ctx) {
    const t = this.t, rv = this.reveal;
    /* gray drizzling morning */
    const top = mixHex('#272c3a', '#39405c', rv * 0.5);
    const bot = mixHex('#3a3d4c', '#6a6480', rv * 0.5);
    const g = ctx.createLinearGradient(0, 0, 0, 900);
    g.addColorStop(0, top); g.addColorStop(1, bot);
    ctx.fillStyle = g; ctx.fillRect(View.left, 0, View.W + 2, 900);
    /* far rooftops through the rain */
    R.hills(ctx, 560, 120, 'rgba(24,26,38,0.55)', 67, t);
    /* convent wall, right side */
    ctx.fillStyle = '#2c2536';
    ctx.fillRect(120, 240, View.right - 120 + 10, 660);
    /* stone texture hints */
    srand(13);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    for (let i = 0; i < 30; i++) ctx.fillRect(140 + rng() * (View.right - 200), 260 + rng() * 560, 40 + rng() * 60, 2);
    /* wall cap */
    ctx.fillStyle = '#241e2e';
    ctx.fillRect(112, 228, View.right - 112 + 10, 18);
    /* the gate arch in the wall */
    ctx.fillStyle = '#0c0a12';
    ctx.beginPath();
    ctx.moveTo(140, 900); ctx.lineTo(140, 480);
    ctx.quadraticCurveTo(250, 380, 360, 480);
    ctx.lineTo(360, 900);
    ctx.closePath(); ctx.fill();
    /* warm light inside the gate */
    lamp(ctx, 250, 640, 170 + rv * 120, 'rgba(255,196,120,0.55)', 0.55 + rv * 0.45, t, 0.06);
    /* gate bars */
    ctx.strokeStyle = '#060509'; ctx.lineWidth = 7;
    for (let i = 0; i < 6; i++) {
      const bx = 162 + i * 36;
      ctx.beginPath(); ctx.moveTo(bx, 900); ctx.lineTo(bx, 470 + Math.pow(Math.abs(i - 2.5) / 2.5, 2) * -40 + 30);
      ctx.stroke();
    }
    /* lamp over the gate */
    lamp(ctx, 250, 420, 70, 'rgba(255,210,140,0.8)', 0.85, t, 0.12);
    ctx.fillStyle = '#ffd9a0';
    ctx.beginPath(); ctx.arc(250, 420, 6, 0, TAU); ctx.fill();

    /* wet street */
    ctx.fillStyle = '#23222e';
    ctx.fillRect(View.left, 800, View.W + 2, 100);
    ctx.fillStyle = 'rgba(160,170,200,0.07)';
    ctx.fillRect(View.left, 800, View.W + 2, 5);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.07;
    R.glow(ctx, 250, 830, 180, 'rgba(255,196,120,0.8)');
    ctx.restore();

    /* Faustina inside the gate */
    R.nun(ctx, 262, 818, 256, { color: '#16111c', flip: true });
    /* bread basket beside her */
    ctx.fillStyle = '#241b22';
    ctx.beginPath(); ctx.ellipse(330, 802, 44, 14, 0, 0, TAU); ctx.fill();
    for (let i = 0; i < this.bread; i++) {
      ctx.fillStyle = '#9a7448';
      ctx.beginPath(); ctx.ellipse(316 + i * 16, 792, 13, 8, 0.3, 0, TAU); ctx.fill();
    }

    /* visitor */
    const v = this.visitor;
    if (v) {
      const warmCol = mixHex('#11101a', '#3a2a26', v.warmth);
      const hunch = v.def.hunch * (1 - v.lift * 0.8);
      R.cloaked(ctx, v.x, v.y, v.def.h, { color: warmCol, hunch });
      if (v.def.child) {
        ctx.fillStyle = warmCol;
        ctx.beginPath(); ctx.arc(v.x + 26, v.y - v.def.h * 0.62, v.def.h * 0.07, 0, TAU); ctx.fill();
      }
      if (v.warmth > 0.02) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = v.warmth * 0.35;
        R.glow(ctx, v.x, v.y - v.def.h * 0.5, v.def.h * 0.55, 'rgba(255,196,130,0.5)');
        ctx.restore();
      }
      if (v.guardian > 0.02) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = v.guardian * (0.3 + 0.1 * Math.sin(t * 1.8));
        R.glow(ctx, v.x, v.y - v.def.h * 1.05, 30, '#fff3d8');
        ctx.restore();
      }
      /* the soup bowl */
      if (v.def.last && this.soup > 0.02) {
        const bx = v.x + 40, by = v.y - v.def.h * 0.42;
        ctx.globalAlpha = this.soup;
        ctx.fillStyle = '#2c2026';
        ctx.beginPath(); ctx.ellipse(bx, by, 20, 8, 0, 0, TAU); ctx.fill();
        ctx.globalAlpha = 1;
        if (Math.random() < 0.3) {
          Particles.spawn({
            x: bx + rand(-8, 8), y: by - 6, vx: rand(-2, 4), vy: rand(-26, -14),
            life: rand(0.8, 1.6), size: 4, endSize: 10, color: '#cfd0d8', alpha: 0.08, fadeIn: 0.3,
          });
        }
      }
      /* the revelation */
      if (rv > 0.02 && v.def.last) {
        R.lumen(ctx, v.x, v.y, v.def.h * 1.35, t, { intensity: rv, rays: rv * 0.5, raise: 0.6, rayLen: 700 });
      }
    }
    /* flying loaf */
    if (this.loafAnim) {
      const L = this.loafAnim, tt = Ease.inOutQuad(clamp01(L.t));
      const lx = lerp(L.from.x, L.to.x, tt);
      const ly = lerp(L.from.y, L.to.y, tt) - Math.sin(tt * Math.PI) * 90;
      ctx.fillStyle = '#a87e4e';
      ctx.beginPath(); ctx.ellipse(lx, ly, 13, 8, tt * 2, 0, TAU); ctx.fill();
    }
    /* reveal wash */
    if (rv > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = rv * 0.6;
      ctx.fillStyle = '#ffe3b8';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },
};


/* ============ 18-ch8-darknight.js ============ */
/* Chapter VIII — The Dark Night. Prądnik sanatorium, 1938.
   The hold that goes unanswered. The verb breaks on purpose — and walking
   on anyway IS the prayer. At three o'clock, a bell. */

SCENES.ch8 = {
  id: 'ch8',
  enter() {
    this.t = 0;
    this.hero = new Walker(0, 812, { speed: 96, onStep: () => Audio.step(0.2) });
    this.hero.x = 0;
    this.worldEnd = 2400;
    this.flame = 0.06;           // nearly out
    this.flameAnswered = false;
    this.whispers = [];
    this.whisperT = 4;
    this.whisperPool = [
      'where is He now?', 'you imagined all of it', 'a cook — a prophet?',
      'no one believes you', 'the night has no far side', 'He has gone quiet, hasn’t He',
    ];
    this.coughT = 9;
    this.coughDim = 0;
    this.bellCount = 0;
    this.goldHorizon = 0;
    this.snowT = 0;
    this.benchSaid = false;
    Engine.grainAmt = 0.1;
    Audio.pad.set([['D2', 'A2', 'Eb3'], ['D2', 'Ab2', 'D3'], ['C#2', 'G2', 'C#3'], ['D2', 'A2', 'D3']], { level: 0.14, hold: 14, bright: 380 });
    Audio.channels.wind.set(0.34, 240);
    Audio.heartbeatStart(40, 0.22);
  },
  exit() {
    Audio.heartbeatStop();
    Audio.channels.wind.set(0);
  },

  script: function* (S) {
    const sc = SCENES.ch8;
    yield S.wait(2.4);
    yield S.text('The tuberculosis reached her lungs, then everything else. They sent her to the sanatorium at Prądnik.');
    yield S.text('And there, the visions stopped. The voice stopped. Heaven went dark and silent as this garden.');
    S.do(() => Hint.show('hold —', { ttl: 3.4 }));
    yield S.wait(4);
    S.do(() => Hint.show('…nothing answers. keep walking.', { ttl: 5 }));
    yield S.waitFor(() => sc.hero.x > sc.worldEnd * 0.5);
    S.do(() => { sc.benchSaid = true; });
    yield S.text('She kept a dry record of those weeks. No comfort in it — only this:');
    yield S.text('Suffering is a great grace; through suffering the soul becomes like the Savior; in suffering love becomes crystallized.', { quote: true, attr: 'Diary, 57' });
    yield S.waitFor(() => sc.hero.x > sc.worldEnd * 0.96);
    /* the bell */
    S.do(() => sc._bells());
    yield S.wait(6.4);
    yield S.text('As often as you hear the clock strike the third hour, immerse yourself completely in My mercy, adoring and glorifying it.', { voice: true, attr: 'Diary, 1572' });
    yield S.text('In this hour, I will refuse nothing to the soul that makes a request of Me in virtue of My Passion.', { voice: true, attr: 'Diary, 1320' });
    yield S.wait(0.5);
    yield S.text('The flame had not answered her holding. It returned anyway — not earned. Given.');
    yield S.text('The graces of My mercy are drawn by means of one vessel only, and that is — trust. The more a soul trusts, the more it will receive.', { voice: true, attr: 'Diary, 1578' });
    S.do(() => Engine.nextChapter());
  },

  _bells() {
    const toll = i => {
      Audio.bell('D3', 0.5, 2.2);
      Engine.shake(0.04);
      this.bellCount++;
      if (i === 2) {
        Tweens.to(this, { flame: 1 }, 4, { ease: Ease.inOutSine });
        Tweens.to(this, { goldHorizon: 1 }, 6, { ease: Ease.inOutSine });
        Audio.pad.set([['D2', 'A2', 'F#3', 'D4'], ['G2', 'D3', 'B3'], ['A2', 'E3', 'C#4'], ['D2', 'A2', 'D4']], { level: 0.4, hold: 11, bright: 880 });
        Audio.shimmer(0.4, 600);
        for (const w of this.whispers) w.dying = true;
        this.flameAnswered = true;
      }
    };
    toll(0);
    Engine.after(2300, () => toll(1));
    Engine.after(4600, () => toll(2));
  },

  onPress() {
    /* the broken verb: a tiny flicker of effort, then nothing */
    if (!this.flameAnswered) {
      Tweens.to(this, { flame: Math.min(this.flame + 0.05, 0.16) }, 0.3, {
        key: 'fl', onDone: () => { if (!this.flameAnswered) Tweens.to(this, { flame: 0.06 }, 1.6, { key: 'fl' }); },
      });
    }
  },

  update(dt) {
    this.t += dt;
    const dir = (Input.down || Input.axis() > 0) ? 1 : (Input.axis() < 0 ? -1 : 0);
    if (this.coughDim <= 0.35) this.hero.update(dt, dir);
    this.hero.x = clamp(this.hero.x, 0, this.worldEnd);
    Engine.cam.x = damp(Engine.cam.x, this.hero.x + 140, 3, dt);

    /* whispers born of walking */
    this.whisperT -= dt * (0.4 + this.hero.moving);
    if (this.whisperT <= 0 && !this.flameAnswered) {
      this.whisperT = rand(4, 7);
      this.whispers.push({
        text: pick(this.whisperPool),
        x: Engine.cam.x + View.W / 2 + 100, y: rand(300, 620),
        a: 0, life: 0, dying: false,
      });
    }
    for (let i = this.whispers.length - 1; i >= 0; i--) {
      const w = this.whispers[i];
      w.life += dt;
      w.x -= dt * (26 + this.hero.moving * 40);
      w.a = w.dying ? Math.max(0, w.a - dt * 0.8) : Math.min(0.34, w.a + dt * 0.12);
      if (w.life > 16 || (w.dying && w.a <= 0)) this.whispers.splice(i, 1);
    }
    /* cough */
    this.coughT -= dt * (0.5 + this.hero.moving * 0.7);
    if (this.coughT <= 0 && !this.flameAnswered) {
      this.coughT = rand(8, 13);
      this.coughDim = 1;
      if (AC) {
        blip(Audio.out(0.8, 0.1), 300, 0.16, 0.12, 'noise');
        setTimeout(() => blip(Audio.out(0.8, 0.1), 260, 0.13, 0.1, 'noise'), 240);
      }
      Engine.shake(0.05);
    }
    this.coughDim = Math.max(0, this.coughDim - dt * 0.8);
    /* snow */
    this.snowT -= dt;
    if (this.snowT <= 0) {
      this.snowT = 0.07;
      Particles.snow(Engine.cam.x, -20, View.W + 240);
    }
  },

  draw(ctx) {
    const t = this.t, gold = this.goldHorizon;
    /* near-black world */
    const g = ctx.createLinearGradient(0, 0, 0, 900);
    g.addColorStop(0, '#040308');
    g.addColorStop(0.7, mixHex('#07060c', '#0d0a12', gold * 0.5));
    g.addColorStop(1, mixHex('#0a0810', '#241a14', gold));
    ctx.fillStyle = g; ctx.fillRect(View.left, 0, View.W + 2, 900);
    /* gold horizon thread at the answer */
    if (gold > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = gold * 0.6;
      const hg = ctx.createLinearGradient(0, 778, 0, 812);
      hg.addColorStop(0, 'rgba(255,196,110,0)');
      hg.addColorStop(0.5, 'rgba(255,196,110,0.5)');
      hg.addColorStop(1, 'rgba(255,196,110,0)');
      ctx.fillStyle = hg;
      ctx.fillRect(View.left, 778, View.W + 2, 34);
      ctx.restore();
    }
    /* sanatorium far behind */
    ctx.fillStyle = '#06050b';
    ctx.fillRect(-700, 560, 560, 250);
    srand(55);
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = rng() < 0.3 ? 'rgba(186,160,120,0.16)' : 'rgba(8,8,12,0.9)';
      ctx.fillRect(-660 + (i % 4) * 130, 600 + Math.floor(i / 4) * 90, 36, 52);
    }
    /* avenue of bare trees */
    for (let i = 0; i < 14; i++) {
      const tx = i * 360 - 200;
      if (tx < Engine.cam.x - View.W || tx > Engine.cam.x + View.W) continue;
      R.tree(ctx, tx, 816, 420 + (i % 3) * 60, 100 + i, '#060409');
    }
    /* ground */
    ctx.fillStyle = '#080710';
    ctx.fillRect(View.left, 806, View.W + 2, 100);
    ctx.fillStyle = 'rgba(223,230,242,0.04)';
    ctx.fillRect(View.left, 806, View.W + 2, 6);

    /* whispers */
    ctx.save();
    ctx.font = 'italic 19px "Iowan Old Style","Palatino Linotype",Georgia,serif';
    ctx.textAlign = 'center';
    for (const w of this.whispers) {
      ctx.globalAlpha = w.a * (0.7 + 0.3 * Math.sin(w.life * 1.4));
      ctx.fillStyle = '#8b8794';
      ctx.fillText(w.text, w.x, w.y + Math.sin(w.life * 0.8) * 8);
    }
    ctx.restore();

    /* Faustina with her lantern-candle */
    R.nun(ctx, this.hero.x, 812, 240, { color: '#0b0910', walk: this.hero.phase, coif: 'rgba(180,172,158,0.5)' });
    const lampX = this.hero.x + 56, lampY = 700;
    R.candle(ctx, lampX, lampY + 26, 44, t, this.flame);
    lamp(ctx, lampX, lampY, 60 + this.flame * 200, 'rgba(255,180,100,0.5)', this.flame, t, 0.16);
    /* the answered flame sheds motes */
    if (this.flameAnswered && Math.random() < 0.25) Particles.mote(lampX + rand(-10, 10), lampY - rand(0, 30));

    /* cough dim */
    if (this.coughDim > 0.01) {
      ctx.fillStyle = `rgba(0,0,0,${this.coughDim * 0.5})`;
      ctx.fillRect(View.left, 0, View.W + 2, 900);
    }
  },
};


/* ============ 19-ch9-passing.js ============ */
/* Chapter IX — Jezu, Ufam Tobie. Kraków-Łagiewniki, 5 October 1938.
   Breathe with her. Then the verb of the whole game inverts:
   the last hold is a letting-go. */

SCENES.ch9 = {
  id: 'ch9',
  enter() {
    this.t = 0;
    this.phase = 'breathe';        // breathe → finalhold → release → light
    this.cycle = 0;
    this.cyclesNeeded = 3;
    this.breath = 0;               // 0..1 within current inhale
    this.inhaled = false;
    this.dim = 0;                  // grows each cycle
    this.finalHold = 0;
    this.promptLetGo = false;
    this.released = false;
    this.raysI = 0;
    this.words = ['JEZU', 'UFAM', 'TOBIE'];
    this.wordsShown = 0;
    this.silence = false;
    Engine.grainAmt = 0.07;
    Audio.pad.set([['D2', 'A2', 'F3', 'D4'], ['Bb1', 'F3', 'D4'], ['G1', 'D3', 'Bb3'], ['A1', 'E3', 'A3']], { level: 0.3, hold: 13, bright: 520 });
  },
  exit() { Audio.channels.air.set(0); Audio.channels.choir.set(0); },

  script: function* (S) {
    const sc = SCENES.ch9;
    yield S.wait(2.6);
    yield S.textAuto('Kraków-Łagiewniki. The night of the fifth of October, 1938.', 4.6);
    yield S.textAuto('She was thirty-three — the age of her Lord.', 4.2);
    S.do(() => Hint.show('breathe with her — hold… and release', { ttl: 6 }));
    yield S.waitFor(() => sc.cycle >= 1);
    yield S.textAuto('The sisters knelt at the bed. The candle kept its small vigil.', 4.6);
    yield S.waitFor(() => sc.cycle >= 2);
    yield S.textAuto('You are the secretary of My mercy; I have chosen you for that office in this life and the next life.', 6, { voice: true, attr: 'Diary, 1605' });
    yield S.waitFor(() => sc.cycle >= sc.cyclesNeeded);
    S.do(() => { sc.phase = 'finalhold'; Hint.show('hold', { ttl: 4 }); });
    yield S.waitFor(() => sc.released);
    /* the passage */
    yield S.wait(2.4);                                  // held black silence
    S.do(() => sc._light());
    yield S.wait(7);
    yield S.text('Jezu, ufam Tobie.', { quote: true });
    yield S.wait(0.4);
    S.do(() => {
      Engine.fade.color = '#fdf8ee';
      Tweens.to(Engine.fade, { alpha: 1 }, 3.4, { key: 'fade', ease: Ease.inOutSine, onDone: () => Engine.nextChapter() });
    });
    yield S.wait(5);
  },

  _light() {
    this.phase = 'light';
    Audio.celesta('D5', 0.4);
    Engine.after(1400, () => {
      Audio.pad.set([['D2', 'A2', 'D3', 'F#3', 'A3'], ['G2', 'D3', 'G3', 'B3'], ['A2', 'E3', 'A3', 'C#4'], ['D2', 'A2', 'F#4', 'D4']], { level: 0.6, hold: 9, bright: 1300 });
      Audio.channels.choir.set(0.3);
      Audio.motif({ final: true, bell: true, vel: 0.4, slow: true });
      Tweens.to(this, { raysI: 1 }, 6, { ease: Ease.inOutSine });
      Tweens.to(Engine.fade, { alpha: 0 }, 2.6, { key: 'fade', ease: Ease.inOutSine });
    });
    for (let i = 0; i < 60; i++) {
      Engine.after(1500 + i * 90, () => {
        Particles.spawn({
          x: rand(-500, 500), y: rand(300, 900),
          vx: rand(-6, 6), vy: rand(-70, -30), life: rand(3, 6),
          size: rand(1.5, 4), endSize: 0.4, color: pick(['#fff3d8', '#ffd9e0', '#dfe9ff']),
          alpha: rand(0.3, 0.7), additive: true, glow: true, wobble: rand(6, 16), fadeIn: 0.8,
        });
      });
    }
  },

  onPress() {},
  onRelease() {
    if (this.phase === 'breathe' && this.inhaled) {
      this.cycle++;
      this.inhaled = false;
      this.dim = clamp01(this.cycle / (this.cyclesNeeded + 1));
      Audio.channels.air.set(0.05, 480, 0.5);
      setTimeout(() => Audio.channels.air.set(0, undefined, 0.8), 700);
    } else if (this.phase === 'finalhold') {
      if (this.promptLetGo) {
        this.released = true;
        this.silence = true;
        this.phase = 'release';
        Hint.hide(); Text.clear();
        /* absolute quiet, absolute dark */
        Audio.pad.set(null);
        Audio.channels.air.set(0); Audio.channels.wind.set(0);
        Audio.heartbeatStop();
        Engine.fade.color = '#000000';
        Engine.fade.alpha = 1;
      } else {
        /* released too soon — the ring simply resets, no punishment */
        this.finalHold = 0;
      }
    }
  },

  update(dt) {
    this.t += dt;
    if (this.phase === 'breathe') {
      if (Input.down) {
        this.breath = clamp01(this.breath + dt / (1.4 + this.cycle * 0.5));
        if (this.breath >= 1) this.inhaled = true;
        Audio.channels.air.set(0.1 * this.breath, 540 + this.breath * 160, 0.2);
      } else {
        this.breath = Math.max(0, this.breath - dt * 1.4);
        if (this.breath <= 0) Audio.channels.air.set(0, undefined, 0.4);
      }
    } else if (this.phase === 'finalhold') {
      if (Input.down) {
        this.finalHold += dt;
        this.wordsShown = Math.min(3, Math.floor(this.finalHold / 1.1));
        if (this.finalHold > 3.6 && !this.promptLetGo) {
          this.promptLetGo = true;
          Hint.show('— let go', { ttl: 10 });
          Audio.shimmer(0.2, 500);
        }
        Audio.channels.air.set(0.06 + Math.min(this.finalHold * 0.02, 0.1), 520, 0.3);
      } else {
        this.wordsShown = 0;
      }
    }
  },

  draw(ctx) {
    const t = this.t;
    if (this.phase === 'release') return;            // pure black; the fade covers all
    if (this.phase === 'light') { this._drawLight(ctx); return; }
    const dim = this.dim;
    /* the cell, very dim, warm */
    const g = ctx.createLinearGradient(0, 0, 0, 900);
    g.addColorStop(0, mixHex('#0b0810', '#070509', dim));
    g.addColorStop(1, mixHex('#120d14', '#0a070c', dim));
    ctx.fillStyle = g; ctx.fillRect(View.left, 0, View.W + 2, 900);
    /* small window, moonlit */
    ctx.fillStyle = 'rgba(60,72,110,0.5)';
    ctx.fillRect(-560, 220, 130, 180);
    ctx.strokeStyle = '#070509'; ctx.lineWidth = 8;
    ctx.strokeRect(-560, 220, 130, 180);
    lamp(ctx, -495, 310, 90, 'rgba(170,190,240,0.3)', 0.5 - dim * 0.3, t, 0.02);
    /* the bed — a modest convent cot, scaled to the sisters kneeling beside it */
    ctx.fillStyle = '#15101a';
    ctx.fillRect(-150, 660, 320, 92);
    ctx.fillStyle = '#1d1722';
    ctx.fillRect(-166, 632, 26, 130);
    ctx.fillStyle = '#241d2b';
    ctx.fillRect(160, 642, 26, 120);
    /* her form, white linen */
    const breathLift = this.phase === 'breathe' ? this.breath * 7 : Math.max(0, 4 - this.finalHold);
    ctx.fillStyle = mixHex('#c9bfae', '#8e887e', dim * 0.6);
    ctx.beginPath();
    ctx.moveTo(-128, 676);
    ctx.quadraticCurveTo(-92, 652 - breathLift, -16, 656 - breathLift);
    ctx.quadraticCurveTo(78, 662, 142, 672);
    ctx.lineTo(142, 700); ctx.lineTo(-128, 700);
    ctx.closePath(); ctx.fill();
    /* her face — only suggested: a pale oval turned upward */
    ctx.fillStyle = mixHex('#d8cdbb', '#a39a8c', dim * 0.5);
    ctx.beginPath(); ctx.ellipse(-102, 660 - breathLift, 14, 11, -0.2, 0, TAU); ctx.fill();
    /* kneeling sisters at the bedside, bowed against the lit linen */
    R.nun(ctx, -128, 816, 215, { kneel: true, bow: 0.5, color: '#0b0910' });
    R.nun(ctx, 86, 824, 228, { kneel: true, bow: 0.4, color: '#0b0910', flip: true });
    /* vigil candle */
    R.candle(ctx, 248, 660, 64, t, 0.85 - dim * 0.4);
    lamp(ctx, 248, 610, 110, 'rgba(255,180,100,0.45)', 0.7 - dim * 0.4, t);

    /* breath ring */
    if (this.phase === 'breathe') {
      drawRing(ctx, 0, 420, 60, this.breath, 0.75, '#ffeedd');
    } else if (this.phase === 'finalhold') {
      const k = clamp01(this.finalHold / 3.6);
      drawRing(ctx, 0, 420, 60 - k * 18, Input.down ? 0.65 + 0.3 * Math.sin(t * 2.4) : 0.2, 0.85, '#fff3e4');
      /* the three words assemble below the ring as the hold deepens */
      const shown = this.words.slice(0, this.wordsShown);
      if (shown.length) {
        ctx.globalAlpha = 0.9;
        spacedTextAt(ctx, shown.join(' · '), 0, 530, 19, 6, 'rgba(240,233,219,0.9)');
        ctx.globalAlpha = 1;
      }
    }
    /* deep dim vignette as life ebbs */
    if (dim > 0.01) {
      ctx.fillStyle = `rgba(0,0,0,${dim * 0.35})`;
      ctx.fillRect(View.left, 0, View.W + 2, 900);
    }
  },

  _drawLight(ctx) {
    const t = this.t;
    ctx.fillStyle = '#020204';
    ctx.fillRect(View.left, 0, View.W + 2, 900);
    R.stars(ctx, t, this.raysI * 0.5, 47);
    R.mercyRays(ctx, 0, 320, this.raysI, t, { len: 1600, spread: 0.62, width: 0.2, angle: Math.PI / 2 });
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = this.raysI;
    R.glow(ctx, 0, 320, 180 + Math.sin(t * 0.9) * 30, '#fffaf0');
    ctx.restore();
  },
};


/* ============ 20-epilogue.js ============ */
/* Epilogue — The Spark. 1938 → today.
   A dark world; one point of light in Poland; history passes over it.
   Ends on the player's own painting as a keepsake. */

SCENES.epilogue = {
  id: 'epilogue',
  enter() {
    this.t = 0;
    this.lights = [{ x: 0.52, y: 0.36, a: 0, born: 0, main: true }];   // Łagiewniki
    this.lightTarget = 1;
    this.warShadow = 0;
    this.dimAll = 0;
    this.worldGlow = 0;
    this.meridian = -0.2;
    this.meridianOn = false;
    this.keepsakeShown = false;
    this.globeR = 330;
    if (!Painting.load() || !Painting.strokes.length) this._defaultPainting();
    Engine.grainAmt = 0.07;
    Audio.pad.set([['D2', 'A2', 'D3', 'F#3'], ['G2', 'D3', 'G3', 'B3'], ['Bb1', 'F3', 'Bb3', 'D4'], ['A2', 'E3', 'A3', 'C#4']], { level: 0.42, hold: 12, bright: 760 });
  },
  exit() {
    UI.els.keepsake.classList.remove('on');
    UI.els.keepsake.innerHTML = '';
    document.getElementById('app').classList.remove('show-cursor');
  },

  script: function* (S) {
    const sc = SCENES.epilogue;
    yield S.wait(2.6);
    yield S.textAuto('She was buried in the convent garden at Łagiewniki.', 4.6, { small: true });
    S.do(() => { sc.lights[0].a = 0.001; });
    yield S.wait(1);
    yield S.textAuto('1939. A year later, the darkness she had been shown swept out of the same sky.', 5.4);
    S.do(() => Tweens.to(sc, { warShadow: 1 }, 5, { ease: Ease.inOutSine }));
    yield S.wait(4.5);
    yield S.textAuto('But in hidden chapels, the Image was copied, and copied again.', 5);
    S.do(() => sc._spread(26, 0.18));
    yield S.wait(4.5);
    yield S.textAuto('1959. Rome — misled by a faulty translation of her Diary — silenced the devotion.', 5.6);
    S.do(() => Tweens.to(sc, { dimAll: 0.78 }, 3.4, { ease: Ease.inOutSine }));
    yield S.wait(4.5);
    yield S.textAuto('The archbishop of Kraków would not let her rest in obscurity: Karol Wojtyła.', 5.4);
    S.do(() => { sc.lights[0].pulse = true; });
    yield S.wait(4.2);
    yield S.textAuto('1978. The ban was lifted. Six months later the world learned the archbishop’s new name — John Paul II.', 6);
    S.do(() => {
      Tweens.to(sc, { dimAll: 0, warShadow: 0 }, 4, { ease: Ease.inOutSine });
      sc._spread(60, 0.5);
      Audio.shimmer(0.4, 800);
    });
    yield S.wait(5);
    yield S.textAuto('30 April 2000. Helena Kowalska — Sister Faustina — was declared a saint: the first of the Great Jubilee.', 6.2);
    S.do(() => { Audio.bell('D4', 0.34, 1.6); Audio.bell('A4', 0.2, 1.6); });
    yield S.wait(3);
    yield S.textAuto('And the Church received a new feast: the Second Sunday of Easter — Divine Mercy Sunday.', 5.8);
    S.do(() => {
      Tweens.to(sc, { worldGlow: 1 }, 5, { ease: Ease.inOutSine });
      sc._spread(90, 1);
      Audio.channels.choir.set(0.18);
    });
    yield S.wait(5);
    yield S.textAuto('Somewhere on earth, it is always three o’clock.', 6, { small: true });
    S.do(() => { sc.meridianOn = true; Audio.bell('D3', 0.3, 2); });
    yield S.wait(6.5);
    yield S.textAuto('And the image you painted in Vilnius —', 4.4);
    yield S.wait(1);
    S.do(() => sc._keepsake());
  },

  /* if the player reached the epilogue without painting (chapter select),
     give the keepsake a gentle hand-drawn-feeling default */
  _defaultPainting() {
    Painting.strokes = [];
    for (let s = 0; s < 5; s++) {
      const pts = [];
      const x0 = 0.38 + s * 0.06;
      for (let i = 0; i <= 16; i++) {
        const tt = i / 16;
        pts.push({ x: x0 + Math.sin(tt * 3 + s) * 0.025, y: 0.16 + tt * 0.62 });
      }
      Painting.strokes.push({ kind: 'garment', pts });
    }
    const ray = (kind, ex) => {
      const pts = [];
      for (let i = 0; i <= 14; i++) {
        const tt = i / 14;
        pts.push({ x: lerp(0.5, ex, Ease.inQuad(tt)) + Math.sin(tt * 5) * 0.008, y: lerp(0.42, 0.94, tt) });
      }
      Painting.strokes.push({ kind, pts });
    };
    ray('ray_red', 0.28); ray('ray_pale', 0.72);
    Painting.sigProgress = 1;
  },

  _spread(n, brightness) {
    for (let i = 0; i < n; i++) {
      Engine.after(i * rand(80, 220), () => {
        /* lights cluster near Poland early, then wander the world */
        const wide = this.lights.length > 20;
        const cx = wide ? Math.random() : 0.52 + rand(-0.16, 0.16);
        const cy = wide ? Math.random() : 0.36 + rand(-0.12, 0.14);
        const r = Math.hypot(cx - 0.5, cy - 0.5);
        if (r > 0.46) return;
        this.lights.push({ x: cx, y: cy, a: 0, born: this.t, b: brightness * rand(0.5, 1) });
        if (Math.random() < 0.3) Audio.pluck(pick(['D5', 'A5', 'F5', 'D6']), 0.07);
      });
    }
  },

  _keepsake() {
    if (this.keepsakeShown) return;
    this.keepsakeShown = true;
    Save.data.done = true; Save.write();
    const holder = UI.els.keepsake;
    holder.innerHTML = `
      <div id="ksframe"><canvas width="660" height="880"></canvas></div>
      <div class="ks-caption">Jezu, ufam Tobie — Jesus, I trust in You
        <small>painted by your hand · Vilnius, 1934</small></div>
      <div style="display:flex;gap:14px">
        <button class="ks-btn" id="ks-save">Keep this image</button>
        <button class="ks-btn" id="ks-title">Return</button>
      </div>`;
    const cv = holder.querySelector('canvas');
    this._renderKeepsake(cv);
    holder.querySelector('#ks-save').addEventListener('click', e => {
      e.stopPropagation();
      const big = document.createElement('canvas');
      big.width = 900; big.height = 1200;
      this._renderKeepsake(big, true);
      const a = document.createElement('a');
      a.download = 'jezu-ufam-tobie.png';
      a.href = big.toDataURL('image/png');
      a.click();
      Audio.celesta('D5', 0.4);
    });
    holder.querySelector('#ks-title').addEventListener('click', e => {
      e.stopPropagation();
      Engine.go('title');
    });
    for (const b of holder.querySelectorAll('button')) {
      b.addEventListener('pointerdown', e => e.stopPropagation());
    }
    holder.classList.add('on');
    document.getElementById('app').classList.add('show-cursor');
    Audio.motif({ final: true, vel: 0.36, slow: true });
  },

  _renderKeepsake(cv, full = false) {
    const g = cv.getContext('2d');
    const w = cv.width, h = cv.height;
    const grd = g.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, '#100d18'); grd.addColorStop(1, '#0a0810');
    g.fillStyle = grd; g.fillRect(0, 0, w, h);
    /* soft halo behind */
    const rad = g.createRadialGradient(w / 2, h * 0.42, 10, w / 2, h * 0.42, w * 0.7);
    rad.addColorStop(0, 'rgba(255,238,200,0.16)');
    rad.addColorStop(1, 'rgba(255,238,200,0)');
    g.fillStyle = rad; g.fillRect(0, 0, w, h);
    /* the player's painting */
    const pw = w * 0.78, ph = h * 0.78;
    Painting.render(g, (w - pw) / 2, h * 0.06, pw, ph, { glow: 1.15 });
    /* caption */
    g.textAlign = 'center';
    g.fillStyle = 'rgba(232,201,138,0.85)';
    g.font = `${Math.round(w * 0.026)}px Georgia,serif`;
    const cap1 = 'F A U S T Y N A';
    g.fillText(cap1, w / 2, h * 0.915);
    g.fillStyle = 'rgba(236,229,216,0.6)';
    g.font = `italic ${Math.round(w * 0.022)}px Georgia,serif`;
    g.fillText('“Not in the beauty of the color, nor of the brush… but in My grace.”', w / 2, h * 0.95);
    g.fillStyle = 'rgba(236,229,216,0.4)';
    g.font = `${Math.round(w * 0.017)}px Georgia,serif`;
    g.fillText('Diary, 313', w / 2, h * 0.975);
    if (full) {
      g.fillStyle = 'rgba(236,229,216,0.35)';
      g.fillText('vessel of mercy — a story from the Diary of Saint Faustina Kowalska', w / 2, h * 0.995 - 6);
    }
  },

  onPress() {},
  update(dt) {
    this.t += dt;
    for (const L of this.lights) {
      const target = (L.main ? 1 : (L.b || 0.5)) * (1 - this.dimAll * (L.main ? 0.55 : 1)) * this.lightTarget;
      L.a = damp(L.a, target, 0.9, dt);
    }
    if (this.meridianOn) {
      this.meridian += dt * 0.05;
      if (this.meridian > 1.3) this.meridian = -0.3;
    }
    if (this.worldGlow > 0.3 && Math.random() < 0.12) {
      Particles.mote(rand(-this.globeR, this.globeR), 450 + rand(-this.globeR, this.globeR) * 0.8, '#ffe9c0');
    }
  },

  draw(ctx) {
    const t = this.t, R0 = this.globeR;
    R.sky(ctx, 'ep-sky', [[0, '#04030a'], [0.6, '#070613'], [1, '#0b0916']], View.left, 0, View.W + 2, 900);
    R.stars(ctx, t, 0.7, 91);
    const cx = 0, cy = 440;
    /* the dark world */
    ctx.save();
    const dg = ctx.createRadialGradient(cx - 80, cy - 90, 60, cx, cy, R0);
    dg.addColorStop(0, '#171426');
    dg.addColorStop(1, '#0b0915');
    ctx.fillStyle = dg;
    ctx.beginPath(); ctx.arc(cx, cy, R0, 0, TAU); ctx.fill();
    /* meridian arcs */
    ctx.strokeStyle = 'rgba(160,160,200,0.07)';
    ctx.lineWidth = 1.2;
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.ellipse(cx, cy, Math.abs(R0 * Math.sin(i * 0.42)) + 0.001, R0, 0, 0, TAU);
      ctx.stroke();
    }
    for (let i = 1; i < 4; i++) {
      const yy = cy - R0 + (2 * R0 * i) / 4;
      const half = Math.sqrt(Math.max(R0 * R0 - (yy - cy) * (yy - cy), 0));
      ctx.beginPath(); ctx.moveTo(cx - half, yy); ctx.lineTo(cx + half, yy); ctx.stroke();
    }
    /* war shadow: a dark tide crossing the globe */
    if (this.warShadow > 0.01) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, R0, 0, TAU); ctx.clip();
      ctx.globalAlpha = this.warShadow * 0.75;
      const wg = ctx.createLinearGradient(cx - R0, 0, cx + R0 * 0.7, 0);
      wg.addColorStop(0, 'rgba(40,8,12,0.9)');
      wg.addColorStop(0.7, 'rgba(28,6,10,0.75)');
      wg.addColorStop(1, 'rgba(20,4,8,0)');
      ctx.fillStyle = wg;
      ctx.fillRect(cx - R0, cy - R0, R0 * 2 * this.warShadow + 60, R0 * 2);
      ctx.restore();
    }
    /* the lights */
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, R0, 0, TAU); ctx.clip();
    ctx.globalCompositeOperation = 'lighter';
    for (const L of this.lights) {
      if (L.a < 0.005) continue;
      const lx = cx + (L.x - 0.5) * 2 * R0;
      const ly = cy + (L.y - 0.5) * 2 * R0;
      const pulse = L.pulse ? 1 + 0.4 * Math.sin(t * 2.4) : 1;
      ctx.globalAlpha = clamp01(L.a) * (L.main ? 1 : 0.75);
      R.glow(ctx, lx, ly, (L.main ? 26 : 12) * pulse, L.main ? '#ffe9b8' : '#f3d9a4');
      ctx.globalAlpha = clamp01(L.a);
      ctx.fillStyle = '#fff3d8';
      ctx.beginPath(); ctx.arc(lx, ly, L.main ? 3 : 1.6, 0, TAU); ctx.fill();
    }
    /* world glow at Divine Mercy Sunday */
    if (this.worldGlow > 0.01) {
      ctx.globalAlpha = this.worldGlow * 0.3;
      R.glow(ctx, cx, cy, R0 * 1.25, 'rgba(255,222,160,0.6)');
    }
    /* the three-o'clock meridian sweeping forever */
    if (this.meridianOn) {
      const mx = cx + (this.meridian - 0.5) * 2 * R0;
      const half = Math.sqrt(Math.max(R0 * R0 - (mx - cx) * (mx - cx), 0.001));
      ctx.globalAlpha = 0.7;
      const mg = ctx.createLinearGradient(mx - 40, 0, mx + 6, 0);
      mg.addColorStop(0, 'rgba(255,238,200,0)');
      mg.addColorStop(1, 'rgba(255,238,200,0.34)');
      ctx.fillStyle = mg;
      ctx.fillRect(mx - 40, cy - half, 46, half * 2);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = 'rgba(255,246,224,0.6)';
      ctx.fillRect(mx + 4, cy - half, 1.6, half * 2);
    }
    ctx.restore();
    /* rim light */
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.16 + this.worldGlow * 0.2;
    ctx.strokeStyle = '#cfd6ff';
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(cx, cy, R0, 0, TAU); ctx.stroke();
    ctx.restore();
  },
};

<script>
(function(){
  const G = window.__G;
  const q = new URLSearchParams(location.hash.slice(1));
  const scene = q.get('scene');
  const mode = q.get('mode') || 'auto';
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const press = () => { G.Input.down = true; G.Input.holdTime = 0; G.Engine.handlePress({x:G.Input.x,y:G.Input.y}); };
  const release = () => { G.Input.down = false; G.Input.emit('release', {x:G.Input.x,y:G.Input.y,held:G.Input.holdTime}); };
  const move = (x,y) => { G.Input.x = x; G.Input.y = y; G.Input.lastMoveAt = G.Engine.time; G.Input.moved = true; G.Input.emit('move', {x,y}); };
  async function strokePath(pts, stepMs=40){
    move(pts[0].x, pts[0].y); press(); await sleep(60);
    for (const p of pts){ move(p.x, p.y); await sleep(stepMs); }
    release(); await sleep(200);
  }
  window.addEventListener('load', async () => {
    window.__shotReady = false;
    await sleep(500);
    press(); release();                       // wake audio + title
    if (!scene || scene === 'title') { window.__shotReady = true; return; }
    await sleep(500);
    G.Engine.go(scene, { instant: true });
    window.__shotReady = true;
    /* DOM choice clicker (gate scene) */
    setInterval(() => {
      const b = document.querySelector('#choices.on .choice:not(.disabled)');
      if (b && scene !== 'title') b.click();
    }, 4200);
    if (mode === 'paint') {
      /* text advancer in parallel */
      setInterval(() => { if (G.Text.showing && G.Text.blocking) { press(); release(); } }, 1700);
      const sc = G.Engine.scene;
      while (sc.step !== 'garment') await sleep(300);
      const r = sc.canvasRect;
      const U = (x,y) => ({ x: r.x + x*r.w, y: r.y + y*r.h });
      for (let s=0; s<6; s++){
        const x0 = 0.3 + s*0.08;
        const pts = []; for (let i=0;i<=10;i++) pts.push(U(x0 + Math.sin(i)*0.02, 0.15 + i*0.07));
        await strokePath(pts);
        if (sc.step !== 'garment') break;
      }
      while (sc.step !== 'hand') await sleep(300);
      await strokePath([U(0.44,0.18),U(0.38,0.24),U(0.31,0.295),U(0.295,0.305)]);
      while (sc.step !== 'ray_red') await sleep(300);
      { const pts=[]; for(let i=0;i<=12;i++) pts.push(U(0.5-(0.22*i/12), 0.42+(0.5*i/12))); await strokePath(pts); }
      while (sc.step !== 'ray_pale') await sleep(300);
      { const pts=[]; for(let i=0;i<=12;i++) pts.push(U(0.5+(0.22*i/12), 0.42+(0.5*i/12))); await strokePath(pts); }
      while (sc.step !== 'sig') await sleep(300);
      { const pts=[]; for(let i=0;i<=14;i++) pts.push(U(0.16+0.7*i/14, 0.92)); await strokePath(pts, 70); }
      return;
    }
    if (scene === 'ch9' && mode === 'long') {
      for (let i=0;i<5;i++){ press(); await sleep(2600); release(); await sleep(900); }
      for (let i=0;i<3;i++){ press(); await sleep(5400); release(); await sleep(700); }
      return;
    }
    /* generic: hold-cycles + slow pointer drift (gentle speeds for ch4) */
    let a = 0;
    setInterval(() => { a += 0.075; move(Math.sin(a)*260, 580 + Math.cos(a*0.7)*130); }, 50);
    if (scene === 'ch2') {
      /* the dance needs brisk taps to reach the vision */
      setInterval(() => { press(); setTimeout(release, 160); }, 1050);
      setTimeout(() => setInterval(() => { press(); setTimeout(release, 2150); }, 3100), 32000);
    } else {
      setInterval(() => { press(); setTimeout(release, 2150); }, 3100);
    }
  });
})();
</script>
