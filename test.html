    /* fireflies through the window once blooming */
    this.fireT -= dt;
    if (this.fireT <= 0 && b > 0.25) {
      this.fireT = rand(0.3, 0.9) / b;
      Particles.spawn({
        x: this.childX + rand(60, 320), y: rand(360, 620),
        vx: rand(-10, 10), vy: rand(-16, -4), life: rand(2, 5),
        size: rand(1.4, 3), endSize: 0.3, color: '#d8ffba', alpha: rand(0.25, 0.55),
        additive: true, glow: true, wobble: rand(10, 24), wobbleF: rand(0.8, 2), fadeIn: 0.8,
      });
    }
    if (Input.down && Math.random() < 0.1 * b) Particles.mote(this.childX + rand(-30, 30), rand(480, 620));
  },

  draw(ctx) {
    const t = this.t, b = this.bloom.v;
    /* the dark room */
    R.sky(ctx, 'ch1-room', [[0, '#070509'], [0.7, '#0b0710'], [1, '#0d0911']], View.left, 0, View.W + 2, 900);
    /* window: tall arch on the right of the child, night sky through it */
    const wx = 120, wy = 250, ww = 360, wh = 430;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(wx, wy + wh);
    ctx.lineTo(wx, wy + 80);
    ctx.quadraticCurveTo(wx + ww / 2, wy - 70, wx + ww, wy + 80);
    ctx.lineTo(wx + ww, wy + wh);
    ctx.closePath();
    ctx.clip();
    R.sky(ctx, 'ch1-night', [[0, '#0a1026'], [0.6, '#131a36'], [1, '#1d2440']], wx, wy - 70, ww, wh + 70);
    R.stars(ctx, t, 0.6 + b * 0.5, 23);
    /* moon */
    lamp(ctx, wx + ww * 0.7, wy + 90, 90 + b * 30, 'rgba(214,226,255,0.5)', 0.8 + b * 0.3, t, 0.02);
    ctx.fillStyle = '#e6edff';
    ctx.beginPath(); ctx.arc(wx + ww * 0.7, wy + 90, 26, 0, TAU); ctx.fill();
    ctx.fillStyle = '#0e142c';
    ctx.beginPath(); ctx.arc(wx + ww * 0.7 - 12, wy + 84, 22, 0, TAU); ctx.fill();
    /* far fields */
    R.hills(ctx, wy + wh - 60, 26, '#0a0d1f', 31, t);
    ctx.restore();
    /* window frame */
    ctx.strokeStyle = '#050308'; ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(wx, wy + wh); ctx.lineTo(wx, wy + 80);
    ctx.quadraticCurveTo(wx + ww / 2, wy - 70, wx + ww, wy + 80);
    ctx.lineTo(wx + ww, wy + wh);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(wx + ww / 2, wy - 16); ctx.lineTo(wx + ww / 2, wy + wh);
    ctx.moveTo(wx, wy + 170); ctx.lineTo(wx + ww, wy + 170);
    ctx.lineWidth = 9; ctx.stroke();

    /* light shaft through window onto the child, grows with prayer */
    if (b > 0.02) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const sh = b * (0.16 + 0.04 * Math.sin(t * 0.8));
      const grad = ctx.createLinearGradient(wx + ww * 0.5, wy, this.childX, 760);
      grad.addColorStop(0, `rgba(214,226,255,${sh})`);
      grad.addColorStop(1, 'rgba(214,226,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(wx + 60, wy + 60);
      ctx.lineTo(wx + ww - 40, wy + 30);
      ctx.lineTo(this.childX + 170, 800);
      ctx.lineTo(this.childX - 150, 800);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    /* floorline */
    ctx.fillStyle = '#080509';
    ctx.fillRect(View.left, 760, View.W + 2, 140);

    /* candle on the sill */
    R.candle(ctx, wx + ww + 90, 700, 90, t, 0.35 + b * 0.65);
    lamp(ctx, wx + ww + 90, 640, 120 + b * 160, 'rgba(255,184,98,0.5)', 0.25 + b * 0.75, t);

    /* the child, kneeling toward the window */
    R.child(ctx, this.childX, 762, 264, { kneel: true });
    /* her shadow cast away from the window light */
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(this.childX - 30, 766, 90, 10, 0, 0, TAU);
    ctx.fill();

    /* warmth wash as the prayer holds */
    if (b > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = b * 0.5;
      ctx.fillStyle = '#ffd9a0';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },
};


/* ============ 12-ch2-dance.js ============ */
/* Chapter II — The Dance. Łódź, Wenecja Park, 1924.
   The one scene with a score — and the score is what you give up.
   Tap to dance: the combo climbs, the music plays, and Someone is waiting. */

SCENES.ch2 = {
  id: 'ch2',
  enter() {
    this.t = 0;
    this.state = 'dance';        // dance → vision → after → cathedral
    this.combo = 0;
    this.comboPop = 0;
    this.comboAlpha = 1;
    this.lean = 0; this.leanTarget = 0;
    this.gray = 0;               // 0 warm party → 1 drained
    this.freeze = 0;
    this.glimpse = 0;
    this.visionI = 0;            // the suffering Christ figure
    this.brightPulse = 0;
    this.lanternFlare = 0;
    this.heroX = -260;
    this.walker = new Walker(-260, 800, { speed: 130, onStep: () => Audio.step(0.12) });
    this.exitGlow = 0;
    this.cath = { bloom: new PrayBloom({ riseTime: 2.6 }), candles: [] };
    for (let i = 0; i < 14; i++) {
      this.cath.candles.push({ x: rand(-560, -300) * (i % 2 ? -1 : 1) + rand(-40, 40), y: rand(560, 680), s: rand(28, 52) });
    }
    this.dancers = [];
    for (let i = 0; i < 7; i++) {
      this.dancers.push({
        /* fixed world coords — camera always re-centers on scene enter */
        x: lerp(-620, 620, (i + 0.5) / 7) + rand(-40, 40),
        depth: rand(0, 1), phase: rand(0, TAU), drift: rand(-14, 14),
      });
    }
    Engine.grainAmt = 0.07;
    if (AC) { Audio.pad.set(null); Audio.waltz.start(0.4); }
  },
  exit() {
    Audio.waltz.stop(1);
    Audio.heartbeatStop();
  },

  script: function* (S) {
    const sc = SCENES.ch2;
    yield S.wait(2.2);
    yield S.textAuto('Łódź. Twelve years later.', 3.4);
    yield S.textAuto('Her sister begged her to come — one evening of music in Wenecja Park.', 4.5);
    yield S.textAuto('Helena wore her one good dress.', 3.8);
    S.do(() => Hint.show('tap with the music', { ttl: 5 }));
    yield S.waitFor(() => sc.combo >= 18);
    /* ---- the vision ---- */
    S.do(() => sc._beginVision());
    yield S.wait(3.4);
    yield S.text('The music kept playing. The dancers kept turning.');
    yield S.text('But Helena saw only Him — racked with pain, stripped of His clothing, covered in wounds.');
    yield S.text('How long shall I put up with you and how long will you keep putting Me off?', { voice: true, attr: 'Diary, 9' });
    S.do(() => sc._burnScore());
    yield S.wait(2.6);
    S.do(() => { sc.state = 'after'; Hint.show('there is nothing here — hold, and walk away', { ttl: 6 }); });
    yield S.waitFor(() => sc.walker.x > View.right - 140);
    /* ---- the cathedral ---- */
    S.do(() => sc._toCathedral());
    yield S.wait(2.8);
    yield S.textAuto('The Cathedral of Saint Stanislaus Kostka. She did not remember walking there.', 4.6);
    yield S.text('She fell prostrate before the Blessed Sacrament and asked what He wanted of her.');
    yield S.holdTotal(2.6, { hint: 'hold', hintAfter: 4 });
    yield S.waitFor(() => sc.cath.bloom.v > 0.95);
    yield S.wait(1.4);
    yield S.text('Go at once to Warsaw; you will enter a convent there.', { voice: true, attr: 'Diary, 10' });
    yield S.text('She went home only to pack a small bag, and asked her sister to say goodbye for her.');
    yield S.text('She was nineteen, and she had stopped pretending.');
    S.do(() => Engine.nextChapter());
  },

  _beginVision() {
    this.state = 'vision';
    Audio.waltz.setWarp(1);
    Audio.waltz.setLevel(0.1, 3);
    Engine.after(2600, () => Audio.waltz.stop(3));
    Audio.heartbeatStart(46, 0.3);
    Tweens.to(this, { gray: 1 }, 4, { ease: Ease.inOutSine });
    Tweens.to(this, { visionI: 1 }, 5, { ease: Ease.inOutSine, delay: 1 });
    Engine.shake(0.18);
    Audio.thunder(0.12);
  },
  _burnScore() {
    Tweens.to(this, { comboAlpha: 0 }, 2.2, { ease: Ease.inOutSine });
    const y = 120;
    for (let i = 0; i < 26; i++) {
      Particles.spawn({
        x: rand(-110, 110), y: y + rand(-12, 12),
        vx: rand(-10, 10), vy: rand(8, 40), ay: 26,
        life: rand(1.4, 2.8), size: rand(1, 2.6), endSize: 0.2,
        color: pick(['#8a8276', '#a39685', '#6e675e']), alpha: 0.7,
        wobble: rand(4, 12), fadeIn: 0.2,
      });
    }
    Audio.swish(0.16);
  },
  _toCathedral() {
    Audio.heartbeatStop();
    Engine.fade.color = '#000000';
    Tweens.to(Engine.fade, { alpha: 1 }, 1.6, {
      key: 'fade', ease: Ease.inOutQuad, onDone: () => {
        this.state = 'cathedral';
        this.t = 0;
        Audio.pad.set([['D2', 'A2', 'F3', 'D4'], ['G1', 'D3', 'Bb3', 'G3'], ['A1', 'E3', 'A3', 'C#4'], ['D2', 'A2', 'D3', 'F3']], { level: 0.42, hold: 12, bright: 620 });
        Audio.bell('A2', 0.22, 1.4);
        Tweens.to(Engine.fade, { alpha: 0 }, 2.4, { key: 'fade' });
      },
    });
  },

  onPress(p) {
    if (this.state === 'dance') {
      this.combo++;
      this.comboPop = 1;
      Tweens.to(this, { comboPop: 0 }, 0.5, { key: 'pop', ease: Ease.outCubic });
      this.leanTarget = this.leanTarget >= 0 ? -1 : 1;
      Tweens.to(this, { lean: this.leanTarget }, 0.4, { key: 'lean', ease: Ease.outBack });
      this.brightPulse = 1;
      this.lanternFlare = 1;
      Tweens.to(this, { lanternFlare: 0 }, 0.7, { key: 'flare' });
      const scale = ['D4', 'E4', 'F4', 'G4', 'A4', 'C5', 'D5', 'E5'];
      Audio.pluck(scale[this.combo % scale.length], 0.22);
      Particles.burst(this.heroX, 815, 7, () => ({
        x: this.heroX + rand(-26, 26), y: 815 + rand(-6, 6),
        vx: rand(-50, 50), vy: rand(-60, -10), life: rand(0.4, 0.9),
        size: rand(1.5, 3), endSize: 0, color: '#ffd9a0', alpha: 0.8,
        additive: true, glow: true, drag: 0.93,
      }));
      this.gray = clamp01(this.combo / 22);
      Audio.waltz.setWarp(this.combo / 20);
      if (this.combo === 7 || this.combo === 13) {
        this.freeze = 0.16;
        this.glimpse = 1;
        Tweens.to(this, { glimpse: 0 }, 1.6, { key: 'glimpse', ease: Ease.inOutSine });
        Audio.thunder(0.05);
      }
    } else if (this.state === 'after') {
      if (AC) blip(Audio.out(0.7, 0.1), 130, 0.1, 0.07, 'sine');   // dead, dull
    }
  },

  update(dt) {
    this.t += dt;
    if (this.freeze > 0) { this.freeze -= dt; return; }
    if (this.state === 'dance' || this.state === 'vision') {
      const spin = this.state === 'dance' ? 1 : 0.06;
      for (const d of this.dancers) {
        d.phase += dt * 1.6 * spin;
        d.x += d.drift * dt * spin;
        if (d.x < View.left + 80) d.drift = Math.abs(d.drift);
        if (d.x > View.right - 80) d.drift = -Math.abs(d.drift);
      }
      this.brightPulse = Math.max(0, this.brightPulse - dt * 1.4);
      this.lean *= Math.pow(0.4, dt);
    }
    if (this.state === 'after') {
      const dir = Input.down ? 1 : (Input.axis() || 0);
      this.walker.x = Math.max(this.walker.x, this.heroX);
      this.walker.update(dt, dir > 0 || Input.down ? 1 : 0);
      this.heroX = this.walker.x;
      this.exitGlow = damp(this.exitGlow, 1, 0.8, dt);
    }
    if (this.state === 'cathedral') {
      this.cath.bloom.update(dt);
      Audio.pad.targetLevel = 0.42 + this.cath.bloom.v * 0.26;
      if (Input.down && Math.random() < 0.12) Particles.mote(rand(-80, 80), rand(500, 700));
    }
  },

  draw(ctx) {
    if (this.state === 'cathedral') { this._drawCathedral(ctx); return; }
    const t = this.t, g = this.gray;
    /* park night sky — warm amber dusk before it drains */
    R.sky(ctx, 'ch2-sky', [[0, '#150c18'], [0.55, '#33182a'], [1, '#4e2326']], View.left, 0, View.W + 2, 900);
    ctx.save();
    ctx.globalAlpha = g * 0.92;
    R.sky(ctx, 'ch2-gray', [[0, '#0b0a10'], [0.6, '#121119'], [1, '#16141d']], View.left, 0, View.W + 2, 900);
    ctx.restore();
    /* ground */
    ctx.fillStyle = mixHex('#33201f', '#0e0d13', g);
    ctx.fillRect(View.left, 760, View.W + 2, 140);
    /* trees framing */
    R.tree(ctx, View.left + 90, 800, 460, 17, mixHex('#160d16', '#0a090e', g));
    R.tree(ctx, View.right - 70, 790, 520, 29, mixHex('#160d16', '#0a090e', g));

    /* lantern strings: two sagging catenaries */
    const warm = 1 - g * 0.85;
    const sagY = fx => 178 + Math.sin(fx * Math.PI) * 76;
    ctx.strokeStyle = 'rgba(16,10,14,0.9)';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    for (let i = 0; i <= 40; i++) {
      const x = lerp(View.left, View.right, i / 40);
      i ? ctx.lineTo(x, sagY(i / 40)) : ctx.moveTo(x, sagY(i / 40));
    }
    ctx.stroke();
    const n = 9;
    for (let i = 0; i < n; i++) {
      const fx = (i + 0.5) / n;
      const x = lerp(View.left, View.right, fx);
      const y = sagY(fx) + 17;
      const I = (0.72 + this.lanternFlare * 0.4 + this.brightPulse * 0.25) * warm + 0.04;
      lamp(ctx, x, y, 74 + this.lanternFlare * 30, 'rgba(255,176,92,0.75)', I, t + i);
      ctx.fillStyle = `rgba(255,212,148,${0.45 + warm * 0.55})`;
      ctx.beginPath(); ctx.arc(x, y, 5.5, 0, TAU); ctx.fill();
      /* warm pools on the ground beneath */
      lamp(ctx, x, 808, 120, 'rgba(255,160,80,0.35)', I * 0.5, t + i * 2, 0.05);
    }

    /* dancers (depth-sorted) */
    const ds = this.dancers.slice().sort((a, b) => a.depth - b.depth);
    for (const d of ds) {
      const h = lerp(150, 240, d.depth);
      const y = lerp(740, 800, d.depth);
      const shade = mixHex(mixHex('#241522', '#3d2030', d.depth), '#0d0c12', g);
      R.dancers(ctx, d.x, y, h, d.phase, { color: shade });
    }

    /* the suffering Christ — seen only by her */
    if (this.glimpse > 0.01 || this.visionI > 0.01) {
      const I = Math.max(this.glimpse * 0.35, this.visionI);
      const vx = Math.min(300, View.right - 220), vy = 800, vh = 330;
      R.lumen(ctx, vx, vy, vh, t, { intensity: I * 0.66, raise: 0, rays: 0 });
      /* the wounds: small red embers at hands and side */
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = I * 0.9;
      R.glow(ctx, vx - vh * 0.17, vy - vh * 0.58, vh * 0.05, '#ff4252');
      R.glow(ctx, vx + vh * 0.17, vy - vh * 0.56, vh * 0.05, '#ff4252');
      R.glow(ctx, vx + vh * 0.06, vy - vh * 0.42, vh * 0.04, '#e83a48');
      ctx.restore();
      if (this.visionI > 0.4 && Math.random() < 0.06) {
        Particles.spawn({
          x: vx + rand(-30, 30), y: vy - rand(80, 240),
          vx: rand(-4, 4), vy: rand(4, 16), life: rand(1.5, 3),
          size: rand(1.5, 2.6), endSize: 0.2, color: '#ff6471', alpha: 0.5,
          additive: true, glow: true, fadeIn: 0.5,
        });
      }
    }

    /* Helena */
    ctx.save();
    ctx.translate(this.heroX, this.state === 'after' ? this.walker.y : 800);
    ctx.rotate(this.lean * 0.12);
    const dress = mixHex('#6b3148', '#221d28', g * 0.8);
    R.maiden(ctx, 0, 0, 280, {
      color: dress,
      walk: this.state === 'after' ? this.walker.phase : (this.lean * 1.6),
    });
    ctx.restore();
    if (this.state === 'after' && this.exitGlow > 0.01) {
      lamp(ctx, View.right - 40, 520, 280, 'rgba(140,170,255,0.4)', this.exitGlow * 0.8, t, 0.03);
    }

    /* warm pulse on tap */
    if (this.brightPulse > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = this.brightPulse * 0.5 * warm;
      ctx.fillStyle = '#ffbe78';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }

    /* the combo — the evening's little glory */
    if (this.combo > 0 && this.comboAlpha > 0.01) {
      ctx.save();
      ctx.globalAlpha = this.comboAlpha * 0.9;
      const s = 1 + this.comboPop * 0.18;
      ctx.translate(0, 120); ctx.scale(s, s);
      spacedText(ctx, 'THE EVENING', 0, -14, 13, 7, `rgba(232,201,138,${0.7 * this.comboAlpha})`);
      spacedText(ctx, '× ' + this.combo, 0, 24, 30, 4, `rgba(240,233,219,${0.9 * this.comboAlpha})`);
      ctx.restore();
    }
  },

  _drawCathedral(ctx) {
    const t = this.t, b = this.cath.bloom.v;
    R.sky(ctx, 'ch2-cath', [[0, '#060410'], [0.5, '#0a0716'], [1, '#0e0a18']], View.left, 0, View.W + 2, 900);
    /* great window */
    const wy = 110, ww = 240, wh = 420;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-ww / 2, wy + wh);
    ctx.lineTo(-ww / 2, wy + 110);
    ctx.quadraticCurveTo(0, wy - 60, ww / 2, wy + 110);
    ctx.lineTo(ww / 2, wy + wh);
    ctx.closePath(); ctx.clip();
    R.sky(ctx, 'ch2-glass', [[0, '#16224d'], [0.5, '#1d2c5e'], [1, '#27355f']], -ww / 2, wy - 60, ww, wh + 60);
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.25 + b * 0.45;
    R.glow(ctx, 0, wy + 170, 190, 'rgba(120,150,255,0.55)');
    ctx.restore();
    /* mullions */
    ctx.strokeStyle = '#040308'; ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(-ww / 2, wy + wh); ctx.lineTo(-ww / 2, wy + 110);
    ctx.quadraticCurveTo(0, wy - 60, ww / 2, wy + 110);
    ctx.lineTo(ww / 2, wy + wh);
    ctx.moveTo(0, wy + 4); ctx.lineTo(0, wy + wh);
    ctx.stroke();
    /* columns */
    for (const s of [-1, 1]) {
      const g = ctx.createLinearGradient(s * 520 - 70, 0, s * 520 + 70, 0);
      g.addColorStop(0, 'rgba(4,3,8,0)'); g.addColorStop(0.5, 'rgba(10,8,18,0.9)'); g.addColorStop(1, 'rgba(4,3,8,0)');
      ctx.fillStyle = g;
      ctx.fillRect(s * 520 - 70, 0, 140, 900);
    }
    /* candle banks */
    for (const c of this.cath.candles) {
      R.candle(ctx, c.x, c.y, c.s, t + c.x, 0.5 + b * 0.5);
    }
    lamp(ctx, -420, 600, 200, 'rgba(255,176,96,0.4)', 0.4 + b * 0.5, t);
    lamp(ctx, 420, 600, 200, 'rgba(255,176,96,0.4)', 0.4 + b * 0.5, t, 0.1);
    /* altar light */
    lamp(ctx, 0, wy + wh + 40, 130 + b * 120, 'rgba(255,220,160,0.5)', 0.4 + b * 0.6, t, 0.04);
    /* floor */
    ctx.fillStyle = '#07050c';
    ctx.fillRect(View.left, 780, View.W + 2, 120);
    /* Helena prostrate */
    R.maiden(ctx, 0, 812, 250, { kneel: true, color: '#2b1c2c' });
    /* God-light from the window when prayer holds */
    if (b > 0.02) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const grad = ctx.createLinearGradient(0, wy + 100, 0, 830);
      grad.addColorStop(0, `rgba(170,195,255,${0.2 * b})`);
      grad.addColorStop(1, 'rgba(170,195,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(-ww / 2 + 30, wy + 100);
      ctx.lineTo(ww / 2 - 30, wy + 100);
      ctx.lineTo(190, 830); ctx.lineTo(-190, 830);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  },
};


/* ============ 13-ch3-doors.js ============ */
/* Chapter III — The Doors. Warsaw, 1925.
   Persistence as a mechanic: knock, be refused, walk on. The last door asks
   a different question. */

SCENES.ch3 = {
  id: 'ch3',
  enter() {
    this.t = 0;
    this.state = 'street';      // street → chapel-beat (inline) → accepted → enter
    this.hero = new Walker(80, 800, { speed: 150, onStep: () => Audio.step(0.16) });
    this.doors = [
      { x: 560,  asked: false, done: false, lampI: 1, reply: 'We have no place for you.' },
      { x: 1240, asked: false, done: false, lampI: 1, reply: 'No dowry? Then no.' },
      { x: 1920, asked: false, done: false, lampI: 1, reply: 'We do not take in maids.' },
      { x: 2700, asked: false, done: false, lampI: 1, final: true },
    ];
    this.worldEnd = 3100;
    this.snowT = 0;
    this.breathT = 0;
    this.kneeling = false;
    this.bloom = new PrayBloom({ riseTime: 2.8 });
    this.accepted = 0;
    this.doorOpen = 0;
    this.knockAnim = 0;
    this.canKnock = false;
    this.knockCount = 0;
    Engine.grainAmt = 0.08;
    Audio.pad.set([['A1', 'E3', 'A3', 'C4'], ['F1', 'C3', 'F3', 'A3'], ['G1', 'D3', 'G3', 'B3'], ['E1', 'B2', 'E3', 'G#3']], { level: 0.36, hold: 12, bright: 640 });
    Audio.channels.wind.set(0.3, 380);
  },
  exit() { Audio.channels.wind.set(0, 300); },

  script: function* (S) {
    const sc = SCENES.ch3;
    yield S.wait(2.2);
    yield S.textAuto('Warsaw. She arrived with one bag and no one waiting.', 4.4);
    S.do(() => Hint.show('hold to walk — knock at the doors', { ttl: 6 }));
    yield S.waitFor(() => sc.doors[0].done);
    yield S.textAuto('There was another door.', 3.2);
    yield S.waitFor(() => sc.doors[1].done);
    yield S.textAuto('And another.', 2.8);
    yield S.waitFor(() => sc.doors[2].done);
    yield S.text('She knocked on many doors that summer. The answer learned her face.');
    yield S.textAuto('One door remained — Żytnia Street: the Sisters of Our Lady of Mercy.', 5);
    yield S.waitFor(() => sc.doors[3].asked);
    yield S.wait(1.6);
    yield S.text('The superior, Mother Michael, studied the small girl in the worn dress.');
    yield S.text('“Go and ask the Lord of the house whether He will accept you.”');
    S.do(() => { sc.kneeling = true; Hint.show('hold — and ask', { ttl: 5 }); });
    yield S.waitFor(() => sc.bloom.v > 0.95);
    yield S.wait(1.2);
    S.do(() => {
      Audio.shimmer(0.5); Audio.bell('F4', 0.3);
      Tweens.to(sc, { accepted: 1 }, 3, { ease: Ease.inOutSine });
    });
    yield S.text('I do accept; you are in My Heart.', { voice: true, attr: 'Diary, 14' });
    yield S.text('Accepted — on one condition. She must earn the clothes she would renounce.');
    yield S.text('A year in service at Ostrówek: other people’s laundry, other people’s children, coin by coin.');
    S.do(() => {
      sc.kneeling = false;
      Tweens.to(sc, { doorOpen: 1 }, 2.6, { ease: Ease.inOutSine });
      Audio.bell('D4', 0.26, 1.3);
    });
    yield S.text('On the first of August, 1925, the door on Żytnia Street opened to her.');
    S.do(() => Hint.show('walk in', { ttl: 4 }));
    yield S.waitFor(() => sc.hero.x > sc.doors[3].x - 16);
    S.do(() => {
      Engine.fade.color = '#fff7e8';
      Tweens.to(Engine.fade, { alpha: 1 }, 1.8, { key: 'fade', ease: Ease.inOutQuad, onDone: () => Engine.nextChapter() });
    });
    yield S.wait(3);
  },

  _activeDoor() {
    for (const d of this.doors) {
      if (!d.done && Math.abs(this.hero.x - d.x) < 90) return d;
    }
    return null;
  },

  onPress() {
    const d = this._activeDoor();
    if (d && !this.kneeling && this.doorOpen < 0.1) {
      if (d.asked) return;
      this.knockAnim = 1;
      Tweens.to(this, { knockAnim: 0 }, 0.5, { key: 'knock' });
      Audio.knock(0.7);
      setTimeout(() => Audio.knock(0.55), 190);
      Engine.shake(0.07);
      d.asked = true;
      if (!d.final) {
        Engine.after(900, () => {
          Text.show(d.reply, { small: true, auto: 3, passthrough: true });
          Tweens.to(d, { lampI: 0.18 }, 1.6, { ease: Ease.inOutSine });
          Audio.pluck('E3', 0.2);
          Engine.after(1400, () => { d.done = true; });
        });
      }
    }
  },

  update(dt) {
    this.t += dt;
    /* walking (blocked while kneeling / final dialogue) */
    if (!this.kneeling) {
      const d = this._activeDoor();
      const wantWalk = Input.down && !(d && !d.asked && Math.abs(this.hero.x - d.x) < 60);
      const dir = wantWalk || Input.axis() > 0 ? 1 : (Input.axis() < 0 ? -1 : 0);
      if (!(d && d.final && d.asked && this.doorOpen < 0.9)) {
        this.hero.update(dt, dir);
      }
      this.hero.x = clamp(this.hero.x, 60, this.doorOpen > 0.5 ? this.doors[3].x : this.worldEnd - 300);
    } else {
      this.bloom.update(dt);
      Audio.pad.targetLevel = 0.36 + this.bloom.v * 0.26;
      if (Input.down && Math.random() < 0.1) Particles.mote(this.hero.x + rand(-30, 30), rand(560, 760));
    }
    /* camera follows */
    Engine.cam.x = damp(Engine.cam.x, clamp(this.hero.x + 120, View.W / 2 - 380, this.worldEnd), 3.2, dt);
    /* snow */
    this.snowT -= dt;
    if (this.snowT <= 0) {
      this.snowT = 0.05;
      Particles.snow(Engine.cam.x, -20, View.W + 200);
    }
    /* breath in the cold */
    this.breathT -= dt;
    if (this.breathT <= 0 && this.hero.moving > 0.4) {
      this.breathT = rand(1.6, 2.6);
      Particles.spawn({
        x: this.hero.x + 24, y: 800 - 232, vx: rand(14, 26), vy: rand(-10, -2),
        life: 1.4, size: 5, endSize: 14, color: '#cfd6e4', alpha: 0.12, fadeIn: 0.2,
      });
    }
  },

  draw(ctx) {
    const t = this.t;
    R.sky(ctx, 'ch3-sky', [[0, '#0a0c16'], [0.55, '#131524'], [1, '#1d1e30']], View.left, 0, View.W + 2, 900);
    /* far rooftops */
    R.hills(ctx, 420, 90, '#0c0d18', 41, t);
    /* the street: repeating facades */
    srand(99);
    const shades = ['#11101c', '#141220', '#0f0e1a'];
    for (let bx = -200; bx < this.worldEnd + 600; ) {
      const bw = 220 + rng() * 240;
      const bh = 380 + rng() * 260;
      ctx.fillStyle = shades[(rng() * shades.length) | 0];
      ctx.fillRect(bx, 820 - bh, bw, bh);
      /* windows */
      const cols = Math.max(2, (bw / 80) | 0), rows = Math.max(3, (bh / 110) | 0);
      for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) {
        const wxx = bx + 30 + i * (bw - 60) / Math.max(cols - 1, 1) - 12;
        const wyy = 820 - bh + 46 + j * 92;
        const lit = rng() < 0.08;
        ctx.fillStyle = lit ? 'rgba(255,196,120,0.55)' : 'rgba(8,8,14,0.9)';
        ctx.fillRect(wxx, wyy, 26, 38);
      }
      bx += bw + 12;
    }
    /* pavement */
    ctx.fillStyle = '#0b0a12';
    ctx.fillRect(View.left, 800, View.W + 2, 100);
    ctx.fillStyle = 'rgba(223,230,242,0.05)';
    ctx.fillRect(View.left, 800, View.W + 2, 7);

    /* doors */
    for (const d of this.doors) {
      const isFinal = d.final;
      /* pale stone surround so each door reads against the facade */
      ctx.fillStyle = '#221e33';
      ctx.beginPath();
      ctx.moveTo(d.x - 78, 802);
      ctx.lineTo(d.x - 78, 612);
      ctx.quadraticCurveTo(d.x, 540, d.x + 78, 612);
      ctx.lineTo(d.x + 78, 802);
      ctx.closePath(); ctx.fill();
      /* step */
      ctx.fillStyle = '#262238';
      ctx.fillRect(d.x - 84, 796, 168, 10);
      /* arch recess */
      ctx.fillStyle = '#0a0814';
      ctx.beginPath();
      ctx.moveTo(d.x - 62, 802);
      ctx.lineTo(d.x - 62, 620);
      ctx.quadraticCurveTo(d.x, 560, d.x + 62, 620);
      ctx.lineTo(d.x + 62, 802);
      ctx.closePath(); ctx.fill();
      /* door panel / opening */
      const open = isFinal ? this.doorOpen : 0;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(d.x - 48, 800);
      ctx.lineTo(d.x - 48, 634);
      ctx.quadraticCurveTo(d.x, 584, d.x + 48, 634);
      ctx.lineTo(d.x + 48, 800);
      ctx.closePath(); ctx.clip();
      if (open > 0.01) {
        const g = ctx.createLinearGradient(0, 580, 0, 800);
        g.addColorStop(0, `rgba(255,238,200,${0.85 * open})`);
        g.addColorStop(1, `rgba(255,214,150,${0.6 * open})`);
        ctx.fillStyle = g;
        ctx.fillRect(d.x - 48, 580, 96, 222);
        ctx.globalCompositeOperation = 'lighter';
        R.glow(ctx, d.x, 700, 130 * open, 'rgba(255,226,170,0.5)');
        /* the waiting silhouette of Mother Michael */
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = open;
        R.nun(ctx, d.x + 10, 798, 196, { color: '#241c20', coif: 'rgba(236,228,210,0.9)' });
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = '#1f1830';
        ctx.fillRect(d.x - 48, 580, 96, 222);
        ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 4;
        ctx.strokeRect(d.x - 32, 642, 28, 64);
        ctx.strokeRect(d.x + 4, 642, 28, 64);
        ctx.strokeRect(d.x - 32, 718, 28, 76);
        ctx.strokeRect(d.x + 4, 718, 28, 76);
        ctx.beginPath(); ctx.arc(d.x + 36, 722, 4.5, 0, TAU);
        ctx.fillStyle = 'rgba(212,190,148,0.7)'; ctx.fill();
        /* lamp pool washing the door face */
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.16 * d.lampI;
        R.glow(ctx, d.x, 640, 120, 'rgba(190,170,255,0.7)');
        ctx.restore();
      }
      ctx.restore();
      /* knock shiver */
      if (this.knockAnim > 0.01 && Math.abs(this.hero.x - d.x) < 110) {
        ctx.save();
        ctx.globalAlpha = this.knockAnim * 0.5;
        ctx.strokeStyle = '#cfd6e4';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(d.x + 26, 726, 12 + (1 - this.knockAnim) * 26, 0, TAU); ctx.stroke();
        ctx.restore();
      }
      /* lamp */
      const li = isFinal ? (0.9 + this.accepted * 0.4) : d.lampI;
      lamp(ctx, d.x, 588, 64, isFinal ? 'rgba(255,214,140,0.8)' : 'rgba(220,190,255,0.55)', li * 0.8, t + d.x, 0.1);
      ctx.fillStyle = `rgba(255,224,170,${0.35 + li * 0.5})`;
      ctx.beginPath(); ctx.arc(d.x, 588, 5, 0, TAU); ctx.fill();
      /* plaque on the final door */
      if (isFinal) {
        ctx.globalAlpha = 0.75;
        spacedTextAt(ctx, 'ŻYTNIA 3/9', d.x, 545, 11, 4, 'rgba(214,206,188,0.7)');
        ctx.globalAlpha = 1;
      }
    }

    /* Helena */
    const kneel = this.kneeling;
    ctx.save();
    if (this.hero.face < 0) { ctx.translate(this.hero.x, 0); ctx.scale(-1, 1); ctx.translate(-this.hero.x, 0); }
    R.maiden(ctx, this.hero.x, 802, kneel ? 240 : 258, { color: '#241a26', kneel, walk: kneel ? undefined : this.hero.phase });
    ctx.restore();
    /* acceptance light */
    if (this.accepted > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = this.accepted * 0.5;
      R.glow(ctx, this.hero.x, 660, 190, 'rgba(255,236,196,0.5)');
      ctx.restore();
    }
  },
};

/* small caps helper at world position (textAlign center) */
function spacedTextAt(ctx, str, x, y, size, spacing, color) {
  ctx.save();
  ctx.translate(x, y);
  spacedText(ctx, str, 0, 0, size, spacing, color);
  ctx.restore();
}


/* ============ 14-ch4-kitchen.js ============ */
/* Chapter IV — Small Things. The convent kitchen, 1926–1930.
   Work done slowly, with love, makes the world bloom. Speed is the input;
   gentleness is the skill. */

SCENES.ch4 = {
  id: 'ch4',
  enter() {
    this.t = 0;
    this.stations = [
      { id: 'pot',    x: 330,  y: 560, r: 150, bloom: 0, label: 'the pot',      milestones: 0 },
      { id: 'floor',  x: -120, y: 760, r: 200, bloom: 0, label: 'the floor',    milestones: 0 },
      { id: 'basket', x: -520, y: 640, r: 150, bloom: 0, label: 'the potatoes', milestones: 0 },
    ];
    this.allDone = false;
    this.rosesT = -1;       // -1 inactive, >=0 animating
    this.roseBloom = 0;
    this.steamT = 0;
    this.warm = 0;          // global kitchen warmth = avg bloom
    this.rushed = 0;        // visual feedback for too-fast strokes
    this.graceGlow = 0;
    Engine.grainAmt = 0.06;
    Audio.pad.set([['F2', 'C3', 'F3', 'A3'], ['Bb1', 'F3', 'Bb3', 'D4'], ['C2', 'G3', 'C4', 'E4'], ['F2', 'C3', 'A3', 'F4']], { level: 0.4, hold: 10, bright: 980 });
    Audio.channels.wind.set(0.05, 200);
  },
  exit() { Audio.channels.air.set(0); },

  script: function* (S) {
    const sc = SCENES.ch4;
    yield S.wait(2.2);
    yield S.text('She received the habit, and with it a new name: Sister Maria Faustyna of the Blessed Sacrament.');
    yield S.text('She had hoped, perhaps, for ecstasies. She was given the kitchen.');
    S.do(() => Hint.show('hold and move gently — hurry earns nothing', { ttl: 7 }));
    yield S.waitFor(() => sc.stations.every(s => s.bloom >= 1));
    S.do(() => { sc.allDone = true; });
    yield S.wait(2);
    yield S.text('Great love can change small things into great ones, and it is only love which lends value to our actions.', { quote: true, attr: 'Diary, 303' });
    yield S.wait(0.6);
    yield S.text('One evening the great pot was too heavy for her strength, and she was ashamed to ask.');
    yield S.text('Out of obedience, she tried again —');
    S.do(() => sc._roses());
    yield S.wait(3.2);
    yield S.text('— and the lifted lid breathed out roses.');
    yield S.text('Nothing done for love is small. The years passed this way: Warsaw, Płock, the gardens, the gate.');
    S.do(() => Engine.nextChapter());
  },

  _roses() {
    this.rosesT = 0;
    Tweens.to(this, { roseBloom: 1 }, 2.6, { ease: Ease.inOutSine });
    Audio.shimmer(0.6, 700);
    Audio.bell('F4', 0.22, 1);
    for (let i = 0; i < 38; i++) {
      Engine.after(i * 60, () => {
        Particles.spawn({
          x: 330 + rand(-46, 46), y: 520 + rand(-10, 10),
          vx: rand(-36, 36), vy: rand(-130, -50), ay: 60,
          life: rand(1.8, 3.4), size: rand(4, 8), endSize: 2,
          color: pick(['#d8506a', '#c23a55', '#e76d83']), alpha: 0.85,
          shape: 'petal', spin: rand(-3, 3), wobble: rand(6, 16), fadeIn: 0.15, drag: 0.99,
        });
      });
    }
  },

  onPress() {},
  update(dt) {
    this.t += dt;
    const speed = Input.speed;
    let working = null;
    if (Input.down && !this.allDone) {
      for (const s of this.stations) {
        if (dist(Input.x, Input.y, s.x, s.y) < s.r) { working = s; break; }
      }
    }
    if (working) {
      const gentle = speed > 30 && speed < 460;
      const tooFast = speed >= 700;
      if (gentle) {
        const was = working.bloom;
        working.bloom = clamp01(working.bloom + dt / 4.2);
        this.graceGlow = damp(this.graceGlow, 1, 4, dt);
        Audio.channels.air.set(0.12, 700 + speed * 0.8, 0.1);
        if (Math.random() < 0.3) {
          Particles.spawn({
            x: Input.x + rand(-6, 6), y: Input.y + rand(-6, 6),
            vx: rand(-8, 8), vy: rand(-26, -10), life: rand(0.7, 1.6),
            size: rand(1.5, 3), endSize: 0.3, color: '#ffe2a8', alpha: 0.6,
            additive: true, glow: true, wobble: 8, drag: 0.97,
          });
        }
        const m = Math.floor(working.bloom * 3);
        if (m > working.milestones) {
          working.milestones = m;
          Audio.pluck(['F4', 'A4', 'C5'][Math.min(m - 1, 2)], 0.3);
          if (working.bloom >= 1) {
            Audio.bell('F5', 0.18, 0.7);
            Audio.shimmer(0.35, 1000);
            Particles.burst(working.x, working.y - 40, 16, () => ({
              x: working.x + rand(-50, 50), y: working.y + rand(-60, 10),
              vx: rand(-20, 20), vy: rand(-60, -20), life: rand(1, 2.2),
              size: rand(2, 4), endSize: 0.4, color: '#ffe9bc', alpha: 0.7,
              additive: true, glow: true, wobble: 10, fadeIn: 0.2,
            }));
          }
        }
        if (was < 1 && working.bloom >= 1) Hint.hide();
      } else if (tooFast) {
        this.rushed = Math.min(1, this.rushed + dt * 3);
        Audio.channels.air.set(0.05, 2400, 0.06);
        if (Math.random() < 0.2) {
          Particles.spawn({
            x: Input.x, y: Input.y, vx: rand(-30, 30), vy: rand(-20, 20),
            life: 0.5, size: 3, endSize: 0.5, color: '#6f6a62', alpha: 0.4,
          });
        }
      } else {
        Audio.channels.air.set(0.04, 500, 0.15);
      }
    } else {
      Audio.channels.air.set(0, undefined, 0.2);
      this.graceGlow = damp(this.graceGlow, 0, 3, dt);
    }
    this.rushed = Math.max(0, this.rushed - dt * 1.2);
    this.warm = this.stations.reduce((a, s) => a + s.bloom, 0) / this.stations.length;
    Audio.pad.targetLevel = 0.4 + this.warm * 0.14;
    /* steam from the pot */
    this.steamT -= dt;
    if (this.steamT <= 0) {
      this.steamT = rand(0.12, 0.3);
      Particles.spawn({
        x: 330 + rand(-34, 34), y: 512, vx: rand(-4, 8), vy: rand(-44, -22),
        life: rand(1.6, 3), size: rand(6, 12), endSize: rand(18, 30),
        color: '#cfd0d8', alpha: 0.07, fadeIn: 0.5, wobble: 8,
      });
    }
    if (this.rosesT >= 0) this.rosesT += dt;
  },

  draw(ctx) {
    const t = this.t, warm = this.warm;
    /* walls — grow warmer as the work blooms */
    const wallTop = mixHex('#241c26', '#33252a', warm);
    const wallBot = mixHex('#2e2230', '#473327', warm);
    const g1 = ctx.createLinearGradient(0, 0, 0, 900);
    g1.addColorStop(0, wallTop); g1.addColorStop(1, wallBot);
    ctx.fillStyle = g1; ctx.fillRect(View.left, 0, View.W + 2, 900);

    /* morning window, top-left */
    const wx = -640, wy = 170, ww = 230, wh = 320;
    ctx.fillStyle = mixHex('#46507a', '#8a96b8', warm * 0.7);
    ctx.fillRect(wx, wy, ww, wh);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    R.glow(ctx, wx + ww / 2, wy + wh / 2, 240 + warm * 130, `rgba(255,228,170,${0.26 + warm * 0.26})`);
    ctx.restore();
    ctx.strokeStyle = '#0d0a10'; ctx.lineWidth = 10;
    ctx.strokeRect(wx, wy, ww, wh);
    ctx.beginPath();
    ctx.moveTo(wx + ww / 2, wy); ctx.lineTo(wx + ww / 2, wy + wh);
    ctx.moveTo(wx, wy + wh / 2); ctx.lineTo(wx + ww, wy + wh / 2);
    ctx.stroke();
    /* light shaft */
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const shaft = ctx.createLinearGradient(wx, wy, wx + 360, wy + 560);
    shaft.addColorStop(0, `rgba(255,232,180,${0.18 + warm * 0.14})`);
    shaft.addColorStop(1, 'rgba(255,232,180,0)');
    ctx.fillStyle = shaft;
    ctx.beginPath();
    ctx.moveTo(wx + 8, wy + 10); ctx.lineTo(wx + ww - 8, wy + 24);
    ctx.lineTo(wx + ww + 320, 880); ctx.lineTo(wx - 80, 880);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    /* floor */
    ctx.fillStyle = mixHex('#241a23', '#3c2b1f', this.stations[1].bloom * 0.8);
    ctx.fillRect(View.left, 720, View.W + 2, 180);
    for (let i = 0; i < 9; i++) {
      ctx.fillStyle = `rgba(0,0,0,${0.18})`;
      ctx.fillRect(View.left, 720 + i * 20, View.W + 2, 1.5);
    }

    /* ---- station: stove + pot ---- */
    const potB = this.stations[0].bloom;
    ctx.fillStyle = mixHex('#2c2230', '#3e2f33', potB);
    ctx.fillRect(220, 580, 220, 150);
    ctx.fillStyle = mixHex('#1a141f', '#2a1e22', potB);
    ctx.fillRect(210, 568, 240, 18);
    /* fire glow under */
    lamp(ctx, 330, 716, 80 + potB * 30, 'rgba(255,140,60,0.75)', 0.6 + potB * 0.4, t, 0.2);
    /* embers drifting from the firebox */
    if (Math.random() < 0.12) Particles.ember(330 + rand(-40, 40), 716, '#ffb46a');
    /* the pot */
    ctx.fillStyle = mixHex('#332a38', mixHex('#4a3830', '#6a4c38', potB), potB);
    ctx.beginPath();
    ctx.ellipse(330, 540, 86, 18, 0, 0, TAU); ctx.fill();
    ctx.fillRect(244, 540 - 50, 172, 50);
    ctx.beginPath(); ctx.ellipse(330, 490, 86, 18, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = `rgba(255,196,110,${0.06 + potB * 0.2})`;
    ctx.beginPath(); ctx.ellipse(330, 490, 70, 12, 0, 0, TAU); ctx.fill();
    /* copper gleam when loved */
    if (potB > 0.2) {
      ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = potB * 0.5;
      R.glow(ctx, 296, 512, 40, 'rgba(255,180,110,0.55)');
      ctx.restore();
    }
    /* roses overflowing at the finale */
    if (this.roseBloom > 0.01) {
      ctx.save();
      const roseShades = ['#c93b56', '#e05c75', '#a92f47'];
      for (let i = 0; i < 12; i++) {
        srand(i * 31 + 7);
        const a = this.roseBloom;
        const px = 330 + (rng() - 0.5) * 150 * a, py = 488 - rng() * 40 * a;
        ctx.globalAlpha = a * (0.7 + rng() * 0.3);
        ctx.fillStyle = roseShades[(rng() * roseShades.length) | 0];
        ctx.beginPath(); ctx.arc(px, py, 7 + rng() * 7 * a, 0, TAU); ctx.fill();
      }
      ctx.restore();
      lamp(ctx, 330, 490, 120 * this.roseBloom, 'rgba(255,120,140,0.5)', this.roseBloom * 0.7, t, 0.04);
    }

    /* ---- station: basket of potatoes ---- */
    const basB = this.stations[2].bloom;
    ctx.fillStyle = mixHex('#322637', '#4c381f', basB);
    ctx.beginPath();
    ctx.moveTo(-590, 700); ctx.quadraticCurveTo(-520, 760, -450, 700);
    ctx.lineTo(-462, 640); ctx.lineTo(-578, 640);
    ctx.closePath(); ctx.fill();
    for (let i = 0; i < 7; i++) {
      srand(i * 13 + 3);
      ctx.fillStyle = mixHex('#42333c', '#9a7c4e', basB * (0.5 + rng() * 0.5));
      ctx.beginPath();
      ctx.ellipse(-520 + (rng() - 0.5) * 90, 632 - rng() * 22, 16 + rng() * 8, 12 + rng() * 5, rng(), 0, TAU);
      ctx.fill();
    }
    if (basB > 0.2) lamp(ctx, -520, 630, 80, 'rgba(255,206,130,0.45)', basB * 0.5, t, 0.05);

    /* ---- station: floor sweeping — broom leaning ---- */
    const flB = this.stations[1].bloom;
    ctx.strokeStyle = mixHex('#43343c', '#5c4628', flB);
    ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(-150, 758); ctx.lineTo(-96, 520); ctx.stroke();
    ctx.fillStyle = mixHex('#4a3a42', '#7a6238', flB);
    ctx.beginPath();
    ctx.moveTo(-178, 766); ctx.lineTo(-122, 752); ctx.lineTo(-138, 712); ctx.lineTo(-168, 722);
    ctx.closePath(); ctx.fill();
    if (flB > 0.2) lamp(ctx, -120, 750, 110, 'rgba(255,216,150,0.4)', flB * 0.45, t, 0.04);

    /* sister Faustina at work — follows the active region loosely */
    const fx = clamp(damp(this._fx || 0, Input.down ? Input.x : 60, 2, Engine.dt), -460, 460);
    this._fx = fx;
    R.nun(ctx, fx, 800, 270, { color: '#141019' });

    /* station auras (gentle invitations) */
    if (!this.allDone) {
      for (const s of this.stations) {
        if (s.bloom >= 1) continue;
        const pulse = 0.5 + 0.5 * Math.sin(t * 1.6 + s.x);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.1 + pulse * 0.1;
        R.glow(ctx, s.x, s.y, s.r * 0.7, 'rgba(255,226,160,0.5)');
        ctx.globalAlpha = 0.5 + pulse * 0.3;
        /* thin progress arc */
        ctx.strokeStyle = 'rgba(232,201,138,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 26, -Math.PI / 2, -Math.PI / 2 + s.bloom * TAU);
        ctx.stroke();
        ctx.restore();
      }
    }

    /* warmth wash */
    if (warm > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = warm * 0.55;
      ctx.fillStyle = '#ffcf96';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
    /* rushed gray flash */
    if (this.rushed > 0.01) {
      ctx.save();
      ctx.globalAlpha = this.rushed * 0.12;
      ctx.fillStyle = '#888';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },
};


/* ============ 15-ch5-image.js ============ */
/* Chapter V — Paint an Image. Płock 1931 / Vilnius 1934.
   The heart of the game: the player paints the Image with their own
   imperfect hand — and the imperfection is answered by Diary 313. */

SCENES.ch5 = {
  id: 'ch5',
  enter() {
    this.t = 0;
    this.state = 'cell';            // cell → studio
    this.lumenI = 0; this.lumenRays = 0;
    this.step = null;               // garment → hand → ray_red → ray_pale → sig → done
    this.canvasRect = { x: -230, y: 165, w: 460, h: 620 };
    this.heart = { x: 0.5, y: 0.42 };
    this.handT = { x: 0.30, y: 0.30 };
    Painting.strokes = [];
    Painting.sigProgress = 0;
    this.curStroke = null;
    this.garmentLen = 0;
    this.handDone = false;
    this.glowAmt = 0.85;
    this.bloomed = 0;
    this.rayHintPulse = 0;
    this.brushOn = false;
    Engine.grainAmt = 0.07;
    Audio.pad.set([['D2', 'A2', 'F3', 'D4'], ['Bb1', 'F3', 'Bb3', 'D4'], ['C2', 'G3', 'E4', 'C4'], ['A1', 'E3', 'C#4', 'E4']], { level: 0.36, hold: 12, bright: 680 });
  },
  exit() { Audio.channels.air.set(0); Audio.channels.choir.set(0); },

  script: function* (S) {
    const sc = SCENES.ch5;
    yield S.wait(2.4);
    yield S.textAuto('Płock. The evening of the 22nd of February, 1931. She was alone in her cell.', 5);
    S.do(() => {
      Tweens.to(sc, { lumenI: 1 }, 6, { ease: Ease.inOutSine });
      Audio.pad.targetLevel = 0.55;
      Audio.channels.choir.set(0.16);
      Audio.shimmer(0.4, 600);
    });
    yield S.wait(5.5);
    yield S.text('In the evening, when I was in my cell, I saw the Lord Jesus clothed in a white garment.', { quote: true, attr: 'Diary, 47' });
    yield S.text('Paint an image according to the pattern you see, with the signature: Jesus, I trust in You.', { voice: true, attr: 'Diary, 47' });
    S.do(() => {
      Tweens.to(sc, { lumenRays: 1 }, 4, { ease: Ease.inOutSine });
      Audio.bell('D4', 0.3, 1.4); Audio.bell('A4', 0.2, 1.4);
      Audio.shimmer(0.6, 900);
    });
    yield S.wait(3.6);
    yield S.text('I promise that the soul that will venerate this image will not perish.', { voice: true, attr: 'Diary, 48' });
    S.do(() => {
      Tweens.to(sc, { lumenI: 0, lumenRays: 0 }, 5, { ease: Ease.inOutSine });
      Audio.channels.choir.set(0);
      Audio.pad.targetLevel = 0.36;
    });
    yield S.text('She was twenty-five — a convent cook who had never once held a brush.');
    yield S.text('For three years the command followed her. Confessors shrugged. Superiors frowned.');
    yield S.text('Then, in Vilnius, one priest believed her: Father Michał Sopoćko. He hired a painter, Eugeniusz Kazimirowski, and every week Sister Faustina came to correct the work.');
    /* ---- to the studio ---- */
    S.do(() => sc._toStudio());
    yield S.wait(3);
    yield S.textAuto('Vilnius, 1934. The painter waits. Show him what you saw.', 4.6);
    S.do(() => { sc.step = 'garment'; Hint.show('paint Him — slow, broad strokes of light', { top: '92%' }); });
    yield S.waitFor(() => sc.garmentLen > 2.1);
    S.do(() => { sc.step = 'hand'; Hint.show('the right hand, raised in blessing', { top: '92%' }); });
    yield S.waitFor(() => sc.handDone);
    S.do(() => { sc.step = 'ray_red'; Hint.show('from the heart — draw the red ray, downward', { top: '92%' }); });
    yield S.waitFor(() => Painting.strokes.some(s => s.kind === 'ray_red'));
    S.do(() => { sc.step = 'ray_pale'; Hint.show('and the pale ray, beside it', { top: '92%' }); });
    yield S.waitFor(() => Painting.strokes.some(s => s.kind === 'ray_pale'));
    yield S.wait(0.8);
    yield S.textAuto('The pale ray stands for the Water which makes souls righteous. The red ray stands for the Blood which is the life of souls. — Diary, 299', 7, { small: true });
    S.do(() => { sc.step = 'sig'; Hint.show('sign it — trace the words, left to right', { top: '92%' }); });
    yield S.waitFor(() => Painting.sigProgress > 0.93);
    S.do(() => {
      sc.step = 'done'; Hint.hide();
      Painting.sigProgress = 1;
      Save.savePainting(Painting.strokes);
      Audio.pluck('D5', 0.3);
    });
    yield S.wait(2.2);
    yield S.text('It was finished. And Sister Faustina wept.');
    yield S.text('“Who will paint You as beautiful as You are?”', { quote: true, attr: 'Diary, 313' });
    yield S.wait(0.6);
    S.do(() => sc._bloom());
    yield S.text('Not in the beauty of the color, nor of the brush, lies the greatness of this image, but in My grace.', { voice: true, attr: 'Diary, 313' });
    yield S.wait(1.5);
    yield S.text('Whatever your hand just made — it was enough. It was never about the brush.');
    yield S.text('In April 1935 the image was hung high in the Gate of Dawn, and a city looked up at it.');
    S.do(() => Engine.nextChapter());
  },

  _toStudio() {
    Engine.fade.color = '#000000';
    Tweens.to(Engine.fade, { alpha: 1 }, 1.4, {
      key: 'fade', ease: Ease.inOutQuad, onDone: () => {
        this.state = 'studio'; this.t = 0;
        Audio.pad.set([['F2', 'C3', 'A3', 'F4'], ['D2', 'A2', 'F3', 'C4'], ['Bb1', 'F3', 'D4', 'Bb3'], ['C2', 'G3', 'C4', 'E4']], { level: 0.4, hold: 11, bright: 1050 });
        Tweens.to(Engine.fade, { alpha: 0 }, 2, { key: 'fade' });
      },
    });
  },
  _bloom() {
    Tweens.to(this, { bloomed: 1, glowAmt: 1.75 }, 4.5, { ease: Ease.inOutSine });
    Audio.channels.choir.set(0.22);
    Audio.shimmer(0.7, 800);
    Audio.bell('D4', 0.32, 1.6);
    Engine.after(1200, () => Audio.motif({ vel: 0.42 }));
    Engine.shake(0.1);
  },

  /* ---------- painting input ---------- */
  _unit(p) {
    const r = this.canvasRect;
    return { x: (p.x - r.x) / r.w, y: (p.y - r.y) / r.h };
  },
  _inCanvas(u, pad = 0.02) { return u.x > -pad && u.x < 1 + pad && u.y > -pad && u.y < 1 + pad; },

  onPress(p) {
    if (this.state !== 'studio' || !this.step || this.step === 'done') return;
    const u = this._unit(p);
    if (!this._inCanvas(u)) return;
    if (this.step === 'garment' || this.step === 'hand') {
      this.curStroke = { kind: 'garment', pts: [u] };
      this._startBrush();
    } else if (this.step === 'ray_red' || this.step === 'ray_pale') {
      if (dist(u.x, u.y, this.heart.x, this.heart.y) < 0.12) {
        this.curStroke = { kind: this.step, pts: [u] };
        this._startBrush();
      } else {
        this.rayHintPulse = 1;
        Tweens.to(this, { rayHintPulse: 0 }, 1.2, { key: 'rhp' });
        Audio.pluck('D3', 0.14);
      }
    } else if (this.step === 'sig') {
      this._startBrush();
    }
  },
  onMove(p) {
    if (this.state !== 'studio') return;
    const u = this._unit(p);
    if (this.curStroke && Input.down) {
      const last = this.curStroke.pts[this.curStroke.pts.length - 1];
      if (dist(u.x, u.y, last.x, last.y) > 0.012 && this._inCanvas(u)) {
        this.curStroke.pts.push(u);
        if (this.curStroke.kind === 'garment') {
          this.garmentLen += dist(u.x, u.y, last.x, last.y);
          if (this.step === 'hand' && dist(u.x, u.y, this.handT.x, this.handT.y) < 0.075 && !this.handDone) {
            this.handDone = true;
            Audio.bell('A4', 0.22, 0.8); Audio.shimmer(0.4, 1200);
          }
        }
        /* brush sparkle */
        if (Math.random() < 0.5) {
          const r = this.canvasRect;
          Particles.spawn({
            x: r.x + u.x * r.w + rand(-3, 3), y: r.y + u.y * r.h + rand(-3, 3),
            vx: rand(-8, 8), vy: rand(-14, -4), life: rand(0.4, 1),
            size: rand(1, 2.4), endSize: 0.2,
            color: this.curStroke.kind === 'ray_red' ? '#ff8997' : '#fff0cf',
            alpha: 0.7, additive: true, glow: true,
          });
        }
      }
    }
    if (this.step === 'sig' && Input.down) {
      if (u.y > 0.84 && u.y < 0.98 && u.x > 0.14) {
        const target = clamp01((u.x - 0.18) / 0.64);
        if (target > Painting.sigProgress) {
          Painting.sigProgress = target;
          Audio.channels.air.set(0.1, 2600 + Math.random() * 600, 0.04);
        }
      }
    }
    const speed = Input.speed;
    if (this.brushOn) Audio.channels.air.set(clamp01(speed / 900) * 0.16 + 0.02, 500 + clamp(speed, 0, 1400), 0.06);
  },
  onRelease() {
    if (this.curStroke) {
      const s = this.curStroke; this.curStroke = null;
      if (s.kind === 'garment') {
        if (s.pts.length > 2) Painting.strokes.push({ kind: 'garment', pts: smoothPath(s.pts) });
      } else {
        /* validate the ray */
        const a = s.pts[0], b = s.pts[s.pts.length - 1];
        const len = s.pts.reduce((acc, p, i) => i ? acc + dist(p.x, p.y, s.pts[i - 1].x, s.pts[i - 1].y) : 0, 0);
        const sideOk = s.kind === 'ray_red' ? b.x < this.heart.x + 0.04 : b.x > this.heart.x - 0.04;
        if (len > 0.28 && b.y > a.y + 0.18 && sideOk) {
          Painting.strokes.push({ kind: s.kind, pts: smoothPath(s.pts, 3) });
          const chord = s.kind === 'ray_red' ? ['D3', 'A3', 'D4'] : ['F3', 'C4', 'F4'];
          chord.forEach((n, i) => setTimeout(() => Audio.bell(n, 0.2, 1), i * 90));
          Audio.shimmer(0.5, s.kind === 'ray_red' ? 700 : 1100);
          Engine.shake(0.05);
        } else {
          this.rayHintPulse = 1;
          Tweens.to(this, { rayHintPulse: 0 }, 1.2, { key: 'rhp' });
          Audio.pluck('D3', 0.12);
        }
      }
    }
    this._stopBrush();
  },
  _startBrush() { this.brushOn = true; },
  _stopBrush() { this.brushOn = false; Audio.channels.air.set(0, undefined, 0.12); },

  update(dt) {
    this.t += dt;
    if (this.state === 'cell' && this.lumenI > 0.3 && Math.random() < 0.2) {
      Particles.mote(320 + rand(-110, 110), rand(420, 780));
    }
    if (this.bloomed > 0.3 && Math.random() < 0.3) {
      const r = this.canvasRect;
      Particles.mote(r.x + rand(0, r.w), r.y + rand(r.h * 0.3, r.h));
    }
  },

  draw(ctx) {
    if (this.state === 'cell') this._drawCell(ctx);
    else this._drawStudio(ctx);
  },

  _drawCell(ctx) {
    const t = this.t;
    R.sky(ctx, 'ch5-cell', [[0, '#0a0710'], [0.6, '#0e0a14'], [1, '#120d18']], View.left, 0, View.W + 2, 900);
    /* bed edge, table, small lamp */
    ctx.fillStyle = '#0d0a12';
    ctx.fillRect(View.left, 740, View.W + 2, 160);
    ctx.fillStyle = '#15101c';
    ctx.fillRect(-640, 600, 300, 140);
    ctx.fillStyle = '#1a1322';
    ctx.fillRect(-660, 590, 340, 22);
    R.candle(ctx, -480, 590, 70, t, 0.7);
    lamp(ctx, -480, 545, 90, 'rgba(255,180,100,0.5)', 0.5, t);
    /* cross shadow on wall */
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(-160, 300, 12, 90);
    ctx.fillRect(-186, 322, 64, 12);
    /* Faustina kneeling, facing the light */
    R.nun(ctx, -40, 822, 250, { kneel: true, color: '#120e17' });
    /* The Lord */
    R.lumen(ctx, 320, 830, 430, t, { intensity: this.lumenI, rays: this.lumenRays, raise: 1, rayLen: 760 });
    if (this.lumenI > 0.02) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = this.lumenI * 0.6;
      ctx.fillStyle = '#ffe7c0';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },

  _drawStudio(ctx) {
    const t = this.t, r = this.canvasRect;
    R.sky(ctx, 'ch5-studio', [[0, '#171420'], [0.6, '#1d1926'], [1, '#231d2b']], View.left, 0, View.W + 2, 900);
    /* tall studio window, left */
    const wx = View.left + View.W * 0.1, wy = 140;
    ctx.fillStyle = '#2c3350';
    ctx.fillRect(wx, wy, 180, 420);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    R.glow(ctx, wx + 90, wy + 200, 240, 'rgba(190,205,255,0.22)');
    ctx.restore();
    ctx.strokeStyle = '#0c0a12'; ctx.lineWidth = 9;
    ctx.strokeRect(wx, wy, 180, 420);
    ctx.beginPath(); ctx.moveTo(wx + 90, wy); ctx.lineTo(wx + 90, wy + 420);
    ctx.moveTo(wx, wy + 140); ctx.lineTo(wx + 180, wy + 140);
    ctx.moveTo(wx, wy + 280); ctx.lineTo(wx + 180, wy + 280); ctx.stroke();
    /* floor */
    ctx.fillStyle = '#191420';
    ctx.fillRect(View.left, 800, View.W + 2, 100);

    /* the painter, far right, waiting (Kazimirowski) */
    R.cloaked(ctx, View.right - View.W * 0.12, 812, 280, { color: '#191523', hunch: 0.2, flip: true });
    /* Faustina beside the easel */
    R.nun(ctx, r.x - 140, 822, 264, { color: '#120e17', flip: false });

    /* easel legs */
    ctx.strokeStyle = '#241c28'; ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(r.x + 30, r.y + r.h + 6); ctx.lineTo(r.x - 30, 860);
    ctx.moveTo(r.x + r.w - 30, r.y + r.h + 6); ctx.lineTo(r.x + r.w + 30, 860);
    ctx.moveTo(r.x + r.w / 2, r.y + r.h); ctx.lineTo(r.x + r.w / 2, 872);
    ctx.stroke();

    /* canvas */
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 30; ctx.shadowOffsetY = 10;
    ctx.fillStyle = '#101018';
    ctx.fillRect(r.x - 10, r.y - 10, r.w + 20, r.h + 20);
    ctx.restore();
    const cg = ctx.createLinearGradient(0, r.y, 0, r.y + r.h);
    cg.addColorStop(0, '#191622'); cg.addColorStop(1, '#13101c');
    ctx.fillStyle = cg;
    ctx.fillRect(r.x, r.y, r.w, r.h);

    /* ghost guide of the figure (faint, under player strokes) */
    ctx.save();
    ctx.beginPath(); ctx.rect(r.x, r.y, r.w, r.h); ctx.clip();
    const gI = this.step === 'garment' || this.step === 'hand' ? 0.16 : 0.08;
    /* ghost guide sized so its heart sits at the heart marker (u 0.5, 0.42) */
    R.lumen(ctx, r.x + r.w / 2, r.y + r.h * 0.825, r.h * 0.78, t, { intensity: gI + this.bloomed * 0.5, raise: 0.9, rays: 0 });
    /* player's painting */
    Painting.render(ctx, r.x, r.y, r.w, r.h, { glow: this.glowAmt });
    /* current stroke preview */
    if (this.curStroke && this.curStroke.pts.length > 1) {
      const pts = this.curStroke.pts.map(u => ({ x: r.x + u.x * r.w, y: r.y + u.y * r.h }));
      if (this.curStroke.kind === 'garment') {
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        for (let i = 0; i < pts.length; i += 2) { ctx.globalAlpha = 0.045; R.glow(ctx, pts[i].x, pts[i].y, r.w * 0.085, '#f4ead2'); }
        ctx.restore();
      } else {
        const col = this.curStroke.kind === 'ray_red' ? '#e8364c' : '#dfe9ff';
        drawTaperedPath(ctx, pts, r.w * 0.07, col, 0.3);
      }
    }
    /* step guides */
    if (this.step === 'hand' && !this.handDone) {
      const hx = r.x + this.handT.x * r.w, hy = r.y + this.handT.y * r.h;
      const p = 0.5 + 0.5 * Math.sin(t * 2.4);
      ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.4 + p * 0.4;
      R.glow(ctx, hx, hy, 22 + p * 10, '#ffeec9');
      ctx.restore();
    }
    if (this.step === 'ray_red' || this.step === 'ray_pale') {
      const hx = r.x + this.heart.x * r.w, hy = r.y + this.heart.y * r.h;
      const p = 0.5 + 0.5 * Math.sin(t * 2.2);
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = (0.5 + p * 0.5) * (1 + this.rayHintPulse);
      R.glow(ctx, hx, hy, 18 + p * 9 + this.rayHintPulse * 14, this.step === 'ray_red' ? '#ff96a3' : '#dfe9ff');
      /* dotted suggestion */
      ctx.globalAlpha = 0.16 + p * 0.1;
      ctx.setLineDash([3, 14]);
      ctx.strokeStyle = this.step === 'ray_red' ? '#ff8b99' : '#dfe9ff';
      ctx.lineWidth = 2;
      const ex = this.step === 'ray_red' ? 0.27 : 0.73;
      ctx.beginPath(); ctx.moveTo(hx, hy);
      ctx.quadraticCurveTo(r.x + (this.heart.x + (ex - this.heart.x) * 0.4) * r.w, r.y + 0.68 * r.h, r.x + ex * r.w, r.y + 0.93 * r.h);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if (this.step === 'sig') {
      const p = 0.5 + 0.5 * Math.sin(t * 2);
      ctx.save();
      ctx.globalAlpha = 0.2 + p * 0.12;
      ctx.strokeStyle = '#e8c98a';
      ctx.setLineDash([2, 10]); ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(r.x + 0.18 * r.w, r.y + 0.93 * r.h);
      ctx.lineTo(r.x + 0.82 * r.w, r.y + 0.93 * r.h);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    ctx.restore();

    /* frame edge */
    ctx.strokeStyle = 'rgba(216,201,164,0.25)';
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);

    /* the bloom: grace exceeds the frame */
    if (this.bloomed > 0.01) {
      const hx = r.x + this.heart.x * r.w, hy = r.y + this.heart.y * r.h;
      R.mercyRays(ctx, hx, hy, this.bloomed * 0.55, t, { len: 1300, spread: 0.5, width: 0.16 });
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = this.bloomed * 0.5;
      ctx.fillStyle = '#ffe9c4';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },
};


/* ============ 16-ch6-chaplet.js ============ */
/* Chapter VI — The Chaplet. Vilnius, September 1935.
   A storm over the city; an angel sent to strike; a prayer on ordinary beads.
   Cadence, not speed: press with the breathing ring, and the sky retreats. */

SCENES.ch6 = {
  id: 'ch6',
  enter() {
    this.t = 0;
    this.phase = 'intro';        // intro → bigbead → decade → bridge → cascade → holy → dawn
    this.storm = 1;
    this.decadeBeads = 0;        // 0..10
    this.holyCount = 0;
    this.cascade = 0;            // 0..24
    this.cascadeT = 0;
    this.decadesDone = 0;
    this.ringT = 0;
    this.ringPeriod = 2.5;
    this.lightning = 0;
    this.lightningT = rand(1.5, 3);
    this.boltSeed = 1;
    this.dawn = 0;
    this.beadFlash = 0;
    this.angelArm = 1;
    Engine.grainAmt = 0.085;
    Audio.pad.set([['D2', 'A2', 'D3', 'F3'], ['C2', 'G2', 'C3', 'Eb3'], ['Bb1', 'F2', 'Bb2', 'D3'], ['A1', 'E2', 'A2', 'C#3']], { level: 0.4, hold: 9, bright: 520 });
    Audio.channels.rain.set(0.5, 1700);
    Audio.channels.wind.set(0.4, 300);
  },
  exit() {
    Audio.channels.rain.set(0);
    Audio.channels.wind.set(0);
  },

  script: function* (S) {
    const sc = SCENES.ch6;
    yield S.wait(2.4);
    yield S.text('Vilnius. In September of 1935, she saw in the sky an angel — the executor of God’s wrath, sent to strike the earth.');
    yield S.text('She began to plead for the world — and heard, rising within her, words she had never learned.');
    S.do(() => { sc.phase = 'bigbead'; Hint.show('press with the slow ring — begin', { ttl: 7 }); });
    yield S.waitFor(() => sc.phase === 'decade' );
    yield S.textAuto('Eternal Father, I offer You the Body and Blood, Soul and Divinity of Your dearly beloved Son, Our Lord Jesus Christ, in atonement for our sins and those of the whole world.', 8, { voice: true, attr: 'Diary, 476' });
    yield S.waitFor(() => sc.decadeBeads >= 10);
    S.do(() => { sc.phase = 'bridge'; sc.decadesDone = 1; });
    yield S.wait(1.2);
    yield S.text('Ten times on the small beads: For the sake of His sorrowful Passion, have mercy on us and on the whole world.', { quote: true, attr: 'Diary, 476' });
    yield S.text('And again. And again — five decades, fifty pleas, on ordinary rosary beads.');
    S.do(() => { sc.phase = 'cascade'; Hint.show('hold — and pray on', { ttl: 6 }); });
    yield S.waitFor(() => sc.cascade >= 24);
    S.do(() => { sc.phase = 'holy'; sc.decadesDone = 5; Hint.show('three times — Holy God', { ttl: 6 }); });
    yield S.waitFor(() => sc.holyCount >= 3);
    S.do(() => {
      sc.phase = 'dawn';
      Tweens.to(sc, { dawn: 1, storm: 0 }, 7, { ease: Ease.inOutSine });
      Audio.channels.rain.set(0.06, 1200, 2);
      Audio.channels.wind.set(0.1, 240, 2);
      Audio.pad.set([['D2', 'A2', 'F#3', 'D4'], ['G2', 'D3', 'B3', 'G3'], ['A2', 'E3', 'A3', 'C#4'], ['D2', 'A2', 'D4', 'F#4']], { level: 0.5, hold: 10, bright: 1100 });
      Audio.shimmer(0.5, 800);
    });
    yield S.wait(5);
    yield S.text('The arm did not fall. Before those words, the angel stood helpless — and the storm knelt.');
    yield S.text('Whoever will recite it will receive great mercy at the hour of death.', { voice: true, attr: 'Diary, 687' });
    yield S.text('She wrote the words down. The world still prays them every day, at three o’clock, on ordinary beads.');
    S.do(() => Engine.nextChapter());
  },

  _ringPulse() {
    /* 0..1, peaks once per period */
    return 0.5 + 0.5 * Math.sin((this.ringT / this.ringPeriod) * TAU - Math.PI / 2);
  },
  _cadence() {
    /* accuracy of pressing near the pulse peak (generous) */
    const ph = (this.ringT % this.ringPeriod) / this.ringPeriod;     // peak at 0.5
    return 1 - clamp01(Math.abs(ph - 0.5) / 0.34);
  },

  _bead(big) {
    const acc = this._cadence();
    const retreat = (big ? 0.045 : 0.02) * (0.55 + 0.45 * acc);
    this.storm = clamp01(this.storm - retreat);
    this.beadFlash = 0.6 + acc * 0.4;
    Tweens.to(this, { beadFlash: 0 }, 0.9, { key: 'bf' });
    const tones = ['D4', 'E4', 'F4', 'G4', 'A4'];
    if (big) Audio.bell('D4', 0.3, 1.1);
    else Audio.pluck(tones[(this.decadeBeads + this.cascade) % tones.length], 0.2 + acc * 0.16);
    if (acc > 0.55) Audio.shimmer(0.12, 1400);
    Tweens.to(this, { angelArm: this.storm }, 1.6, { key: 'arm', ease: Ease.inOutSine });
  },

  onPress() {
    if (this.phase === 'bigbead') {
      this._bead(true);
      this.phase = 'decade';
      Hint.show('each small bead — with the ring', { ttl: 6 });
    } else if (this.phase === 'decade') {
      if (this.decadeBeads < 10) {
        this.decadeBeads++;
        this._bead(false);
      }
    } else if (this.phase === 'holy') {
      this.holyCount++;
      Audio.bell(['D3', 'A2', 'D2'][this.holyCount - 1] || 'D3', 0.4, 1.8);
      this.storm = clamp01(this.storm - 0.07);
      Engine.shake(0.06);
      Audio.shimmer(0.3, 600);
    }
  },

  update(dt) {
    this.t += dt;
    this.ringT += dt;
    /* cascade while holding */
    if (this.phase === 'cascade') {
      if (Input.down) {
        this.cascadeT -= dt;
        if (this.cascadeT <= 0) {
          this.cascadeT = 0.34;
          this.cascade++;
          this._bead(this.cascade % 11 === 0);
          this.decadesDone = 1 + Math.min(4, Math.floor(this.cascade / 6));
        }
      }
    }
    /* lightning while the storm lives */
    this.lightningT -= dt * (0.3 + this.storm);
    if (this.lightningT <= 0 && this.storm > 0.08) {
      this.lightningT = rand(2, 5.5);
      this.lightning = 0.7 + this.storm * 0.3;
      this.boltSeed = (Math.random() * 9999) | 0;
      Tweens.to(this, { lightning: 0 }, rand(0.4, 0.8), { key: 'li', ease: Ease.outExpo });
      Engine.after(rand(150, 700), () => Audio.thunder(0.25 + this.storm * 0.5));
      if (this.storm > 0.5) Engine.shake(0.1 * this.storm);
    }
    /* rain spawns */
    const rainN = Math.round(this.storm * 5);
    for (let i = 0; i < rainN; i++) {
      Particles.spawn({
        x: rand(View.left, View.right), y: View.top - 10,
        vx: -120 * this.storm, vy: rand(560, 720), life: 1.4,
        size: 2.1, endSize: 2.1, color: 'rgba(160,180,220,0.5)', alpha: rand(0.1, 0.3),
        shape: 'streak',
      });
    }
    Audio.channels.rain.set(this.storm * 0.55 + (this.phase === 'dawn' ? 0.04 : 0), 1500 + this.storm * 700);
  },

  draw(ctx) {
    const t = this.t, storm = this.storm, dawn = this.dawn;
    /* sky: storm → dawn */
    const top = mixHex('#0a0a14', '#2c3a66', dawn);
    const mid = mixHex('#131428', '#7c6a8a', dawn);
    const bot = mixHex('#1c1c30', '#e8b27a', dawn);
    const g = ctx.createLinearGradient(0, 0, 0, 900);
    g.addColorStop(0, top); g.addColorStop(0.62, mid); g.addColorStop(1, bot);
    ctx.fillStyle = g; ctx.fillRect(View.left, 0, View.W + 2, 900);

    /* storm clouds: layered dark blobs, receding upward as storm dies */
    ctx.save();
    const cloudLift = (1 - storm) * 260;
    for (let layer = 0; layer < 3; layer++) {
      ctx.fillStyle = `rgba(${8 + layer * 6},${8 + layer * 5},${16 + layer * 8},${0.85 - layer * 0.2})`;
      ctx.beginPath();
      const baseY = 150 + layer * 70 - cloudLift * (1 + layer * 0.3);
      ctx.moveTo(View.left - 50, -100);
      ctx.lineTo(View.left - 50, baseY);
      for (let i = 0; i <= 16; i++) {
        const x = lerp(View.left - 50, View.right + 50, i / 16);
        const y = baseY + wobble(i * 1.3 + layer * 5 + t * 0.12) * 55 * (0.5 + storm);
        ctx.quadraticCurveTo(x - 30, y + 30, x, y);
      }
      ctx.lineTo(View.right + 50, -100);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    /* the angel — a terrible pillar of pale fire in the clouds */
    if (storm > 0.02) {
      const ax = View.W * 0.18, ay = 60 - cloudLift * 0.5;
      const I = storm * (0.65 + 0.1 * Math.sin(t * 1.1)) + this.lightning * 0.3;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = I * 0.55;
      R.glow(ctx, ax, ay + 130, 300, 'rgba(220,210,255,0.5)');
      /* body wedge */
      const grd = ctx.createLinearGradient(0, ay, 0, ay + 460);
      grd.addColorStop(0, `rgba(235,228,255,${0.5 * I})`);
      grd.addColorStop(1, 'rgba(235,228,255,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(ax - 26, ay); ctx.lineTo(ax + 26, ay);
      ctx.lineTo(ax + 90, ay + 460); ctx.lineTo(ax - 90, ay + 460);
      ctx.closePath(); ctx.fill();
      /* wings: two faint arcs */
      ctx.strokeStyle = `rgba(225,215,255,${0.3 * I})`;
      ctx.lineWidth = 16;
      ctx.beginPath(); ctx.arc(ax - 130, ay + 170, 150, -1.9, -0.4); ctx.stroke();
      ctx.beginPath(); ctx.arc(ax + 130, ay + 170, 150, Math.PI + 0.4, Math.PI + 1.9); ctx.stroke();
      /* the raised arm — lowering as the chaplet advances */
      const armA = -2.2 + (1 - this.angelArm) * 1.1;
      ctx.strokeStyle = `rgba(255,244,255,${0.5 * I})`;
      ctx.lineWidth = 11; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ax, ay + 120);
      ctx.lineTo(ax + Math.cos(armA) * 130, ay + 120 + Math.sin(armA) * 130);
      ctx.stroke();
      ctx.restore();
    }

    /* lightning */
    if (this.lightning > 0.02) {
      ctx.save();
      ctx.globalAlpha = this.lightning * 0.16;
      ctx.fillStyle = '#e8ecff';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = this.lightning * 0.8;
      ctx.strokeStyle = '#eef2ff';
      ctx.lineWidth = 2.6;
      srand(this.boltSeed);
      let bx = View.left + rng() * View.W * 0.9, by = 40;
      ctx.beginPath(); ctx.moveTo(bx, by);
      while (by < 560) { bx += (rng() - 0.5) * 90; by += 40 + rng() * 50; ctx.lineTo(bx, by); }
      ctx.stroke();
      ctx.restore();
    }

    /* Vilnius skyline */
    ctx.fillStyle = mixHex('#08070e', '#241a26', dawn * 0.7);
    ctx.beginPath();
    ctx.moveTo(View.left, 900); ctx.lineTo(View.left, 700);
    srand(77);
    let x = View.left;
    while (x < View.right) {
      const w = 60 + rng() * 130;
      const h = 640 - rng() * 110;
      ctx.lineTo(x, h);
      if (rng() < 0.3) { /* a spire */
        ctx.lineTo(x + w * 0.4, h); ctx.lineTo(x + w * 0.5, h - 90 - rng() * 70); ctx.lineTo(x + w * 0.6, h);
      }
      ctx.lineTo(x + w, h);
      x += w;
    }
    ctx.lineTo(View.right, 900);
    ctx.closePath(); ctx.fill();
    /* windows kindle as hope returns */
    srand(31);
    for (let i = 0; i < 40; i++) {
      const wx2 = View.left + rng() * View.W, wy2 = 680 + rng() * 150;
      const on = rng() < (1 - storm) * 0.9;
      if (on) {
        ctx.fillStyle = `rgba(255,200,120,${0.5 + 0.3 * Math.sin(t + i)})`;
        ctx.fillRect(wx2, wy2, 5, 8);
      }
    }

    /* Faustina at her window, foreground left — back to us, facing the storm */
    ctx.fillStyle = '#070509';
    ctx.fillRect(View.left, 820, View.W + 2, 80);
    R.nun(ctx, View.left + View.W * 0.16, 866, 250, { color: '#0e0b13' });

    /* ------ the chaplet interface ------ */
    const cy = 770, cx = 0;
    const interactive = ['bigbead', 'decade', 'holy', 'cascade'].includes(this.phase);
    if (interactive || this.phase === 'dawn') {
      /* the breathing ring, above the beads */
      if (interactive && this.phase !== 'cascade') {
        drawRing(ctx, cx, cy - 160, 56, this._ringPulse(), 0.85);
      }
      if (this.phase === 'cascade') {
        drawRing(ctx, cx, cy - 160, 56, Input.down ? 0.5 + 0.5 * Math.sin(t * 4) : 0.2, Input.down ? 0.9 : 0.5);
      }
      /* bead arc: 1 big + 10 small, a wide gentle smile of beads */
      const total = 11;
      const arcR = 420;
      const a0 = Math.PI * 0.795, a1 = Math.PI * 0.205;
      for (let i = 0; i < total; i++) {
        const f = i / (total - 1);
        const ang = lerp(a0, a1, f);
        const bx = cx + Math.cos(ang) * arcR;
        const by = cy + 330 - Math.sin(ang) * arcR;
        const isBig = i === 0;
        let lit;
        if (this.phase === 'bigbead') lit = false;
        else if (this.phase === 'decade') lit = isBig || i <= this.decadeBeads;
        else lit = true;
        const isNext = (this.phase === 'bigbead' && isBig) || (this.phase === 'decade' && i === this.decadeBeads + 1);
        const r = isBig ? 13 : 8.5;
        ctx.save();
        if (lit) {
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.75 + this.beadFlash * 0.25;
          R.glow(ctx, bx, by, r * 3, '#ffe7b8');
        } else if (isNext) {
          /* invite the next bead with a soft pulse */
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.3 + 0.3 * this._ringPulse();
          R.glow(ctx, bx, by, r * 2.6, '#cfd8f2');
        }
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.fillStyle = lit ? '#f3e0b6' : `rgba(206,198,182,${isNext ? 0.75 : 0.34})`;
        ctx.beginPath(); ctx.arc(bx, by, r, 0, TAU); ctx.fill();
        ctx.restore();
      }
      /* decade marks */
      for (let dnum = 0; dnum < 5; dnum++) {
        const on = dnum < this.decadesDone;
        ctx.globalAlpha = on ? 0.85 : 0.22;
        spacedTextAt(ctx, ['I', 'II', 'III', 'IV', 'V'][dnum], cx - 120 + dnum * 60, cy + 196, 13, 2, '#e8c98a');
        ctx.globalAlpha = 1;
      }
      /* persistent small-bead prayer caption */
      if (this.phase === 'decade' || this.phase === 'cascade') {
        ctx.globalAlpha = 0.5;
        ctx.font = 'italic 16px "Iowan Old Style","Palatino Linotype",Georgia,serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#d8d0c0';
        ctx.fillText('for the sake of His sorrowful Passion, have mercy on us and on the whole world', cx, cy + 158);
        ctx.globalAlpha = 1;
      }
      if (this.phase === 'holy') {
        ctx.globalAlpha = 0.6;
        ctx.font = 'italic 16px "Iowan Old Style","Palatino Linotype",Georgia,serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#e6dcc6';
        ctx.fillText(['Holy God…', 'Holy Mighty One…', 'Holy Immortal One…'][Math.min(this.holyCount, 2)], cx, cy + 158);
        ctx.globalAlpha = 1;
      }
    }
    /* dawn light wash */
    if (dawn > 0.01) {
      ctx.save();
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = dawn * 0.55;
      ctx.fillStyle = '#ffd9a4';
      ctx.fillRect(View.left, 0, View.W + 2, 900);
      ctx.restore();
    }
  },
};

/* Chapter VII — The Gate. Kraków-Łagiewniki, 1937.
   Portress during hard years. Mercy has three ways: deed, word, prayer —

SCENES.ch7 = {
  id: 'ch7',

  _nextVisitor(isLast = false) {

  _offerChoices() {

    Choices.show([
      { id: 'deed', label: 'Deed', sub: this.bread > 0 ? `give bread — ${this.bread} left` : 'no bread left', disabled: this.bread <= 0 },
      { id: 'word', label: 'Word', sub: 'stay, and speak' },
      { id: 'prayer', label: 'Prayer', sub: 'hold a moment' },
    ], id => this._choose(id));
  },
  _choose(id) {
    const v = this.visitor;
    v.choice = id;
    v.outcomeText = v.def[id];
    if (id === 'deed') {
      this.bread--;
      this.loafAnim = { t: 0, from: { x: 240, y: 700 }, to: { x: v.x, y: v.y - v.def.h * 0.5 } };

      Engine.after(900, () => {

        Tweens.to(v, { warmth: 1 }, 2, { ease: Ease.inOutSine });
        v.state = 'resolved';
      });
